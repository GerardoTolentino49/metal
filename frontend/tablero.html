<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Board - Xen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="Estilos/theme.css">
  <link rel="stylesheet" href="Estilos/tablero.css">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="js/theme.js"></script>
  <script src="js/permissions.js"></script>
</head>
<body>

      </div>
      <div class="topbar-center">
        <a href="inicio.html" class="nav-item">
          <span>Home</span>
        </a>
        <a href="tablero.html" class="nav-item active">
          <span>Board</span>
        </a>
        <a href="tareas.html" class="nav-item">
          <span>Tasks</span>
        </a>
        <a href="calendario.html" class="nav-item">
          <span>Calendar</span>
        </a>
        <a href="equipo.html" class="nav-item">
          <span>Team</span>
        </a>
        <a href="diseno.html" class="nav-item">
          <span>Design</span>
        </a>
        <a href="reportes.html" class="nav-item">
          <span>Reports</span>
        </a>
        <a href="ajustes.html" class="nav-item">
          <span>Settings</span>
        </a>
      </div>
      <div class="topbar-right">
        <div class="user-menu">
          <div class="user-avatar">
            <i class="fas fa-user"></i>
          </div>

            <i class="fas fa-sign-out-alt"></i>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Contenido principal -->
  <main class="main-content">
    <div class="content-wrapper">
      <div class="orders-list-container">
        <div class="orders-list-header glass-card">
          <div class="list-header-item">
            <span>Order</span>
          </div>
          <div class="list-header-item">
            <span>Client</span>
          </div>
          <div class="list-header-item status-header">
            <span>Process Status</span>
          </div>
          <div class="list-header-item progress-header">
            <span>Progress</span>
          </div>
          <div class="list-header-item money-header">
            <span>Money Invested</span>
          </div>
        </div>
        <div class="orders-list" id="ordersList">
          <!-- Las órdenes se cargarán aquí -->
        </div>
      </div>
    </div>
  </main>

  <button class="chatbot-button" id="chatbotButton" title="Hablar con LISA">
    <i class="fas fa-robot"></i>
  </button>


  <!-- Modal para agregar/editar orden -->
  <div class="modal" id="orderModal">
    <div class="modal-content glass-card">
      <div class="modal-header">
        <h3 id="modalTitle">New Production Order</h3>
        <button class="modal-close" id="closeModal">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <form id="orderForm">
        <div class="form-group">
          <label for="orderNumber">Order Number</label>
          <input type="text" id="orderNumber" name="orderNumber" required placeholder="Ex: ORD-001">
        </div>
        <div class="form-group">
          <label for="orderClient">Client</label>
          <input type="text" id="orderClient" name="client" required placeholder="Client name">
        </div>
        <div class="form-group">
          <label for="orderDescription">Description</label>
          <textarea id="orderDescription" name="description" rows="4" placeholder="Describe the order details..."></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="orderPriority">Priority</label>
            <select id="orderPriority" name="priority" required>
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <div class="form-group">
            <label for="orderStatus">Status</label>
            <select id="orderStatus" name="status" required>
              <option value="pending">Pending</option>
              <option value="design">In Design</option>
              <option value="production">In Production</option>
              <option value="review">In Review</option>
              <option value="completed">Completed</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="orderDueDate">Due Date</label>
          <input type="date" id="orderDueDate" name="dueDate">
        </div>
        <div class="form-group">
          <label for="orderAssignee">Assigned to</label>
          <input type="text" id="orderAssignee" name="assignee" placeholder="Responsible person name">
        </div>
        <div class="form-group">
          <label for="orderProgress">Progress (%)</label>
          <input type="number" id="orderProgress" name="progress" min="0" max="100" value="0" placeholder="0-100">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="cancelBtn">Cancel</button>
          <button type="submit" class="btn-save">Save Order</button>
        </div>
        <input type="hidden" id="orderId" name="orderId">
      </form>
    </div>
  </div>

  <!-- Modal de comentarios -->
  <div class="modal" id="commentsModal">
    <div class="modal-content glass-card comments-modal-content">
      <div class="modal-header">
        <h3 id="commentsModalTitle">Comments</h3>
        <button class="modal-close" id="closeCommentsModal">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="comments-container">
        <div class="comments-list" id="commentsList">
          <!-- Los comentarios se cargarán aquí -->
        </div>
        <div class="comment-input-container">
          <div class="comment-input-wrapper">
            <div class="comment-avatar">
              <i class="fas fa-user"></i>
            </div>
            <input type="text" id="commentInput" class="comment-input" placeholder="Write a comment...">
            <button class="btn-comment-send" id="sendCommentBtn">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let orders = JSON.parse(localStorage.getItem('productionOrders') || '[]');
    let editingOrderId = null;
    let currentCommentsOrderId = null;

    // Verificar autenticación
    document.addEventListener('DOMContentLoaded', function() {
      const username = localStorage.getItem('username');
      const isLoggedIn = localStorage.getItem('isLoggedIn');

      if (!isLoggedIn || isLoggedIn !== 'true') {
        window.location.href = 'login.html';
        return;
      }

      // Ocultar pestañas según el rol del usuario
      const rol = localStorage.getItem('rol');
      if (rol === 'diseñador') {
        // Ocultar todas las pestañas excepto Inicio y Diseño
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
          const text = item.textContent.trim().toLowerCase();
          if (text !== 'home' && text !== 'design') {
            item.style.display = 'none';
          }
        });
      }
      if (rol === 'pm') {
        // Ocultar todas las pestañas excepto Home y PM
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
          const text = item.textContent.trim().toLowerCase();
          const href = item.getAttribute('href') || '';
          if (text !== 'home' && !href.includes('pm.html')) {
            item.style.display = 'none';
          }
        });
      }

      if (username) {
        // Cargar nombre del empleado (solo primer nombre)
        loadEmployeeName(username);
      }
      
      // Función para cargar nombre del empleado (solo primer nombre)
      async function loadEmployeeName(username) {
        try {
          // Buscar el usuario en la lista de empleados
          const responseDesign = await fetch('/api/employees/design');
          const responseIT = await fetch('/api/employees/it');
          
          let employee = null;
          
          if (responseDesign.ok) {
            const data = await responseDesign.json();
            if (data.success && data.employees) {
              employee = data.employees.find(emp => {
                const empName = (emp.nombre_completo || `${emp.nombre || ''} ${emp.apellidos || ''}`).toLowerCase();
                return empName.includes(username.toLowerCase()) || 
                       (emp.usuario && emp.usuario.toLowerCase() === username.toLowerCase());
              });
            }
          }
          
          if (!employee && responseIT.ok) {
            const data = await responseIT.json();
            if (data.success && data.employees) {
              employee = data.employees.find(emp => {
                const empName = (emp.nombre_completo || `${emp.nombre || ''} ${emp.apellidos || ''}`).toLowerCase();
                return empName.includes(username.toLowerCase()) || 
                       (emp.usuario && emp.usuario.toLowerCase() === username.toLowerCase());
              });
            }
          }
          
          if (employee) {
            // Obtener el nombre del empleado (nombre o nombre_completo)
            const fullName = employee.nombre_completo || employee.nombre || username;
            // Tomar solo el primer nombre
            const firstName = fullName.split(' ')[0];
            document.getElementById('username').textContent = firstName;
          } else {
            // Si no se encuentra el empleado, usar el username pero solo el primer nombre
            const firstName = username.split(' ')[0];
            document.getElementById('username').textContent = firstName;
          }
        } catch (error) {
          console.error('Error al cargar información del empleado:', error);
          // Fallback: usar solo el primer nombre del username
          const firstName = username.split(' ')[0];
          document.getElementById('username').textContent = firstName;
        }
      }

      // Función para verificar si hay una orden activa
      function hasActiveOrder() {
        const activeSession = localStorage.getItem('activeSession');
        if (activeSession) {
          try {
            const session = JSON.parse(activeSession);
            if (session.orderNumber && session.startTime) {
              return true;
            }
          } catch (e) {
            console.error('Error al parsear activeSession:', e);
          }
        }
        return false;
      }

      // Logout
      document.getElementById('logoutBtn').addEventListener('click', function(e) {
        // Verificar si hay una orden activa
        if (hasActiveOrder()) {
          e.preventDefault();
          alert('You cannot log out while you have an active order. Please go to the Design page and finish the order first.');
          return;
        }

        localStorage.clear();
        window.location.href = 'login.html';
      });

      // Prevenir cerrar la pestaña si hay una orden activa
      window.addEventListener('beforeunload', function(e) {
        if (hasActiveOrder()) {
          e.preventDefault();
          e.returnValue = 'You have an active order. Are you sure you want to close the tab? You must finish the order first from the Design page.';
          return e.returnValue;
        }
      });

      // Inicializar
      renderOrders();

      // Event listeners
      document.getElementById('closeModal').addEventListener('click', closeOrderModal);
      document.getElementById('cancelBtn').addEventListener('click', closeOrderModal);
      document.getElementById('orderForm').addEventListener('submit', saveOrder);
      document.getElementById('closeCommentsModal').addEventListener('click', closeCommentsModal);
      document.getElementById('sendCommentBtn').addEventListener('click', sendComment);
      document.getElementById('commentInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          sendComment();
        }
      });

      // Cerrar modal al hacer clic fuera
      document.getElementById('orderModal').addEventListener('click', function(e) {
        if (e.target === this) {
          closeOrderModal();
        }
      });

      document.getElementById('commentsModal').addEventListener('click', function(e) {
        if (e.target === this) {
          closeCommentsModal();
        }
      });
    });

    // Función auxiliar para convertir tiempo a horas decimales
    function timeToHours(timeValue) {
      if (!timeValue) return 0;
      
      let totalSeconds = 0;
      
      // Si es un número (segundos)
      if (typeof timeValue === 'number') {
        totalSeconds = timeValue;
      } else if (typeof timeValue === 'string') {
        const timeRegex = /^(\d{2}):(\d{2}):(\d{2})$/;
        if (timeRegex.test(timeValue)) {
          const [hours, minutes, seconds] = timeValue.split(':').map(Number);
          totalSeconds = hours * 3600 + minutes * 60 + seconds;
        } else {
          // Intentar parsear como segundos
          totalSeconds = parseFloat(timeValue) || 0;
        }
      } else if (typeof timeValue === 'object') {
        if (timeValue.totalSeconds !== undefined) {
          totalSeconds = Math.floor(timeValue.totalSeconds || 0);
        } else {
          const hours = Math.floor(timeValue.hours || 0);
          const minutes = Math.floor(timeValue.minutes || 0);
          const seconds = Math.floor(timeValue.seconds || 0);
          totalSeconds = hours * 3600 + minutes * 60 + seconds;
        }
      }
      
      return totalSeconds / 3600; // Convertir a horas decimales
    }

    // Función para calcular precio basado en horas y tarifa
    function calculatePrice(hours, hourlyRateUSD = 0) {
      if (!hourlyRateUSD || hours === 0) {
        return { usd: 0, mxn: 0 };
      }
      
      const usd = hours * hourlyRateUSD;
      // Tasa de cambio aproximada USD a MXN (puedes actualizarla)
      const exchangeRate = 17.0; // 1 USD = 17 MXN aproximadamente
      const mxn = usd * exchangeRate;
      
      return {
        usd: usd.toFixed(2),
        mxn: mxn.toFixed(2)
      };
    }

    async function renderOrders() {
      const ordersList = document.getElementById('ordersList');
      ordersList.innerHTML = '<div class="empty-state glass-card"><i class="fas fa-spinner fa-spin"></i><p>Loading projects...</p></div>';

      try {
        // Cargar órdenes desde la API
        const response = await fetch('/api/orders');
        let apiOrders = [];
        
        if (response.ok) {
          const data = await response.json();
          if (data.success && data.orders) {
            apiOrders = data.orders;
          }
        }
        
        // Combinar órdenes de la API con las del localStorage
        const allOrders = [...apiOrders, ...orders];
        
        if (allOrders.length === 0) {
          ordersList.innerHTML = `
            <div class="empty-state glass-card">
              <i class="fas fa-clipboard-list"></i>
              <p>No production orders</p>
              <p class="empty-state-subtitle">Create your first order to get started</p>
            </div>
          `;
          return;
        }

        // Agrupar órdenes por project_name
        const projectsMap = new Map();
        
        allOrders.forEach(order => {
          const projectName = order.project_name || order.description || 'Sin proyecto';
          if (!projectsMap.has(projectName)) {
            projectsMap.set(projectName, {
              project_name: projectName,
              orders: []
            });
          }
          projectsMap.get(projectName).orders.push(order);
        });
        
        const projects = Array.from(projectsMap.values());
        ordersList.innerHTML = '';

        // Renderizar proyectos con sus órdenes
        projects.forEach((project, projectIndex) => {
          const projectContainer = document.createElement('div');
          projectContainer.className = 'project-container-board';
          projectContainer.setAttribute('data-project-index', projectIndex);
          
          // Calcular dinero invertido para el proyecto
          let totalUSD = 0;
          let totalMXN = 0;
          let totalProgress = 0;
          project.orders.forEach(order => {
            const hours = timeToHours(order.tiempo_real_segundos || order.tiempo_total_trabajado);
            const hourlyRate = parseFloat(order.hourly_rate || order.tarifa_hora || 0);
            const price = calculatePrice(hours, hourlyRate);
            totalUSD += parseFloat(price.usd || 0);
            totalMXN += parseFloat(price.mxn || 0);
            totalProgress += parseFloat(order.progress || 0);
          });
          
          // Calcular promedio de progreso
          const averageProgress = project.orders.length > 0 ? Math.round(totalProgress / project.orders.length) : 0;
          
          // Fila del proyecto
          const projectRow = document.createElement('div');
          projectRow.className = 'project-header-row glass-card';
          
          const projectId = `project-board-${projectIndex}`;
          const ordersContainerId = `orders-board-${projectIndex}`;
          
          projectRow.innerHTML = `
            <div class="project-expand-cell">
              <button class="expand-btn-board" data-project-id="${projectId}" data-orders-id="${ordersContainerId}" title="Expand/Collapse">
                <i class="fas fa-chevron-right"></i>
              </button>
            </div>
            <div class="project-name-cell">
              <i class="fas fa-project-diagram"></i>
              <span class="project-name-text">${project.project_name}</span>
              <span class="project-orders-count">(${project.orders.length} order${project.orders.length !== 1 ? 's' : ''})</span>
            </div>
            <div class="project-cell"></div>
            <div class="project-progress-cell">
              <div class="progress-container">
                <div class="progress-bar">
                  <div class="progress-fill" style="width: ${averageProgress}%"></div>
                </div>
                <span class="progress-text">${averageProgress}%</span>
              </div>
            </div>
            <div class="project-money-cell">
              <div class="money-invested">
                <span class="money-usd">$${totalUSD.toFixed(2)} USD</span>
                <span class="money-mxn">$${totalMXN.toFixed(2)} MXN</span>
              </div>
            </div>
          `;
          
          // Contenedor de órdenes (inicialmente oculto)
          const ordersContainer = document.createElement('div');
          ordersContainer.id = ordersContainerId;
          ordersContainer.className = 'project-orders-container-board';
          ordersContainer.style.display = 'none';
          
          // Renderizar cada orden del proyecto
          project.orders.forEach(order => {
            const orderRow = createOrderRow(order, true); // true indica que está en un proyecto
            ordersContainer.appendChild(orderRow);
          });
          
          projectContainer.appendChild(projectRow);
          projectContainer.appendChild(ordersContainer);
          ordersList.appendChild(projectContainer);
        });
        
        // Agregar event listeners a los botones de expandir/colapsar
        ordersList.querySelectorAll('.expand-btn-board').forEach(btn => {
          btn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            const ordersContainerId = this.getAttribute('data-orders-id');
            const ordersContainer = document.getElementById(ordersContainerId);
            const icon = this.querySelector('i');
            
            if (ordersContainer) {
              if (ordersContainer.style.display === 'none') {
                ordersContainer.style.display = 'block';
                icon.classList.remove('fa-chevron-right');
                icon.classList.add('fa-chevron-down');
                this.parentElement.parentElement.classList.add('expanded');
              } else {
                ordersContainer.style.display = 'none';
                icon.classList.remove('fa-chevron-down');
                icon.classList.add('fa-chevron-right');
                this.parentElement.parentElement.classList.remove('expanded');
              }
            }
          });
        });
        
      } catch (error) {
        console.error('Error al cargar proyectos:', error);
        ordersList.innerHTML = `
          <div class="empty-state glass-card">
            <i class="fas fa-exclamation-triangle"></i>
            <p>Error loading projects</p>
          </div>
        `;
      }
    }

    function createOrderRow(order, isInProject = false) {
      const container = document.createElement('div');
      container.className = 'order-container';
      container.dataset.orderId = order.id;
      
      const row = document.createElement('div');
      row.className = 'order-row glass-card';
      row.dataset.orderId = order.id;

      // Adaptar campos: API usa 'nombre', localStorage usa 'orderNumber'
      const orderNumber = order.nombre || order.orderNumber || 'N/A';
      const client = order.cliente || order.client || 'N/A';
      const description = order.project_name || order.description || 'No description';
      const priority = order.priority || 'medium';
      const status = order.estado || order.status || 'pending';

      const priorityClass = `priority-${priority}`;
      const priorityLabels = {
        'high': 'High',
        'medium': 'Medium',
        'low': 'Low'
      };

      const statusLabels = {
        'pending': 'Pending',
        'design': 'In Design',
        'production': 'In Production',
        'review': 'In Review',
        'completed': 'Completed',
        'trabajando en ella': 'Working on it',
        'en espera de aprobacion': 'Pending approval',
        'aprobada': 'Approved',
        'cambios': 'Changes',
        'revision': 'Review'
      };

      const statusColors = {
        'pending': '#6b7280',
        'design': '#8b5cf6',
        'production': '#3b82f6',
        'review': '#f59e0b',
        'completed': '#10b981',
        'trabajando en ella': '#3b82f6',
        'en espera de aprobacion': '#f59e0b',
        'aprobada': '#10b981',
        'cambios': '#ef4444',
        'revision': '#f59e0b'
      };

      // Función para determinar la clase de cada etapa según el estado
      function getProgressStageClass(currentStatus, stage) {
        const stages = ['inicio', 'diseño', 'produccion', 'corte', 'pintura', 'salida'];
        
        // Mapeo de estados a etapas
        let currentStageIndex = 0;
        const statusLower = (currentStatus || '').toLowerCase();
        
        if (statusLower === 'pending' || statusLower === 'trabajando en ella') {
          currentStageIndex = 0; // Start
        } else if (statusLower === 'design' || statusLower === 'revision') {
          currentStageIndex = 1; // In Design
        } else if (statusLower === 'production' || statusLower === 'en espera de aprobacion') {
          currentStageIndex = 2; // In Production
        } else if (statusLower === 'review' || statusLower === 'cambios') {
          currentStageIndex = 3; // In Cutting
        } else if (statusLower === 'completed' || statusLower === 'aprobada') {
          currentStageIndex = 5; // Exit (all previous completed)
        }
        
        const stageIndex = stages.indexOf(stage);
        
        // Si está completado, todas las etapas excepto salida están completadas
        if (statusLower === 'completed' || statusLower === 'aprobada') {
          if (stageIndex < 5) {
            return 'completed';
          } else if (stageIndex === 5) {
            return 'active';
          }
        }
        
        // Lógica normal para otros estados
        if (stageIndex < currentStageIndex) {
          return 'completed';
        } else if (stageIndex === currentStageIndex) {
          return 'active';
        } else {
          return 'pending';
        }
      }

      const dueDate = order.dueDate ? new Date(order.dueDate).toLocaleDateString('en-US', { 
        day: 'numeric', 
        month: 'short',
        year: 'numeric'
      }) : 'Sin fecha';

      const shortDescription = description.length > 50 ? description.substring(0, 50) + '...' : description;
      const displayStatus = statusLabels[status] || status;

      // Calcular dinero invertido para esta orden
      const hours = timeToHours(order.tiempo_real_segundos || order.tiempo_total_trabajado);
      const hourlyRate = parseFloat(order.hourly_rate || order.tarifa_hora || 0);
      const price = calculatePrice(hours, hourlyRate);

      // Ejemplo: mostrar 45% de progreso para la orden 112233
      let displayProgress = order.progress || 0;
      if (orderNumber === '112233' || order.nombre === '112233') {
        displayProgress = 45;
      }

      if (isInProject) {
        // Mostrar todas las columnas para órdenes dentro de proyectos
        row.innerHTML = `
          <div class="list-item" data-label="Orden:">
            <span class="order-number-cell">${orderNumber}</span>
          </div>
          <div class="list-item" data-label="Cliente:">
            <span class="order-client-cell">${client}</span>
          </div>
          <div class="list-item status-cell" data-label="Estado del Proceso:">
            <div class="status-badge-wrapper">
              <span class="status-badge status-${status}" data-order-id="${order.id}" data-status="${status}">
                ${displayStatus}
              </span>
              <div class="progress-tooltip">
                <div class="progress-stages">
                  <div class="progress-dot ${getProgressStageClass(status, 'inicio')}" title="Start">
                    <span class="dot-label">Start</span>
                    <span class="dot-time">${order.tiempo_trabajando_en_ella || order.tiempo_revision || '02:15:30'}</span>
                  </div>
                  <div class="progress-dot ${getProgressStageClass(status, 'diseño')}" title="In Design">
                    <span class="dot-label">In Design</span>
                    <span class="dot-time">${order.tiempo_revision || '01:45:20'}</span>
                  </div>
                  <div class="progress-dot ${getProgressStageClass(status, 'produccion')}" title="In Production">
                    <span class="dot-label">In Production</span>
                    <span class="dot-time">${order.tiempo_trabajando_en_ella || '03:20:45'}</span>
                  </div>
                  <div class="progress-dot ${getProgressStageClass(status, 'corte')}" title="In Cutting">
                    <span class="dot-label">In Cutting</span>
                    <span class="dot-time">${order.tiempo_cambios || '00:30:15'}</span>
                  </div>
                  <div class="progress-dot ${getProgressStageClass(status, 'pintura')}" title="In Painting">
                    <span class="dot-label">In Painting</span>
                    <span class="dot-time">${order.tiempo_aprobada || '01:10:00'}</span>
                  </div>
                  <div class="progress-dot ${getProgressStageClass(status, 'salida')}" title="Exit">
                    <span class="dot-label">Exit</span>
                    <span class="dot-time">${order.tiempo_en_espera_de_aprobacion || '00:00:00'}</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="list-item progress-cell" data-label="Progreso:">
            <div class="progress-container">
              <div class="progress-bar">
                <div class="progress-fill" style="width: ${displayProgress}%"></div>
              </div>
              <span class="progress-text">${displayProgress}%</span>
            </div>
          </div>
          <div class="list-item order-money-cell">
            <div class="money-invested">
              <span class="money-usd">$${price.usd} USD</span>
              <span class="money-mxn">$${price.mxn} MXN</span>
            </div>
          </div>
        `;
      } else {
        // Mostrar todas las columnas para órdenes fuera de proyectos
        row.innerHTML = `
          <div class="list-item" data-label="Orden:">
            <span class="order-number-cell">${orderNumber}</span>
          </div>
          <div class="list-item" data-label="Cliente:">
            <span class="order-client-cell">${client}</span>
          </div>
          <div class="list-item" data-label="Descripción:">
            <span class="order-description-cell" title="${description}">${shortDescription}</span>
          </div>
          <div class="list-item" data-label="Prioridad:">
            <span class="order-priority ${priorityClass}">${priorityLabels[priority]}</span>
          </div>
          <div class="list-item" data-label="Fecha Entrega:">
            <span class="order-due-date-cell">${dueDate}</span>
          </div>
          <div class="list-item" data-label="Asignado:">
            <span class="order-assignee-cell">${order.assignee || 'Unassigned'}</span>
          </div>
          <div class="list-item status-cell" data-label="Estado del Proceso:">
            <div class="status-badge-wrapper">
              <span class="status-badge status-${status}" data-order-id="${order.id}" data-status="${status}">
                ${displayStatus}
              </span>
              <div class="progress-tooltip">
                <div class="progress-stages">
                  <div class="progress-dot ${getProgressStageClass(status, 'inicio')}" title="Start">
                    <span class="dot-label">Start</span>
                    <span class="dot-time">${order.tiempo_trabajando_en_ella || order.tiempo_revision || '02:15:30'}</span>
                  </div>
                  <div class="progress-dot ${getProgressStageClass(status, 'diseño')}" title="In Design">
                    <span class="dot-label">In Design</span>
                    <span class="dot-time">${order.tiempo_revision || '01:45:20'}</span>
                  </div>
                  <div class="progress-dot ${getProgressStageClass(status, 'produccion')}" title="In Production">
                    <span class="dot-label">In Production</span>
                    <span class="dot-time">${order.tiempo_trabajando_en_ella || '03:20:45'}</span>
                  </div>
                  <div class="progress-dot ${getProgressStageClass(status, 'corte')}" title="In Cutting">
                    <span class="dot-label">In Cutting</span>
                    <span class="dot-time">${order.tiempo_cambios || '00:30:15'}</span>
                  </div>
                  <div class="progress-dot ${getProgressStageClass(status, 'pintura')}" title="In Painting">
                    <span class="dot-label">In Painting</span>
                    <span class="dot-time">${order.tiempo_aprobada || '01:10:00'}</span>
                  </div>
                  <div class="progress-dot ${getProgressStageClass(status, 'salida')}" title="Exit">
                    <span class="dot-label">Exit</span>
                    <span class="dot-time">${order.tiempo_en_espera_de_aprobacion || '00:00:00'}</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="list-item progress-cell" data-label="Progreso:">
            <div class="progress-container">
              <div class="progress-bar">
                <div class="progress-fill" style="width: ${displayProgress}%"></div>
              </div>
              <span class="progress-text">${displayProgress}%</span>
            </div>
          </div>
          <div class="list-item order-money-cell">
            <div class="money-invested">
              <span class="money-usd">$${price.usd} USD</span>
              <span class="money-mxn">$${price.mxn} MXN</span>
            </div>
          </div>
        `;
      }

      // Crear sección de comentarios estilo Facebook
      const commentsSection = document.createElement('div');
      commentsSection.className = 'order-comments-section';
      commentsSection.id = `comments-${order.id}`;
      
      const comments = order.comments || [];
      const commentsList = document.createElement('div');
      commentsList.className = 'order-comments-list';
      
      if (comments.length > 0) {
        comments.forEach(comment => {
          const commentEl = createCommentElementInline(comment);
          commentsList.appendChild(commentEl);
        });
      } else {
        commentsList.innerHTML = '<div class="no-comments-inline">No comments yet. Be the first to comment.</div>';
      }
      
      const commentInputWrapper = document.createElement('div');
      commentInputWrapper.className = 'order-comment-input-wrapper';
      commentInputWrapper.innerHTML = `
        <div class="comment-input-avatar">
          <i class="fas fa-user"></i>
        </div>
        <input type="text" class="order-comment-input" placeholder="Write a comment..." data-order-id="${order.id}">
        <button class="btn-comment-send-inline" data-order-id="${order.id}">
          <i class="fas fa-paper-plane"></i>
        </button>
      `;
      
      commentsSection.appendChild(commentsList);
      commentsSection.appendChild(commentInputWrapper);
      
      // Si hay comentarios, expandir automáticamente
      if (comments.length > 0) {
        commentsSection.classList.add('expanded');
      }
      
      // Agregar fila y comentarios al contenedor
      container.appendChild(row);
      container.appendChild(commentsSection);
      
      // Event listeners (solo si los botones existen)
      const commentBtn = row.querySelector('.btn-comment-order');
      const editBtn = row.querySelector('.btn-edit-order');
      const deleteBtn = row.querySelector('.btn-delete-order');
      
      if (commentBtn) {
        commentBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          commentsSection.classList.toggle('expanded');
        });
      }

      if (editBtn) {
        editBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          editOrder(order.id);
        });
      }

      if (deleteBtn) {
        deleteBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          deleteOrder(order.id);
        });
      }
      
      // Enviar comentario
      commentInputWrapper.querySelector('.order-comment-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          sendCommentInline(order.id);
        }
      });
      
      commentInputWrapper.querySelector('.btn-comment-send-inline').addEventListener('click', function() {
        sendCommentInline(order.id);
      });

      return container;
    }

    function updateOrderStatus(orderId, newStatus) {
      const order = orders.find(o => o.id === orderId);
      if (order && order.status !== newStatus) {
        const oldStatus = order.status;
        order.status = newStatus;
        localStorage.setItem('productionOrders', JSON.stringify(orders));
        
        // Registrar actividad
        const username = localStorage.getItem('username') || 'Usuario';
        if (window.logActivity) {
          const statusLabels = {
            'pending': 'Pendiente',
            'design': 'En Diseño',
            'production': 'En Producción',
            'review': 'En Revisión',
            'completed': 'Completado'
          };
          window.logActivity('task_updated', `<strong>${username}</strong> changed the status of order "${order.orderNumber}" to ${statusLabels[newStatus]}`);
        }
        
        renderOrders();
      }
    }

    function openOrderModal() {
      const modal = document.getElementById('orderModal');
      const form = document.getElementById('orderForm');
      
      editingOrderId = null;
      form.reset();
      document.getElementById('orderId').value = '';
      document.getElementById('modalTitle').textContent = 'New Production Order';
      document.getElementById('orderStatus').value = 'pending';
      document.getElementById('orderPriority').value = 'medium';
      document.getElementById('orderProgress').value = '0';

      modal.style.display = 'flex';
    }

    function closeOrderModal() {
      document.getElementById('orderModal').style.display = 'none';
      editingOrderId = null;
    }

    function editOrder(orderId) {
      const order = orders.find(o => o.id === orderId);
      if (!order) return;

      editingOrderId = orderId;
      document.getElementById('orderId').value = order.id;
      document.getElementById('orderNumber').value = order.orderNumber;
      document.getElementById('orderClient').value = order.client;
      document.getElementById('orderDescription').value = order.description || '';
      document.getElementById('orderPriority').value = order.priority;
      document.getElementById('orderStatus').value = order.status;
      document.getElementById('orderDueDate').value = order.dueDate || '';
      document.getElementById('orderAssignee').value = order.assignee || '';
      document.getElementById('orderProgress').value = order.progress || 0;
      document.getElementById('modalTitle').textContent = 'Edit Production Order';

      document.getElementById('orderModal').style.display = 'flex';
    }

    function saveOrder(e) {
      e.preventDefault();
      
      const orderData = {
        id: editingOrderId || Date.now().toString(),
        orderNumber: document.getElementById('orderNumber').value,
        client: document.getElementById('orderClient').value,
        description: document.getElementById('orderDescription').value,
        priority: document.getElementById('orderPriority').value,
        status: document.getElementById('orderStatus').value,
        dueDate: document.getElementById('orderDueDate').value || null,
        assignee: document.getElementById('orderAssignee').value || null,
        progress: parseInt(document.getElementById('orderProgress').value) || 0,
        comments: editingOrderId ? orders.find(o => o.id === editingOrderId)?.comments || [] : [],
        createdAt: editingOrderId ? orders.find(o => o.id === editingOrderId)?.createdAt || new Date().toISOString() : new Date().toISOString()
      };

      const username = localStorage.getItem('username') || 'Usuario';

      if (editingOrderId) {
        const index = orders.findIndex(o => o.id === editingOrderId);
        if (index !== -1) {
          orders[index] = orderData;
          if (window.logActivity) {
            window.logActivity('task_updated', `<strong>${username}</strong> updated order "${orderData.orderNumber}"`);
          }
        }
      } else {
        orders.push(orderData);
        if (window.logActivity) {
          window.logActivity('task_created', `<strong>${username}</strong> created production order "${orderData.orderNumber}"`);
        }
      }

      localStorage.setItem('productionOrders', JSON.stringify(orders));
      renderOrders();
      closeOrderModal();
    }

    function deleteOrder(orderId) {
      if (confirm('Are you sure you want to delete this order?')) {
        const order = orders.find(o => o.id === orderId);
        const orderNumber = order ? order.orderNumber : 'una orden';
        orders = orders.filter(o => o.id !== orderId);
        localStorage.setItem('productionOrders', JSON.stringify(orders));
        
        // Registrar actividad
        const username = localStorage.getItem('username') || 'Usuario';
        if (window.logActivity) {
          window.logActivity('task_deleted', `<strong>${username}</strong> deleted order "${orderNumber}"`);
        }
        
        renderOrders();
      }
    }

    // Funciones de comentarios
    function openCommentsModal(orderId) {
      const order = orders.find(o => o.id === orderId);
      if (!order) return;

      currentCommentsOrderId = orderId;
      document.getElementById('commentsModalTitle').textContent = `Comments - ${order.orderNumber}`;
      loadComments(orderId);
      document.getElementById('commentsModal').style.display = 'flex';
      document.getElementById('commentInput').focus();
    }

    function closeCommentsModal() {
      document.getElementById('commentsModal').style.display = 'none';
      currentCommentsOrderId = null;
      document.getElementById('commentInput').value = '';
    }

    function loadComments(orderId) {
      const order = orders.find(o => o.id === orderId);
      if (!order) return;

      const comments = order.comments || [];
      const commentsList = document.getElementById('commentsList');
      commentsList.innerHTML = '';

      if (comments.length === 0) {
        commentsList.innerHTML = '<div class="no-comments"><i class="fas fa-comments"></i><p>No comments yet. Be the first to comment.</p></div>';
        return;
      }

      comments.forEach(comment => {
        const commentEl = createCommentElement(comment);
        commentsList.appendChild(commentEl);
      });

      // Scroll al final
      commentsList.scrollTop = commentsList.scrollHeight;
    }

    function createCommentElement(comment) {
      const commentDiv = document.createElement('div');
      commentDiv.className = 'comment-item';

      const date = new Date(comment.timestamp).toLocaleDateString('es-ES', {
        day: 'numeric',
        month: 'short',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });

      commentDiv.innerHTML = `
        <div class="comment-header">
          <div class="comment-author">
            <div class="comment-avatar-small">
              <i class="fas fa-user"></i>
            </div>
            <div class="comment-author-info">
              <strong>${comment.author || 'Usuario'}</strong>
              <span class="comment-date">${date}</span>
            </div>
          </div>
        </div>
        <div class="comment-content">
          <p>${comment.text}</p>
        </div>
      `;

      return commentDiv;
    }

    function createCommentElementInline(comment) {
      const commentDiv = document.createElement('div');
      commentDiv.className = 'order-comment-item';

      const date = new Date(comment.timestamp).toLocaleDateString('es-ES', {
        day: 'numeric',
        month: 'short',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });

      commentDiv.innerHTML = `
        <div class="comment-avatar-inline">
          <i class="fas fa-user"></i>
        </div>
        <div class="comment-content-inline">
          <div class="comment-header-inline">
            <strong class="comment-author-inline">${comment.author || 'Usuario'}</strong>
            <span class="comment-date-inline">${date}</span>
          </div>
          <div class="comment-text-inline">
            ${comment.text}
          </div>
        </div>
      `;

      return commentDiv;
    }

    function sendCommentInline(orderId) {
      const commentInput = document.querySelector(`.order-comment-input[data-order-id="${orderId}"]`);
      if (!commentInput) return;

      const commentText = commentInput.value.trim();
      if (commentText === '') return;

      const order = orders.find(o => o.id === orderId);
      if (!order) return;

      if (!order.comments) {
        order.comments = [];
      }

      const username = localStorage.getItem('username') || 'Usuario';

      const newComment = {
        id: Date.now().toString(),
        text: commentText,
        author: username,
        timestamp: new Date().toISOString()
      };

      order.comments.push(newComment);
      localStorage.setItem('productionOrders', JSON.stringify(orders));
      orders = JSON.parse(localStorage.getItem('productionOrders') || '[]');

      // Registrar actividad
      if (window.logActivity) {
        window.logActivity('comment_added', `<strong>${username}</strong> comentó en la orden "${order.orderNumber}"`);
      }

      commentInput.value = '';
      
      // Actualizar la sección de comentarios
      const commentsSection = document.getElementById(`comments-${orderId}`);
      if (commentsSection) {
        const commentsList = commentsSection.querySelector('.order-comments-list');
        const commentEl = createCommentElementInline(newComment);
        if (commentsList.querySelector('.no-comments-inline')) {
          commentsList.innerHTML = '';
        }
        commentsList.appendChild(commentEl);
        commentsSection.classList.add('expanded');
        commentsList.scrollTop = commentsList.scrollHeight;
      }
      
      renderOrders();
    }

    function sendComment() {
      if (!currentCommentsOrderId) return;

      const commentInput = document.getElementById('commentInput');
      const commentText = commentInput.value.trim();

      if (commentText === '') return;

      const order = orders.find(o => o.id === currentCommentsOrderId);
      if (!order) return;

      if (!order.comments) {
        order.comments = [];
      }

      const username = localStorage.getItem('username') || 'Usuario';

      const newComment = {
        id: Date.now().toString(),
        text: commentText,
        author: username,
        timestamp: new Date().toISOString()
      };

      order.comments.push(newComment);
      localStorage.setItem('productionOrders', JSON.stringify(orders));
      orders = JSON.parse(localStorage.getItem('productionOrders') || '[]');

      // Registrar actividad
      if (window.logActivity) {
        window.logActivity('comment_added', `<strong>${username}</strong> comentó en la orden "${order.orderNumber}"`);
      }

      commentInput.value = '';
      loadComments(currentCommentsOrderId);
      renderOrders();
    }

    // Funcionalidad del chatbot LISA
    const chatbotButton = document.getElementById('chatbotButton');

    // Mostrar mensaje de no disponible al hacer clic
    chatbotButton.addEventListener('click', () => {
      // Crear y mostrar notificación
      showChatbotNotification('LISA no está disponible en este momento. Por favor, intenta más tarde.');
    });

    function showChatbotNotification(message) {
      // Crear elemento de notificación
      const notification = document.createElement('div');
      notification.className = 'chatbot-notification';
      notification.innerHTML = `
        <div class="chatbot-notification-content">
          <div class="chatbot-notification-icon">
            <i class="fas fa-robot"></i>
          </div>
          <div class="chatbot-notification-text">
            <strong>LISA</strong>
            <p>${message}</p>
          </div>
          <button class="chatbot-notification-close">
            <i class="fas fa-times"></i>
          </button>
        </div>
      `;

      // Agregar al body
      document.body.appendChild(notification);

      // Mostrar con animación
      setTimeout(() => {
        notification.classList.add('show');
      }, 10);

      // Cerrar al hacer clic en el botón de cerrar
      const closeBtn = notification.querySelector('.chatbot-notification-close');
      closeBtn.addEventListener('click', () => {
        notification.classList.remove('show');
        setTimeout(() => {
          notification.remove();
        }, 300);
      });

      // Cerrar automáticamente después de 5 segundos
      setTimeout(() => {
        if (notification.parentNode) {
          notification.classList.remove('show');
          setTimeout(() => {
            notification.remove();
          }, 300);
        }
      }, 5000);
    }
  </script>
</body>
</html>
