  <script>
    // Variables globales
    let currentDate = new Date();
    let events = []; // Ahora se cargará desde la base de datos
    let selectedDate = null;
    let editingEventId = null; // Para saber si estamos editando un evento

    // Inicialización
    document.addEventListener('DOMContentLoaded', function() {
        initializeCalendar();
        loadEventsFromDatabase();
        setupEventListeners();
    });

    function initializeCalendar() 
    {
      updateCalendarHeader();
      renderMonthlyCalendar();
      renderYearlyCalendar();
    }

    function updateCalendarHeader() 
    {
      const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
      document.getElementById('currentMonth').textContent = `${monthNames[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
    }

    function renderMonthlyCalendar() 
    {
      const grid = document.getElementById('calendarGrid');
      grid.innerHTML = '';

      const firstDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
      const lastDay = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0);
      const startDate = new Date(firstDay);
      // Aqui es donde se ajusta para que la semana empiece en lunes (1) en lugar de domingo (0)
      const dayOfWeek = firstDay.getDay();
      const mondayOffset = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
      startDate.setDate(startDate.getDate() - mondayOffset);

      for (let i = 0; i < 42; i++) 
      {
        const day = new Date(startDate);
        day.setDate(startDate.getDate() + i);
        const dayElement = document.createElement('div');
        dayElement.className = 'calendar-day';
        dayElement.textContent = day.getDate();

        if (isToday(day)) 
        { //Marcar el día actual
          dayElement.classList.add('today');
        }
        if (day.getMonth() !== currentDate.getMonth()) 
        {
          dayElement.classList.add('other-month');
        }
        // Marcar días con eventos y mostrar cantidad
        const eventCount = getEventCount(day);
        if (eventCount > 0) 
        {
          dayElement.classList.add('has-event');
          if (eventCount >= 3) 
          {
            dayElement.classList.add('has-many-events');
          }
          if (eventCount > 1) 
          {
            const eventBadge = document.createElement('div');
            eventBadge.className = 'event-count';
            eventBadge.textContent = eventCount;
            dayElement.appendChild(eventBadge);
          }
        }

        // Marcar días con todos los eventos terminados
        if (areAllEventsCompleted(day)) 
        {
          dayElement.classList.add('all-events-completed');
        }

        // Evento de clic
        dayElement.addEventListener('click', () => 
        {
          selectDate(day);
        });

        grid.appendChild(dayElement);
      }
    }

    function renderYearlyCalendar() 
    {
      const grid = document.getElementById('yearlyGrid');
      grid.innerHTML = '';

      const monthNames = [ 'Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];

      for (let month = 0; month < 12; month++) 
      {
        const monthCard = document.createElement('div');
        monthCard.className = 'month-card';
        
        if (month === currentDate.getMonth() && currentDate.getFullYear() === new Date().getFullYear()) 
        {
          monthCard.classList.add('current');
        }

        const monthName = document.createElement('div');
        monthName.className = 'month-name';
        monthName.textContent = monthNames[month];

        const monthEvents = document.createElement('div');
        monthEvents.className = 'month-events';
        const monthEventCount = getMonthEventCount(month);
        monthEvents.textContent = `${monthEventCount} eventos`;

        monthCard.appendChild(monthName);
        monthCard.appendChild(monthEvents);

        monthCard.addEventListener('click', () => 
        {
          currentDate = new Date(currentDate.getFullYear(), month, 1);
          updateCalendarHeader();
          renderMonthlyCalendar();
          document.getElementById('monthlyView').click();
        });

        grid.appendChild(monthCard);
      }
    }

    function isToday(date) 
    {
      const today = new Date();
      return date.getDate() === today.getDate() && date.getMonth() === today.getMonth() && date.getFullYear() === today.getFullYear();
    }

    function getEventCount(date) 
    {
      return events.filter(event => 
      {
        const eventDate = new Date(event.fecha_evento);
        const compareDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        return eventDate.getTime() === compareDate.getTime();
      }).length;
    }

    function hasEvents(date) 
    {
      return getEventCount(date) > 0;
    }

    function areAllEventsCompleted(date) 
    {
      const dayEvents = events.filter(event => 
      {
        const eventDate = new Date(event.fecha_evento);
        const compareDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        return eventDate.getTime() === compareDate.getTime();
      });

      if (dayEvents.length === 0) 
      {
        return false; //No hay eventos
      }
      return dayEvents.every(event => event.completado);
    }

    function getMonthEventCount(month) 
    {
      return events.filter(event => 
      {
        const eventDate = new Date(event.fecha_evento);
        return eventDate.getMonth() === month && 
               eventDate.getFullYear() === currentDate.getFullYear();
      }).length;
    }

    function selectDate(date) 
    {
      selectedDate = date;
      loadEvents();
      
      // Actualizar selección visual
      document.querySelectorAll('.calendar-day').forEach(day => 
      {
        day.classList.remove('selected');
      });
      
      const dayElements = document.querySelectorAll('.calendar-day');
      const firstDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
      const startDate = new Date(firstDay);
      const dayOfWeek = firstDay.getDay();       // Ajustar para que la semana empiece en lunes (1) en lugar de domingo (0)
      const mondayOffset = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
      startDate.setDate(startDate.getDate() - mondayOffset);
      
      for (let i = 0; i < dayElements.length; i++) 
      {
        const day = new Date(startDate);
        day.setDate(startDate.getDate() + i);       
        if (day.getDate() === date.getDate() &&  day.getMonth() === date.getMonth() &&  day.getFullYear() === date.getFullYear()) 
        {
          dayElements[i].classList.add('selected'); break;
        }
      }
    }

    // Función para cargar eventos desde la base de datos
    async function loadEventsFromDatabase() 
    {
        try 
        {
            const response = await fetch('/api/calendario/eventos');
            if (response.ok) 
            {
                events = await response.json();
                renderMonthlyCalendar();
                renderYearlyCalendar();
                if (selectedDate) 
                {
                    loadEvents();
                }
            } else 
            {
                console.error('Error al cargar eventos:', response.statusText);
            }
        } catch (error) 
        {
            console.error('Error al cargar eventos:', error);
        }
    }

    // Función para agregar evento a la base de datos
    async function addEventToDatabase(eventData) 
    {
        try 
        {
            const response = await fetch('/api/calendario/eventos', 
            {
                method: 'POST',
                headers: 
                {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(eventData)
            });

            if (response.ok) 
            {
                const result = await response.json();
                await loadEventsFromDatabase(); // Recargar eventos
                return result.evento;
            } else 
            {
                const error = await response.json();
                console.error('Error al agregar evento:', error);
                alert('Error al agregar evento: ' + error.message);
                return null;
            }
        } catch (error) 
        {
            console.error('Error al agregar evento:', error);
            alert('Error al agregar evento');
            return null;
        }
    }

    // Función para actualizar evento en la base de datos
    async function updateEventInDatabase(eventId, eventData) 
    {
        try 
        {
            const response = await fetch(`/api/calendario/eventos/${eventId}`, 
            {
                method: 'PUT',
                headers: 
                {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(eventData)
            });

            if (response.ok) 
            {
                const result = await response.json();
                await loadEventsFromDatabase(); // Recargar eventos
                return result.evento;
            } else 
            {
                const error = await response.json();
                console.error('Error al actualizar evento:', error);
                alert('Error al actualizar evento: ' + error.message);
                return null;
            }
        } catch (error) 
        {
            console.error('Error al actualizar evento:', error);
            alert('Error al actualizar evento');
            return null;
        }
    }

    // Función para marcar evento como completado
    async function completeEventInDatabase(eventId, completado) 
    {
        try 
        {
            const response = await fetch(`/api/calendario/eventos/${eventId}/completar`, 
            {
                method: 'PUT',
                headers: 
                {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ completado })
            });

            if (response.ok) 
            {
                const result = await response.json();
                await loadEventsFromDatabase(); // Recargar eventos
                return result.evento;
            } else 
            {
                const error = await response.json();
                console.error('Error al actualizar evento:', error);
                alert('Error al actualizar evento: ' + error.message);
                return null;
            }
        } catch (error) 
        {
            console.error('Error al actualizar evento:', error);
            alert('Error al actualizar evento');
            return null;
        }
    }

    // Función para eliminar evento de la base de datos
    async function deleteEventFromDatabase(eventId) 
    {
        try 
        {
            const response = await fetch(`/api/calendario/eventos/${eventId}`, 
            {
                method: 'DELETE'
            });

            if (response.ok) {
                const result = await response.json();
                await loadEventsFromDatabase(); // Recargar eventos
                return true;
            } else 
            {
                const error = await response.json();
                console.error('Error al eliminar evento:', error);
                alert('Error al eliminar evento: ' + error.message);
                return false;
            }
        } catch (error) 
        {
            console.error('Error al eliminar evento:', error);
            alert('Error al eliminar evento');
            return false;
        }
    }

    // Modificar la función loadEvents
    function loadEvents() 
    {
        const eventsList = document.getElementById('eventsList');
        eventsList.innerHTML = '';

        if (!selectedDate) 
        {
            eventsList.innerHTML = '<p>Selecciona una fecha para ver los eventos</p>';
            return;
        }

        const dayEvents = events.filter(event => {
            const eventDate = new Date(event.fecha_evento);
            const compareDate = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), selectedDate.getDate());
            return eventDate.getTime() === compareDate.getTime();
        });

        if (dayEvents.length === 0) {
            eventsList.innerHTML = '<p>No hay eventos para esta fecha</p>';
            return;
        }

        // escape helper to avoid rendering user-supplied HTML
        function escapeHTML(str) {
          if (!str && str !== '') return '';
          return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;')
          .replace(/\//g, '&#x2F;');
        }

        dayEvents.forEach(event => {
          const eventElement = document.createElement('div');
          eventElement.className = 'event-item';

          const infoDiv = document.createElement('div');
          infoDiv.className = 'event-info' + (event.completado ? ' completed-event' : '');

          const titleDiv = document.createElement('div');
          titleDiv.className = 'event-title';
          titleDiv.textContent = escapeHTML(event.titulo || '');

          const dateDiv = document.createElement('div');
          dateDiv.className = 'event-date';
          dateDiv.textContent = formatDate(selectedDate);

          infoDiv.appendChild(titleDiv);
          infoDiv.appendChild(dateDiv);

          if (event.descripcion) {
            const descDiv = document.createElement('div');
            descDiv.className = 'event-description';
            descDiv.textContent = escapeHTML(event.descripcion);
            infoDiv.appendChild(descDiv);
          }

          const actionsDiv = document.createElement('div');
          actionsDiv.className = 'event-actions';

          if (!event.completado) {
            const completeBtn = document.createElement('button');
            completeBtn.className = 'event-btn event-btn-complete';
            completeBtn.title = 'Marcar como terminado';
            completeBtn.innerHTML = '<i class="fas fa-check"></i>';
            completeBtn.addEventListener('click', () => completeEvent(event.id));
            actionsDiv.appendChild(completeBtn);
          } else {
            const completedSpan = document.createElement('span');
            completedSpan.className = 'completed-badge';
            completedSpan.innerHTML = '<i class="fas fa-check-circle"></i> Completado';
            actionsDiv.appendChild(completedSpan);
          }

          const editBtn = document.createElement('button');
          editBtn.className = 'event-btn';
          editBtn.innerHTML = '<i class="fas fa-edit"></i>';
          editBtn.addEventListener('click', () => editEvent(event.id));
          actionsDiv.appendChild(editBtn);

          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'event-btn';
          deleteBtn.innerHTML = '<i class="fas fa-trash"></i>';
          deleteBtn.addEventListener('click', () => deleteEvent(event.id));
          actionsDiv.appendChild(deleteBtn);

          eventElement.appendChild(infoDiv);
          eventElement.appendChild(actionsDiv);
          eventsList.appendChild(eventElement);
        });
    }

    function formatDate(date) 
    {
      const options = 
      { 
        weekday: 'long', year: 'numeric',  month: 'long', day: 'numeric' 
      };
      return date.toLocaleDateString('es-ES', options);
    }

    function setupEventListeners() 
    {
      // Navegación del calendario
      document.getElementById('prevMonth').addEventListener('click', () => 
      {
        currentDate.setMonth(currentDate.getMonth() - 1);
        updateCalendarHeader();
        renderMonthlyCalendar();
        renderYearlyCalendar();
      });

      document.getElementById('nextMonth').addEventListener('click', () => 
      {
        currentDate.setMonth(currentDate.getMonth() + 1);
        updateCalendarHeader();
        renderMonthlyCalendar();
        renderYearlyCalendar();
      });

      // Cambio de vista
      document.getElementById('monthlyView').addEventListener('click', () => 
      {
        document.getElementById('monthlyCalendar').style.display = 'block';
        document.getElementById('yearlyCalendar').style.display = 'none';
        document.getElementById('monthlyView').classList.add('active');
        document.getElementById('yearlyView').classList.remove('active');
      });

      document.getElementById('yearlyView').addEventListener('click', () => 
      {
        document.getElementById('monthlyCalendar').style.display = 'none';
        document.getElementById('yearlyCalendar').style.display = 'block';
        document.getElementById('yearlyView').classList.add('active');
        document.getElementById('monthlyView').classList.remove('active');
      });

      // Modal de eventos
      document.getElementById('addEventBtn').addEventListener('click', () => 
      {
        openEventModal('add');
        if (selectedDate) 
        {
          document.getElementById('eventDate').value = selectedDate.toISOString().split('T')[0];
        }
      });

      document.getElementById('closeModal').addEventListener('click', () => 
      {
        closeEventModal();
      });

      document.getElementById('cancelEvent').addEventListener('click', () => 
      {
        closeEventModal();
      });

      document.getElementById('eventForm').addEventListener('submit', (e) => 
      {
        e.preventDefault();
        if (editingEventId) 
        {
          updateEvent(editingEventId);
        } else 
        {
          addEvent();
        }
      });

      // Cerrar modal al hacer clic fuera
      window.addEventListener('click', (e) => 
      {
        const modal = document.getElementById('eventModal');
        if (e.target === modal) 
        {
          closeEventModal();
        }
      });
    }

    // Función para abrir el modal en modo agregar o editar
    function openEventModal(mode, eventId = null) 
    {
        editingEventId = eventId;
        
        if (mode === 'edit') 
        {
            document.getElementById('modalTitle').textContent = 'Editar Evento';
            document.getElementById('saveEventBtn').textContent = 'Actualizar Evento';
        } else 
        {
            document.getElementById('modalTitle').textContent = 'Agregar Evento';
            document.getElementById('saveEventBtn').textContent = 'Guardar Evento';
            document.getElementById('eventForm').reset();
        }
        document.getElementById('eventModal').style.display = 'block';
    }

    // Función para cerrar el modal
    function closeEventModal() 
    {
        document.getElementById('eventModal').style.display = 'none';
        editingEventId = null;
        document.getElementById('eventForm').reset();
    }

    // Modificar la función addEvent
    async function addEvent() 
    {
        const title = document.getElementById('eventTitle').value;
        const date = document.getElementById('eventDate').value;
        const description = document.getElementById('eventDescription').value;

        const eventData = 
        {
            titulo: title, fecha_evento: date, descripcion: description, usuario_creador: 'IT Admin', departamento: 'IT',prioridad: 'normal',color_evento: '#ffc107'
        };

        const newEvent = await addEventToDatabase(eventData);
        if (newEvent) 
        {
            closeEventModal();
        }
    }

    function editEvent(eventId) 
    {   
      // Convertir a número si es string
      const numericId = typeof eventId === 'string' ? parseInt(eventId) : eventId;
      const event = events.find(e => e.id === numericId);
      
      if (event) 
      {
        openEventModal('edit', numericId);
        document.getElementById('eventTitle').value = event.titulo;
        document.getElementById('eventDate').value = event.fecha_evento;
        document.getElementById('eventDescription').value = event.descripcion || '';
      } else 
      {
        console.error('No se encontró el evento con ID:', numericId);
        alert('Error: No se encontró el evento para editar');
      }
    }

    // Modificar la función updateEvent
    async function updateEvent(eventId) 
    {
        const title = document.getElementById('eventTitle').value;
        const date = document.getElementById('eventDate').value;
        const description = document.getElementById('eventDescription').value;

        const eventData = 
        {
            titulo: title, fecha_evento: date, descripcion: description, departamento: 'IT', prioridad: 'normal', color_evento: '#ffc107'
        };

        const updatedEvent = await updateEventInDatabase(eventId, eventData);
        if (updatedEvent) 
        {
            closeEventModal();
        }
    }

    // Modificar la función completeEvent
    async function completeEvent(eventId) 
    {
        const numericId = typeof eventId === 'string' ? parseInt(eventId) : eventId;
        if (confirm('¿Estás seguro de que quieres marcar este evento como terminado?')) 
        {
            await completeEventInDatabase(numericId, true);
        }
    }

    // Modificar la función deleteEvent
    async function deleteEvent(eventId) 
    {
        const numericId = typeof eventId === 'string' ? parseInt(eventId) : eventId;
        if (confirm('¿Estás seguro de que quieres eliminar este evento?')) 
        {
            await deleteEventFromDatabase(numericId);
        }
    }

    // Scripts existentes para la topbar
    document.addEventListener('DOMContentLoaded', function() 
    {
      setTimeout(() => 
      {
        document.querySelectorAll('.menu-item.has-submenu').forEach(menuItem => 
        {
          const submenu = menuItem.querySelector('.submenu');
          const arrow = menuItem.querySelector('.submenu-arrow');

          menuItem.addEventListener('click', function(e) 
          {
            if (e.target.closest('.submenu')) return;
            e.preventDefault();
            e.stopPropagation();

            document.querySelectorAll('.menu-item.has-submenu .submenu.active').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-item.has-submenu .submenu-arrow').forEach(a => a.style.transform = 'rotate(0deg)');

            if (submenu) 
            {
              submenu.classList.toggle('active');
              if (submenu.classList.contains('active')) 
              {
                arrow.style.transform = 'rotate(180deg)';
              } else 
              {
                arrow.style.transform = 'rotate(0deg)';
              }
            }
          });
        });

        document.addEventListener('click', function(e) 
        {
          if (!e.target.closest('.menu-item.has-submenu') && !e.target.closest('.submenu')) 
          {
            document.querySelectorAll('.menu-item.has-submenu .submenu.active').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-item.has-submenu .submenu-arrow').forEach(a => a.style.transform = 'rotate(0deg)');
          }
        });
      }, 1500);
    });

    document.querySelectorAll('.lisa-btn-cromatica').forEach(btn => 
    {
      btn.addEventListener('click', function() 
      {
        window.location.href = 'inicio.html';
      });
    });
  </script>
