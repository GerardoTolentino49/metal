document.addEventListener('DOMContentLoaded', function() {

    inicio: 'nuevo-inicio.html',

    qr: 'qr_inventario.html',
    boveda: 'boveda.html',

  document.querySelectorAll('.tab-switch-button[data-tab]').forEach(button => {

      const targetPage = tabRoutes[this.dataset.tab];

        return;
      }
      window.location.href = targetPage;
    });
  });
});

  <script>
    document.addEventListener('DOMContentLoaded', function() 
    {
      setTimeout(() => {
        document.querySelectorAll('.menu-item.has-submenu').forEach(menuItem => {
          const submenu = menuItem.querySelector('.submenu');
          const arrow = menuItem.querySelector('.submenu-arrow');

          menuItem.addEventListener('click', function(e) 
          {
            if (e.target.closest('.submenu')) return;
            e.preventDefault();
            e.stopPropagation();

            document.querySelectorAll('.menu-item.has-submenu .submenu.active').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-item.has-submenu .submenu-arrow').forEach(a => a.style.transform = 'rotate(0deg)');

            if (submenu) 
            {
              submenu.classList.toggle('active');
              if (submenu.classList.contains('active')) 
              {
                arrow.style.transform = 'rotate(180deg)';
              } else 
              {
                arrow.style.transform = 'rotate(0deg)';
              }
            }
          });
        });

        document.addEventListener('click', function(e) 
        {
          if (!e.target.closest('.menu-item.has-submenu') && !e.target.closest('.submenu')) 
          {
            document.querySelectorAll('.menu-item.has-submenu .submenu.active').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-item.has-submenu .submenu-arrow').forEach(a => a.style.transform = 'rotate(0deg)');
          }
        });
      }, 1500);
    });
  </script>
  <script>
    let ticketsChart = null;
    let departmentsChart = null;
    let currentDeptChartType = 'bar';
    let currentTicketsChartType = 'bar';

    function initThemeSwitch() 
    {
      const themeSwitch = document.getElementById('themeSwitch');
      const themeLabel = document.querySelector('.theme-switch-label');

      function updateChartsColors() 
      {
        const textColor = document.documentElement.getAttribute('data-theme') === 'dark' ? '#ffffff' : '#000000';
        if (ticketsChart) 
        {
          if (ticketsChart.options.scales?.x) ticketsChart.options.scales.x.ticks.color = textColor;
          if (ticketsChart.options.scales?.y) ticketsChart.options.scales.y.ticks.color = textColor;
          ticketsChart.options.plugins.legend.labels.color = textColor;
          ticketsChart.update();
        }
        if (departmentsChart) 
        {
          if (departmentsChart.options.scales?.x) departmentsChart.options.scales.x.ticks.color = textColor;
          if (departmentsChart.options.scales?.y) departmentsChart.options.scales.y.ticks.color = textColor;
          departmentsChart.options.plugins.legend.labels.color = textColor;
          departmentsChart.update();
        }
      }

      if (themeSwitch) 
      {
        themeSwitch.addEventListener('change', function() 
        {
          if (this.checked) 
          {
            document.documentElement.setAttribute('data-theme', 'light');
            localStorage.setItem('theme', 'light');
          } else 
          {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
          }
          updateChartsColors();
        });
      }
    }

    function generateYearButtons() {
      const yearCarousel = document.getElementById('yearCarousel');
      const firstYear = 2025;
      const lastYear = 2040;
      const currentYear = new Date().getFullYear();
      const years = [];
      for (let y = firstYear; y <= lastYear; y++) years.push(y);
      yearCarousel.innerHTML = years.map(year => `
        <button class="year-button" data-year="${year}">
          ${year}
        </button>
      `).join('');

      // Evento click a los botones
      yearCarousel.querySelectorAll('.year-button').forEach(button => {
        button.addEventListener('click', function() {
          yearCarousel.querySelectorAll('.year-button').forEach(btn => btn.classList.remove('active'));
          this.classList.add('active');
          loadTicketStats(this.dataset.year);
          loadDepartmentStats(this.dataset.year);
          loadUrgencyTimes(this.dataset.year);
        });
      });

      // Activar el botón del año actual por defecto
      const defaultYearButton = yearCarousel.querySelector(`[data-year="${currentYear}"]`);
      if (defaultYearButton) 
      {
        defaultYearButton.classList.add('active');
      }

      const prevButton = document.getElementById('prevYear');
      const nextButton = document.getElementById('nextYear');
      prevButton.addEventListener('click', () => {
        yearCarousel.scrollBy({ left: -200, behavior: 'smooth' });
      });
      nextButton.addEventListener('click', () => {
        yearCarousel.scrollBy({ left: 200, behavior: 'smooth' });
      });

      loadTicketStats(currentYear);
      loadDepartmentStats(currentYear);
      loadUrgencyTimes(currentYear);
    }

    window.addEventListener('load', function() {
      initThemeSwitch();
      generateYearButtons();
      currentTicketsChartType = 'bar';
      currentDeptChartType = 'bar';
      const mSel = document.getElementById('reportMonth');
      if (mSel) mSel.value = String(new Date().getMonth());
    });

    async function loadTicketStats(selectedYear) 
    {
      const response = await fetch('/api/tickets');
      if (!response.ok) return;
      const tickets = (await response.json())
        .filter(ticket => ticket.urgency === 'completed')
        .filter(ticket => new Date(ticket.timestamp).getFullYear() === parseInt(selectedYear));
      const months = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
      
      const resolvedTickets = new Array(12).fill(0);
      
      tickets.forEach(ticket => {
        const date = new Date(ticket.timestamp);
        const month = date.getMonth();
        resolvedTickets[month]++;
      });

      if (ticketsChart) 
      {
        ticketsChart.destroy();
      }

      const ctx = document.getElementById('ticketsChart').getContext('2d');
      ticketsChart = new Chart(ctx, {
        type: currentTicketsChartType,
        data: {
          labels: months,
          datasets: [{
            label: 'Tickets Terminados',
            data: resolvedTickets,
            backgroundColor: currentTicketsChartType === 'bar' ? '#43a047' : 'rgba(67, 160, 71, 0.2)', // Verde
            borderColor: '#43a047',
            borderWidth: 1,
            pointBackgroundColor: 'rgba(67, 160, 71, 1)',
            pointBorderColor: '#fff',
            pointHoverBackgroundColor: '#fff',
            pointHoverBorderColor: 'rgba(67, 160, 71, 1)'
          }]
        },
        options: currentTicketsChartType === 'bar'
          ? {
              responsive: true,
              maintainAspectRatio: false,
              scales: {
                y: {
                  beginAtZero: true,
                  ticks: {
                    stepSize: 1,
                    color: '#fff' // Cambia el color de los ticks a blanco
                  },
                  grid: {
                    color: getComputedStyle(document.documentElement).getPropertyValue('--border-color')
                  }
                },
                x: {
                  ticks: {
                    color: '#fff' // Cambia el color de los ticks a blanco
                  },
                  grid: {
                    color: getComputedStyle(document.documentElement).getPropertyValue('--border-color')
                  }
                }
              },
              plugins: {
                legend: {
                  labels: {
                    color: '#fff' // Cambia el color de la leyenda a blanco
                  }
                }
              }
            }
          : {
              responsive: true,
              plugins: {
                legend: {
                  labels: {
                    color: '#fff' // Cambia el color de la leyenda a blanco
                  }
                }
              },
              scales: {
                r: {
                  angleLines: { color: getComputedStyle(document.documentElement).getPropertyValue('--border-color') },
                  grid: { color: getComputedStyle(document.documentElement).getPropertyValue('--border-color') },
                  pointLabels: { color: '#fff' }, // Cambia el color de las etiquetas radiales a blanco
                  ticks: { display: false }
                }
              }
            }
      });

      const userCounts = {};
      tickets.forEach(ticket => {
        const user = ticket.name || 'Desconocido';
        userCounts[user] = (userCounts[user] || 0) + 1;
      });
      const sortedUsers = Object.entries(userCounts).sort((a, b) => b[1] - a[1]).slice(0, 5);
      const rankingDiv = document.getElementById('userRanking');
      if (rankingDiv) 
      {
        rankingDiv.innerHTML = sortedUsers.length === 0 ? 
          '<div style="text-align:center;color:#888;">No hay tickets terminados.</div>' :
          '<ul class="users-list">' +
            sortedUsers.map(([user, count], idx) => `
              <li class="user-item" data-username="${user}" style="cursor:pointer;">
                <div class="user-info">
                  <span class="user-rank">#${idx+1}</span>
                  <div class="user-details">
                    <span class="user-name">${user}</span>
                    <span class="user-department">${tickets.find(t => t.name === user)?.department || 'Departamento no especificado'}</span>
                  </div>
                </div>
                <span class="ticket-count">${count} tickets</span>
              </li>
            `).join('') +
          '</ul>';
      }
    }

    async function loadUrgencyTimes(selectedYear) {
      const response = await fetch('/api/tickets');
      if (!response.ok) return;
      
      const allTickets = await response.json();
      
      const tickets = allTickets
        .filter(ticket => ticket.urgency === 'completed' && ticket.time_end && ticket.last_urgency)
        .filter(ticket => new Date(ticket.timestamp).getFullYear() === parseInt(selectedYear))
        .filter(ticket => {
          const startTime = new Date(ticket.timestamp);
          const endTime = new Date(ticket.time_end);
          return endTime > startTime && !isNaN(endTime.getTime()) && !isNaN(startTime.getTime());
        });

      const urgencyData = {'Crítico': { tickets: [], totalTime: 0 }, 'Alto': { tickets: [], totalTime: 0 }, 'Medio': { tickets: [], totalTime: 0 }, 'Bajo': { tickets: [], totalTime: 0 }};

      // Mapeo de valores de urgencia de inglés a español
      const urgencyMapping = {'critical': 'Crítico', 'high': 'Alto', 'medium': 'Medio', 'low': 'Bajo'};

      tickets.forEach(ticket => {
        const startTime = new Date(ticket.timestamp);
        const endTime = new Date(ticket.time_end);
        const resolutionTime = (endTime - startTime) / (1000 * 60 * 60); // en horas
        
        const urgency = urgencyMapping[ticket.last_urgency] || ticket.last_urgency;
        
        if (urgencyData[urgency]) 
        {
          urgencyData[urgency].tickets.push(resolutionTime);
          urgencyData[urgency].totalTime += resolutionTime;
        }
      });

      const urgencyStats = {};
      let maxAverage = 0;

      Object.keys(urgencyData).forEach(urgency => {
        const tickets = urgencyData[urgency].tickets;
        if (tickets.length > 0) {
          const average = urgencyData[urgency].totalTime / tickets.length;
          urgencyStats[urgency] = {
            count: tickets.length,
            average: average
          };
          if (average > maxAverage) 
          {
            maxAverage = average;
          }
        } else 
        {
          urgencyStats[urgency] = 
          {
            count: 0,
            average: 0
          }
        }
      });

      // Mostrar en el DOM
      const urgencyTimesDiv = document.getElementById('urgencyTimes');
      if (urgencyTimesDiv) 
      {
        urgencyTimesDiv.innerHTML = Object.keys(urgencyStats).map(urgency => {
          const stats = urgencyStats[urgency];
          const percentage = maxAverage > 0 ? (stats.average / maxAverage) * 100 : 0;
          
          let urgencyClass = '';
          switch(urgency) 
          {
            case 'Crítico': urgencyClass = 'critical'; break;
            case 'Alto': urgencyClass = 'high'; break;
            case 'Medio': urgencyClass = 'medium'; break;
            case 'Bajo': urgencyClass = 'low'; break;
          }

          // Mostrar información diferente según la cantidad de tickets
          let timeDisplay = '';
          let infoText = '';
          
          if (stats.count === 0) 
          {
            timeDisplay = 'Sin datos';
            infoText = '';
          } else if (stats.count === 1) 
          {
            timeDisplay = `${stats.average.toFixed(1)} horas`;
            infoText = 'Tiempo de resolución (1 ticket)';
          } else 
          {
            timeDisplay = `${stats.average.toFixed(1)} horas promedio`;

    async function showUrgencyTicketsModalForUrgency(urgency, selectedYear) 
    {
      try 
      {
        const response = await fetch('/api/tickets');
        if (!response.ok) return;
        
        const allTickets = await response.json();
        const urgencyMapping = {'Crítico': 'critical', 'Alto': 'high', 'Medio': 'medium', 'Bajo': 'low'};
        
        const urgencyInEnglish = urgencyMapping[urgency] || urgency.toLowerCase();
        const urgencyTickets = allTickets.filter(ticket => {
          const ticketYear = new Date(ticket.timestamp).getFullYear();
          const ticketUrgency = ticket.last_urgency || ticket.urgency;
          return ticketUrgency === urgencyInEnglish && ticketYear === parseInt(selectedYear) && ticket.urgency === 'completed' && ticket.time_end;
        });
        
        // Calcular estadísticas
        let totalTime = 0;
        urgencyTickets.forEach(ticket => {
          const startTime = new Date(ticket.timestamp);
          const endTime = new Date(ticket.time_end);
          const resolutionTime = (endTime - startTime) / (1000 * 60 * 60); // en horas
          totalTime += resolutionTime;
        });
        
        const stats = {
          count: urgencyTickets.length,
          average: urgencyTickets.length > 0 ? totalTime / urgencyTickets.length : 0
        };
        
        showUrgencyTicketsModal(urgency, urgencyTickets, stats);
      } catch (error) 
      {
        console.error('Error al cargar tickets por urgencia:', error);
      }
    }

  <script>
    function getActiveYear() //Informe en PDF
    {
      const active = document.querySelector('.year-button.active');
      return active ? parseInt(active.dataset.year) : new Date().getFullYear();
    }

    function formatNumber(num) 
    {
      return new Intl.NumberFormat('es-MX', { maximumFractionDigits: 2 }).format(num);
    }

    async function computeMonthlyStats(year, monthIndex) 
    {
      const response = await fetch('/api/tickets');
      if (!response.ok) return null;
      const all = await response.json();

      const sameMonth = all.filter(t => {
        const d = new Date(t.timestamp);
        return d.getFullYear() === year && d.getMonth() === monthIndex && t.urgency === 'completed';
      });

      const departments = [ 'Recursos Humanos', 'Gerencia', 'Planeación', 'Contabilidad', 'Producción P1', 'Producción BA', 'QC', 'Diseño', 'IT'];
      const departmentCounts = Object.fromEntries(departments.map(d => [d, 0]));
      const userCounts = {};

      sameMonth.forEach(t => {
        if (t.department && departmentCounts.hasOwnProperty(t.department)) departmentCounts[t.department]++;
        const user = t.name || 'Desconocido';
        userCounts[user] = (userCounts[user] || 0) + 1;
      });

      const urgencyMap = { critical: 'Crítico', high: 'Alto', medium: 'Medio', low: 'Bajo' };
      const urgencyAgg = { 'Crítico': [], 'Alto': [], 'Medio': [], 'Bajo': [] };

      sameMonth.forEach(t => {
        if (!t.time_end) return;
        const startTime = new Date(t.timestamp);
        const endTime = new Date(t.time_end);
        if (!(endTime > startTime)) return;
        const hours = (endTime - startTime) / (1000 * 60 * 60);
        const u = urgencyMap[t.last_urgency] || urgencyMap[t.urgency] || t.last_urgency || t.urgency;
        if (urgencyAgg[u]) urgencyAgg[u].push(hours);
      });

      const urgencyStats = Object.fromEntries(Object.entries(urgencyAgg).map(([k, arr]) => {
        const total = arr.reduce((a, b) => a + b, 0);
        const avg = arr.length ? total / arr.length : 0;
        return [k, { count: arr.length, average: avg }];
      }));

      const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
      const perDay = new Array(daysInMonth).fill(0);
      sameMonth.forEach(t => {
        const d = new Date(t.timestamp);
        perDay[d.getDate() - 1]++;
      });

      const totalCompleted = sameMonth.length;
      const topUsers = Object.entries(userCounts).sort((a, b) => b[1] - a[1]).slice(0, 5);

      return { totalCompleted, departmentCounts, topUsers, urgencyStats, perDay };
    }

    async function renderMiniChartToDataUrl(labels, data, title) 
    {
      return new Promise(resolve => {
        const canvas = document.createElement('canvas');
        canvas.width = 900; // mayor resolución para PDF
        canvas.height = 400;
        canvas.style.position = 'fixed';
        canvas.style.left = '-20000px';
        document.body.appendChild(canvas);
        const ctx = canvas.getContext('2d');
        const chart = new Chart(ctx, {
          type: 'bar',
          data: { labels, datasets: [{ label: title, data, backgroundColor: '#43a047', borderColor: '#1b5e20', borderWidth: 1 }] },
          options: { responsive: false, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
        });
        setTimeout(() => {
          const url = canvas.toDataURL('image/png');
          chart.destroy();
          canvas.remove();
          resolve(url);
        }, 150);
      });
    }

    async function generateMonthlyReportPDF() 
    {
      const { jsPDF } = window.jspdf;
      const monthIndex = parseInt(document.getElementById('reportMonth').value);
      const year = getActiveYear();

      const stats = await computeMonthlyStats(year, monthIndex);
      if (!stats) return;

      const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

      const deptLabels = Object.keys(stats.departmentCounts);
      const deptData = deptLabels.map(k => stats.departmentCounts[k]);
      const deptUrl = await renderMiniChartToDataUrl(deptLabels, deptData, 'Tickets por Departamento');

      const days = Array.from({ length: stats.perDay.length }, (_, i) => String(i + 1));
      const perDayUrl = await renderMiniChartToDataUrl(days, stats.perDay, 'Tickets Terminados por Día');

      const doc = new jsPDF({ unit: 'pt', format: 'a4' });
      let y = 40;
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(18);
      doc.text(`Informe mensual de tickets • ${monthNames[monthIndex]} ${year}`, 40, y);
      y += 22;
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(11);
      doc.text(`Generado: ${new Date().toLocaleString('es-MX')}`, 40, y);
      y += 20;
      doc.setLineWidth(0.5); doc.line(40, y, 555, y); y += 14;

      doc.setFont('helvetica', 'bold'); doc.text('Resumen', 40, y); y += 14; doc.setFont('helvetica', 'normal');
      doc.text(`Tickets completados: ${formatNumber(stats.totalCompleted)}`, 40, y); y += 14;

      doc.setFont('helvetica', 'bold'); doc.text('Tiempos de resolución por urgencia (promedio horas)', 40, y); y += 14; doc.setFont('helvetica', 'normal');
      Object.entries(stats.urgencyStats).forEach(([k, v]) => {
        doc.text(`${k}: ${formatNumber(v.average)} h • ${v.count} ticket(s)`, 50, y);
        y += 14;
      });
      y += 4; doc.setLineWidth(0.2); doc.line(40, y, 555, y); y += 10;

      doc.setFont('helvetica', 'bold'); doc.text('Usuarios con más tickets', 40, y); y += 14; doc.setFont('helvetica', 'normal');
      if (stats.topUsers.length === 0) 
      {
        doc.text('Sin datos', 50, y); y += 14;
      } else 
      {
        stats.topUsers.forEach(([u, c], i) => { doc.text(`#${i+1} ${u}: ${c}`, 50, y); y += 14; });
      }

      y += 8;
      const imgW = 515; const imgH = 230;
      doc.addImage(deptUrl, 'PNG', 40, y, imgW, imgH, undefined, 'FAST'); y += imgH + 14;
      doc.addImage(perDayUrl, 'PNG', 40, y, imgW, imgH, undefined, 'FAST'); y += imgH + 14;

      doc.save(`informe_tickets_${year}_${String(monthIndex+1).padStart(2,'0')}.pdf`);
    }

    document.getElementById('downloadMonthlyReportBtn').addEventListener('click', generateMonthlyReportPDF);
  </script>

  <script>
    function getContrastYIQ(hexcolor) //Contraste automatico para el topbar
    {
      hexcolor = hexcolor.replace('#', '');
      if (hexcolor.length === 3) {
        hexcolor = hexcolor[0]+hexcolor[0]+hexcolor[1]+hexcolor[1]+hexcolor[2]+hexcolor[2];
      }
      var r = parseInt(hexcolor.substr(0,2),16);
      var g = parseInt(hexcolor.substr(2,2),16);
      var b = parseInt(hexcolor.substr(4,2),16);
      var yiq = ((r*299)+(g*587)+(b*114))/1000;
      return (yiq >= 128) ? 'dark' : 'light';
    }

    function updateTopbarContrast() 
    {
      const topbar = document.querySelector('.topbar');
      if (!topbar) return;
      let bg = window.getComputedStyle(topbar).backgroundColor;
      function rgb2hex(rgb) 
      {
        if (!rgb) return '#fff';
        let result = rgb.match(/rgba?\((\d+), (\d+), (\d+)/);
        if (!result) return '#fff';
        return '#' +
          (parseInt(result[1]).toString(16).padStart(2, '0')) +
          (parseInt(result[2]).toString(16).padStart(2, '0')) +
          (parseInt(result[3]).toString(16).padStart(2, '0'));
      }
      let hex = rgb2hex(bg);
      let contrast = getContrastYIQ(hex);
      document.querySelectorAll('.menu-item, .submenu-item, .topbar-header h1, .lisa-btn-cromatica').forEach(el => {
        el.setAttribute('data-contrast', contrast);
      });
    }
    document.addEventListener('DOMContentLoaded', updateTopbarContrast);
    window.addEventListener('resize', updateTopbarContrast);
  </script>
