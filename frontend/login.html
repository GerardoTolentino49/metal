<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="styles/login.css">
  <link rel="icon" href="/favicon.png" type="image/png">  
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="user-info" id="userInfo"></div>
  
  <div class="login-wrapper">
    <div class="login-left">
      <div class="logo-container">
        <img src="/fotos/New-IMAGE.png" alt="Logo" class="login-logo">
      </div>
    </div>

    <div class="login-right">
      <div class="login-container">
        <div class="login-header">
          <h1>Metal ERP</h1>
          <p>v.3.0</p>
          <span class="powered-by">Powered by Phoenix Diseño y Manufactura</span>
        </div>
        <form class="login-form" id="loginForm">
          <div class="error-message" id="errorMessage" style="display: none;"></div>
          <div class="form-group">
            <label for="username">Usuario</label>
            <input type="text" id="username" name="username" placeholder="Usuario" required>
          </div>
          <div class="form-group">
            <label for="password">Contraseña</label>
            <div class="password-wrapper" style="position:relative;display:flex;align-items:center;">
              <input type="password" id="password" name="password" placeholder="Contraseña" required style="flex:1;padding-right:2.5rem;" />
              <button type="button" id="togglePassword" class="toggle-password" aria-label="Mostrar contraseña" style="position:absolute;right:0.5rem;background:none;border:none;cursor:pointer;font-size:1rem;color:#333;">
                <i class="fa fa-eye"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="login-button">Ingresar</button>
        </form>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-left">
        <div class="social-buttons" aria-label="Redes sociales">
          <a class="social-button facebook" href="https://www.facebook.com/p/Phoenix-Dise%C3%B1o-y-Manufactura-100075787393304/?locale=es_LA" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
            <svg viewBox="0 0 24 24" fill="currentColor" height="24" width="24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M13.135 22v-8.892h2.988l.447-3.466h-3.435V7.43c0-1.003.278-1.686 1.717-1.686H16.7V2.643C16.38 2.599 15.281 2.5 14.002 2.5c-2.67 0-4.497 1.63-4.497 4.621v2.521H6.5v3.466h3.005V22h3.63Z"></path>
            </svg>
          </a>

          <a class="social-button instagram" href="https://instagram.com" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
            <svg viewBox="0 0 24 24" fill="none" height="24" width="24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path clip-rule="evenodd" d="M3 8a5 5 0 0 1 5-5h8a5 5 0 0 1 5 5v8a5 5 0 0 1-5 5H8a5 5 0 0 1-5-5V8Zm5-3a3 3 0 0 0-3 3v8a3 3 0 0 0 3 3h8a3 3 0 0 0 3-3V8a3 3 0 0 0-3-3H8Zm7.597 2.214a1 1 0 0 1 1-1h.01a1 1 0 1 1 0 2h-.01a1 1 0 0 1-1-1ZM12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6Zm-5 3a5 5 0 1 1 10 0 5 5 0 0 1-10 0Z" fill-rule="evenodd" fill="currentColor"></path>
            </svg>

          <button class="social-button whatsapp" type="button" aria-label="WhatsApp">
            <svg viewBox="0 0 24 24" fill="none" height="24" width="24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path clip-rule="evenodd" d="M12 4a8 8 0 0 0-6.895 12.06l.569.718-.697 2.359 2.32-.648.379.243A8 8 0 1 0 12 4ZM2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10a9.96 9.96 0 0 1-5.016-1.347l-4.948 1.382 1.426-4.829-.006-.007-.033-.055A9.958 9.958 0 0 1 2 12Z" fill-rule="evenodd" fill="currentColor"></path>

          </button>

          <a href="https://pdmmetal.com" target="_blank" rel="noopener noreferrer" class="footer-brand-link" aria-label="PDMmetal">
            <img src="/fotos/New-IMAGE.png" alt="Logo Phoenix" class="footer-brand-logo">
          </a>
        </div>
      </div>
    </div>
  </footer>


  <script>
    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
      
      // Resaltar inputs en rojo
      usernameInput.style.borderColor = '#d93025';
      passwordInput.style.borderColor = '#d93025';
      
      // Agregar shake animation
      errorDiv.classList.add('shake');
      setTimeout(() => errorDiv.classList.remove('shake'), 500);
    }
    
    function hideError() {
      const errorDiv = document.getElementById('errorMessage');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      
      errorDiv.style.display = 'none';
      usernameInput.style.borderColor = '';
      passwordInput.style.borderColor = '';
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) 
    {
      e.preventDefault();
      hideError();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value; 
      try 
      {
        const response = await fetch('/api/auth/login', 
        {
          method: 'POST',
          headers: 
          {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });
        const data = await response.json();  
        if (response.ok) 
        {
          localStorage.setItem('isLoggedIn', 'true');
          if (data && data.token) {
            localStorage.setItem('sessionToken', data.token);
          }
            // usar datos devueltos por la API si están disponibles (soportar campos en español/inglés)
          const userObj = {
            name: (
              (data && data.user && (data.user.nombre_completo || data.user.name)) || data?.nombre_completo || data?.name || username).toString().trim(), 
              employeeNumber: ((data && data.user && (data.user.employeeNumber || data.user.employee_number || data.user.username)) || data?.employeeNumber || data?.employee_number || data?.username || username).toString().trim(),
              username: ((data && data.user && (data.user.username || data.user.employeeNumber)) || data?.username || data?.employeeNumber || username).toString().trim()
          };
          localStorage.setItem('loggedInUser', JSON.stringify(userObj));
          localStorage.setItem('username', userObj.employeeNumber || username);
          localStorage.setItem('userInfo', JSON.stringify(userObj)); // Para logeo-diseno.html
          console.log('login: response data ->', data);
          console.log('login: stored loggedInUser ->', userObj);
          console.log('login: stored username ->', localStorage.getItem('username'));
          window.location.href = 'nuevo-inicio.html';
        } else 
        {
          showError(data.error || 'Error al iniciar sesión. Verifica tus credenciales.');
        }
      } catch (error) 
      {
        showError('Error al conectar con el servidor. Intenta nuevamente.');
      }
    });

    function checkAuth() 
    {
      const isLoggedIn = localStorage.getItem('isLoggedIn');
      const username = localStorage.getItem('username');
      const userInfo = document.getElementById('userInfo');
      
      if (isLoggedIn === 'true' && username) 
      {
        userInfo.textContent = username;
        userInfo.classList.add('visible');
        const rol = localStorage.getItem('rol');
        const permissions = JSON.parse(localStorage.getItem('userPermissions') || '[]');
        
        if (rol === 'IT') 
        {
          window.location.href = 'nuevo-inicio.html';
        } else if (permissions.includes('tickets')) 
        {
          window.location.href = 'panel.html';
        } else if (permissions.includes('design')) 
        {
          window.location.href = 'design.html';
        } else 
        {
          window.location.href = 'nuevo-inicio.html';
        }
      }
    }

    function setRandomBackground() 
    {
      document.body.style.background = "url('fotos/w1_edited.jpg') no-repeat center top fixed";
      document.body.style.backgroundSize = 'cover';
    }
    function setupPasswordToggle() 
    {
      const toggle = document.getElementById('togglePassword');
      const pwd = document.getElementById('password');
      if (!toggle || !pwd) return;
      toggle.addEventListener('click', function() {
        const type = pwd.getAttribute('type') === 'password' ? 'text' : 'password';
        pwd.setAttribute('type', type);
        this.innerHTML = type === 'password' ? '<i class="fa fa-eye"></i>' : '<i class="fa fa-eye-slash"></i>';
        this.setAttribute('aria-label', type === 'password' ? 'Mostrar contraseña' : 'Ocultar contraseña');
      });
    }

    // Limpiar error cuando el usuario empiece a escribir
    document.getElementById('username').addEventListener('input', hideError);
    document.getElementById('password').addEventListener('input', hideError);

    document.addEventListener('DOMContentLoaded', function() 
    {
      setRandomBackground();
      checkAuth();
      setupPasswordToggle();
    });
  </script>
</body>
</html>
