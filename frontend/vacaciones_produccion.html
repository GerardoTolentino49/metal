<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario de Vacaciones - Producción</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/vacaciones_produccion.css">
</head>
<body>
    <div class="container">
        <div class="header">
        </div>

        <div class="calendar-controls">
            <div class="month-navigator">
                <button class="nav-btn" id="prevMonth">
                    <span>←</span> Mes Anterior
                </button>
                <div class="current-month" id="currentMonth">Enero 2025</div>
                <button class="nav-btn" id="nextMonth">
                    Mes Siguiente <span>→</span>
                </button>
            </div>
        </div>

        <!-- Leyenda con los 3 colores de vacaciones -->
        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background: linear-gradient(135deg, #166534 0%, #15803d 100%);"></div>
                <span>Inicio de Vacaciones</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);"></div>
                <span>Días Intermedios</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: linear-gradient(135deg, #ef4444 0%, #f87171 100%);"></div>
                <span>Fin de Vacaciones</span>
            </div>
        </div>

        <div class="calendar">
            <div class="calendar-grid" id="calendarGrid">
                <!-- El calendario se generará dinámicamente -->
            </div>
        </div>

        <!-- Eliminar la leyenda de aquí abajo -->

    </div>

    <div class="vacation-tooltip" id="vacationTooltip"></div>

    <!-- Botón flotante inferior con nombre del supervisor -->
    <div class="floating-supervisor-btn" id="floatingSupervisorBtn" style="display: none;">
        <div class="supervisor-avatar">
            <span class="supervisor-initial">S</span>
        </div>
        <div class="supervisor-name-floating">
            <span class="supervisor-name-text">Supervisor</span>
        </div>
    </div>

    <!-- Modal para solicitar ID del supervisor -->
    <div class="supervisor-modal" id="supervisorModal">
        <div class="supervisor-form">
            <h2>Acceso al Calendario</h2>
            <p>Selecciona tu nombre de la lista para visualizar las vacaciones de tu equipo</p>
            
            <div class="supervisor-selector">
                <label for="supervisorSelect">Supervisor:</label>
                <select id="supervisorSelect" class="supervisor-select">
                    <option value="">Selecciona un supervisor...</option>
                </select>
            </div>
            
            <!-- Campo de contraseña (inicialmente oculto) -->
            <div class="password-field" id="passwordField" style="display: none;">
                <label for="supervisorPassword">Contraseña:</label>
                <input type="password" id="supervisorPassword" class="supervisor-password" placeholder="Ingresa tu contraseña">
                <div class="attempts-info" id="attemptsInfo"></div>
            </div>
            
            <button class="supervisor-btn" id="supervisorBtn">
                <span class="btn-text">Acceder al Calendario</span>
                <span class="loading-spinner" style="display: none;"></span>
            </button>
            
            <div class="error-message" id="supervisorError"></div>
        </div>
    </div>

    <!-- Modal para mostrar vacaciones del día -->
    <div class="modal-overlay" id="vacationModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Vacaciones del Día</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- El contenido del modal se generará dinámicamente -->
            </div>
        </div>
    </div>

    <script>
        class VacationCalendar {
            constructor() {
                this.currentDate = new Date();
                this.vacations = [];
                this.supervisorId = null;
                this.supervisorInfo = null;
                this.employees = [];
                this.attempts = 0;
                this.maxAttempts = 3;
                this.blockedUntil = null;
                this.init();
            }

            init() {
                this.setupEventListeners();
                this.setupResizeListener();
                this.showSupervisorModal();
            }

            setupEventListeners() {
                // Eventos del modal de supervisor
                document.getElementById('supervisorBtn').addEventListener('click', () => this.handleSupervisorAction());
                document.getElementById('supervisorSelect').addEventListener('change', (e) => {
                    if (e.target.value) {
                        this.showPasswordField();
                    } else {
                        this.hidePasswordField();
                    }
                });

                // Evento para el campo de contraseña
                document.getElementById('supervisorPassword').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        this.handleSupervisorAction();
                    }
                });

                // Eventos del calendario (se configuran después de la validación)
                this.setupCalendarEventListeners();
                
                // Eventos del modal de vacaciones
                this.setupVacationModalEventListeners();
            }

            setupCalendarEventListeners() {
                document.getElementById('prevMonth').addEventListener('click', () => this.changeMonth(-1));
                document.getElementById('nextMonth').addEventListener('click', () => this.changeMonth(1));
            }

            setupVacationModalEventListeners() {
                document.getElementById('modalClose').addEventListener('click', () => this.closeModal());
                document.getElementById('vacationModal').addEventListener('click', (e) => {
                    if (e.target.id === 'vacationModal') {
                        this.closeModal();
                    }
                });

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        this.closeModal();
                    }
                });
            }

            async showSupervisorModal() {
                const modal = document.getElementById('supervisorModal');
                modal.style.display = 'flex';
                
                // Cargar lista de supervisores
                await this.loadSupervisors();
            }

            hideSupervisorModal() {
                const modal = document.getElementById('supervisorModal');
                modal.style.display = 'none';
            }

            showPasswordField() {
                const passwordField = document.getElementById('passwordField');
                const passwordInput = document.getElementById('supervisorPassword');
                const attemptsInfo = document.getElementById('attemptsInfo');
                
                passwordField.style.display = 'block';
                passwordInput.focus();
                
                // Limpiar información anterior
                passwordInput.value = '';
                attemptsInfo.innerHTML = '';
                
                // Verificar si está bloqueado
                this.checkBlockStatus();
            }

            hidePasswordField() {
                const passwordField = document.getElementById('passwordField');
                passwordField.style.display = 'none';
            }

            checkBlockStatus() {
                if (this.blockedUntil && new Date() < this.blockedUntil) {
                    const remainingTime = Math.ceil((this.blockedUntil - new Date()) / 1000);
                    const attemptsInfo = document.getElementById('attemptsInfo');
                    attemptsInfo.innerHTML = `<span class="blocked-message">🔒 Bloqueado por ${remainingTime} segundos</span>`;
                    
                    // Deshabilitar botón y campo de contraseña
                    document.getElementById('supervisorBtn').disabled = true;
                    document.getElementById('supervisorPassword').disabled = true;
                    
                    // Actualizar cada segundo
                    const countdown = setInterval(() => {
                        const remaining = Math.ceil((this.blockedUntil - new Date()) / 1000);
                        if (remaining <= 0) {
                            clearInterval(countdown);
                            this.unblockAccess();
                        } else {
                            attemptsInfo.innerHTML = `<span class="blocked-message">🔒 Bloqueado por ${remaining} segundos</span>`;
                        }
                    }, 1000);
                } else {
                    this.unblockAccess();
                }
            }

            unblockAccess() {
                this.blockedUntil = null;
                this.attempts = 0;
                
                const attemptsInfo = document.getElementById('attemptsInfo');
                const btn = document.getElementById('supervisorBtn');
                const passwordInput = document.getElementById('supervisorPassword');
                
                attemptsInfo.innerHTML = '';
                btn.disabled = false;
                passwordInput.disabled = false;
            }

            handleSupervisorAction() {
                const supervisorId = document.getElementById('supervisorSelect').value;
                const password = document.getElementById('supervisorPassword').value;
                
                if (!supervisorId) {
                    this.showSupervisorError('Por favor, selecciona un supervisor');
                    return;
                }
                
                if (!password) {
                    this.showSupervisorError('Por favor, ingresa tu contraseña');
                    return;
                }
                
                // Verificar si está bloqueado
                if (this.blockedUntil && new Date() < this.blockedUntil) {
                    return;
                }
                
                // Validar contraseña
                if (this.validatePassword(password)) {
                    this.validateSupervisor();
                } else {
                    this.handleFailedAttempt();
                }
            }

            validatePassword(password) {
                // Contraseña única para tooooodos los supervisores
                const correctPassword = 'administradorPDM'; 
                return password === correctPassword;
            }

            handleFailedAttempt() {
                this.attempts++;
                const attemptsInfo = document.getElementById('attemptsInfo');
                const remainingAttempts = this.maxAttempts - this.attempts;
                
                if (remainingAttempts > 0) {
                    attemptsInfo.innerHTML = `<span class="error-attempts">Contraseña incorrecta. Te quedan ${remainingAttempts} intento${remainingAttempts !== 1 ? 's' : ''}</span>`;
                    this.showSupervisorError('Contraseña incorrecta');
                    
                    // Limpiar campo de contraseña
                    document.getElementById('supervisorPassword').value = '';
                    document.getElementById('supervisorPassword').focus();
                } else {
                    // Bloquear acceso por 1 minuto
                    this.blockedUntil = new Date(Date.now() + 60000); // 60 segundos
                    attemptsInfo.innerHTML = `<span class="blocked-message">Demasiados intentos fallidos. Bloqueado por 1 minuto</span>`;
                    
                    // Deshabilitar botón y campo
                    document.getElementById('supervisorBtn').disabled = true;
                    document.getElementById('supervisorPassword').disabled = true;
                    
                    // Mostrar mensaje de error
                    this.showSupervisorError('Demasiados intentos fallidos. Intenta de nuevo en 1 minuto');
                    
                    // Iniciar countdown
                    this.checkBlockStatus();
                }
            }

            async loadSupervisors() {
                try {
                    // Lista predefinida de supervisores basada en los datos de la BD
                    const supervisores = [
                        { id: 'Cortes Pereyra Ramiro', nombre_completo: 'Cortes Pereyra Ramiro'},
                        { id: 'Susana Estrada Lopez', nombre_completo: 'Susana Estrada Lopez'},
                        { id: 'Villa Jacome Joni', nombre_completo: 'Villa Jacome Joni'},
                        { id: 'Silva Hernandez Ricardo', nombre_completo: 'Silva Hernandez Ricardo'},
                        { id: 'Galarza Oliveros Oliquer', nombre_completo: 'Galarza Oliveros Oliquer'},
                        { id: 'Aispuro Velazquez Jose Carlos', nombre_completo: 'Aispuro Velazquez Jose Carlos'},
                        { id: 'Garcia Lazaro Nahum', nombre_completo: 'Garcia Lazaro Nahum'},
                        { id: 'Valdez Oregel Maria Del Rosario', nombre_completo: 'Valdez Oregel Maria Del Rosario'},
                        { id: 'Mercado Gutierrez Hugo', nombre_completo: 'Mercado Gutierrez Hugo'},
                        { id: 'Juan Manuel Quintana Villaseñor', nombre_completo: 'Juan Manuel Quintana Villaseñor'},
                        { id: 'Rojas Silva Jose Luis', nombre_completo: 'Rojas Silva Jose Luis'},
                        { id: 'Salvador Magaña Cuevas', nombre_completo: 'Salvador Magaña Cuevas'},
                        { id: 'Jose Javier Martinez Armendariz', nombre_completo: 'Jose Javier Martinez Armendariz'},
                        { id: 'Jose Carmona Nila', nombre_completo: 'Jose Carmona Nila'}
                    ];
                    
                    const select = document.getElementById('supervisorSelect');
                    
                    // Limpiar opciones existentes (mantener la primera)
                    select.innerHTML = '<option value="">Selecciona un supervisor...</option>';
                    
                    // Agregar supervisores
                    supervisores.forEach(supervisor => {
                        const option = document.createElement('option');
                        option.value = supervisor.id;
                        option.textContent = `${supervisor.nombre_completo}`;
                        select.appendChild(option);
                    });
                    
                } catch (error) {
                    console.error('Error al cargar supervisores:', error);
                    this.showSupervisorError('Error al cargar la lista de supervisores');
                }
            }

            async validateSupervisor() {
                const supervisorId = document.getElementById('supervisorSelect').value;
                const btn = document.getElementById('supervisorBtn');
                const btnText = btn.querySelector('.btn-text');
                const spinner = btn.querySelector('.loading-spinner');
                const errorDiv = document.getElementById('supervisorError');

                if (!supervisorId) {
                    this.showSupervisorError('Por favor, selecciona un supervisor');
                    return;
                }

                // Mostrar loading
                btn.disabled = true;
                btnText.style.display = 'none';
                spinner.style.display = 'inline-block';
                errorDiv.style.display = 'none';

                try {
                    // Crear información del supervisor basada en la selección
                    this.supervisorInfo = {
                        id: supervisorId,
                        nombre_completo: supervisorId,
                        puesto: 'Supervisor'
                    };

                    // Obtener empleados del supervisor
                    const employeesResponse = await fetch(`/api/empleados/por-supervisor/${supervisorId}`);
                    if (!employeesResponse.ok) {
                        throw new Error('Error al obtener empleados');
                    }

                    this.employees = await employeesResponse.json();

                    if (this.employees.length === 0) {
                        throw new Error('No tienes empleados a cargo');
                    }

                    // Obtener vacaciones solo de los empleados del supervisor
                    await this.loadVacationsBySupervisor();

                    // Ocultar modal y mostrar calendario
                    this.hideSupervisorModal();
                    this.showSupervisorInfo();
                    console.log('Llamando a renderCalendar desde validateSupervisor');
                    this.renderCalendar();

                } catch (error) {
                    console.error('Error:', error);
                    this.showSupervisorError(error.message || 'Error al validar supervisor');
                } finally {
                    // Restaurar botón
                    btn.disabled = false;
                    btnText.style.display = 'inline';
                    spinner.style.display = 'none';
                }
            }

            showSupervisorError(message) {
                const errorDiv = document.getElementById('supervisorError');
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
            }

            showSupervisorInfo() {
                const header = document.querySelector('.header');
                const supervisorDiv = document.createElement('div');
                supervisorDiv.className = 'supervisor-info';
                supervisorDiv.innerHTML = `
                    <div class="supervisor-details">
                        <div class="supervisor-name">
                            <strong>Supervisor:</strong> ${this.supervisorInfo.nombre_completo || 'N/A'}
                        </div>
                    </div>
                    <button class="change-supervisor" onclick="location.reload()">Cambiar Supervisor</button>
                `;
                header.appendChild(supervisorDiv);

                // Mostrar botón flotante
                this.showFloatingSupervisorBtn();

                // Agregar sección de empleados
                this.showEmployeesList();
            }

            showFloatingSupervisorBtn() {
                const floatingBtn = document.getElementById('floatingSupervisorBtn');
                const supervisorInitial = document.querySelector('.supervisor-initial');
                const supervisorNameText = document.querySelector('.supervisor-name-text');
                
                if (floatingBtn && supervisorInitial && supervisorNameText) {
                    // Obtener inicial del nombre del supervisor
                    const fullName = this.supervisorInfo.nombre_completo || 'Supervisor';
                    const initial = fullName.split(' ')[0].charAt(0).toUpperCase();
                    
                    supervisorInitial.textContent = initial;
                    supervisorNameText.textContent = fullName;
                    
                    floatingBtn.style.display = 'flex';
                    
                    // Agregar evento de clic para cambiar supervisor
                    floatingBtn.addEventListener('click', () => {
                        location.reload();
                    });
                }
            }

            showEmployeesList() {
                const container = document.querySelector('.container');
                
                // Crear sección de empleados después del header
                const employeesSection = document.createElement('div');
                employeesSection.className = 'employees-section expanded';
                employeesSection.innerHTML = `
                    <div class="employees-header" onclick="this.parentElement.classList.toggle('collapsed')">
                        <div class="header-left">
                            <div class="toggle-arrow">▼</div>
                            <h3>Empleados a Cargo</h3>
                        </div>
                        <span class="employee-count">${this.employees.length} empleado${this.employees.length !== 1 ? 's' : ''}</span>
                    </div>
                    <div class="employees-content">
                        <div class="employees-grid">
                            ${this.employees.map(employee => `
                                <div class="employee-card">
                                    <div class="employee-avatar">
                                        ${employee.foto_url ? 
                                            `<img src="${employee.foto_url}" alt="Foto de ${employee.nombre_completo}">` : 
                                            `<div class="avatar-placeholder">${employee.nombre_completo.charAt(0)}</div>`
                                        }
                                    </div>
                                    <div class="employee-info">
                                        <div class="employee-name">${employee.nombre_completo}</div>
                                        <div class="employee-position">${employee.puesto || 'Sin especificar'}</div>
                                        <div class="employee-id">ID: ${employee.id}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                
                // Insertar después del header
                const header = document.querySelector('.header');
                header.parentNode.insertBefore(employeesSection, header.nextSibling);
            }

            async loadVacationsBySupervisor() {
                try {
                    // Obtener todas las vacaciones
                    const response = await fetch('/api/vacaciones/todas');
                    if (!response.ok) {
                        throw new Error('Error al cargar las vacaciones');
                    }
                    
                    const allVacations = await response.json();
                    console.log('Todas las vacaciones cargadas:', allVacations);
                    
                    // Filtrar solo las vacaciones de los empleados del supervisor
                    this.vacations = allVacations.filter(vacation => 
                        this.employees.some(employee => employee.id === vacation.empleado_id)
                    );
                    
                    console.log('Vacaciones filtradas para el supervisor:', this.vacations);
                    console.log('Empleados del supervisor:', this.employees);

                } catch (error) {
                    console.error('Error:', error);
                    // En lugar de mostrar error, inicializar con array vacío
                    this.vacations = [];
                    console.log('Inicializando vacaciones como array vacío debido al error');
                }
            }

            changeMonth(delta) {
                this.currentDate.setMonth(this.currentDate.getMonth() + delta);
                this.renderCalendar();
            }

            renderCalendar() {
                console.log('Renderizando calendario...');
                const calendarGrid = document.getElementById('calendarGrid');
                const currentMonth = document.getElementById('currentMonth');
                
                if (!calendarGrid) {
                    console.error('No se encontró el elemento calendarGrid');
                    return;
                }
                
                if (!currentMonth) {
                    console.error('No se encontró el elemento currentMonth');
                    return;
                }
                
                // Actualizar el mes mostrado
                const monthNames = [
                    'Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio',
                    'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'
                ];
                currentMonth.textContent = `${monthNames[this.currentDate.getMonth()]} ${this.currentDate.getFullYear()}`;

                // Limpiar el calendario
                calendarGrid.innerHTML = '';

                // Agregar encabezados de días (empezando por lunes)
                const daysOfWeek = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];
                daysOfWeek.forEach(day => {
                    const dayHeader = document.createElement('div');
                    dayHeader.className = 'calendar-header';
                    dayHeader.textContent = day;
                    calendarGrid.appendChild(dayHeader);
                });

                // Obtener el primer día del mes y el número de días
                const firstDay = new Date(this.currentDate.getFullYear(), this.currentDate.getMonth(), 1);
                const lastDay = new Date(this.currentDate.getFullYear(), this.currentDate.getMonth() + 1, 0);
                const daysInMonth = lastDay.getDate();
                
                // Calcular el primer día de la semana (0 = domingo, 1 = lunes, etc.)
                // Convertir para que lunes sea 0, domingo sea 6
                let firstDayOfWeek = firstDay.getDay();
                firstDayOfWeek = firstDayOfWeek === 0 ? 6 : firstDayOfWeek - 1;

                // Agregar días del mes anterior para completar la primera semana
                const prevMonth = new Date(this.currentDate.getFullYear(), this.currentDate.getMonth() - 1, 0);
                const daysInPrevMonth = prevMonth.getDate();
                
                for (let i = firstDayOfWeek - 1; i >= 0; i--) {
                    const dayElement = this.createDayElement(
                        daysInPrevMonth - i,
                        'other-month'
                    );
                    calendarGrid.appendChild(dayElement);
                }

                // Agregar días del mes actual
                const today = new Date();
                for (let day = 1; day <= daysInMonth; day++) {
                    const dayElement = this.createDayElement(day);
                    
                    // Marcar si es hoy
                    if (this.isToday(day)) {
                        dayElement.classList.add('today');
                    }

                    // Agregar eventos de vacaciones (solo si hay vacaciones)
                    if (this.vacations && this.vacations.length > 0) {
                        this.addVacationEvents(dayElement, day);
                    }
                    
                    calendarGrid.appendChild(dayElement);
                }

                // Agregar días del mes siguiente para completar la última semana
                const remainingDays = 35 - (firstDayOfWeek + daysInMonth); // 6 semanas * 7 días
                for (let day = 1; day <= remainingDays; day++) {
                    const dayElement = this.createDayElement(day, 'other-month');
                    calendarGrid.appendChild(dayElement);
                }
                
                // Ajustar truncamiento después de renderizar
                setTimeout(() => this.adjustTextTruncation(), 100);
                
                // Mostrar mensaje si no hay vacaciones
                if (!this.vacations || this.vacations.length === 0) {
                    const noVacationsMsg = document.createElement('div');
                    noVacationsMsg.className = 'no-vacations';
                    noVacationsMsg.innerHTML = `
                        <div style="text-align: center; padding: 40px; color: #666;">
                            <h3>📅 Calendario del Mes</h3>
                            <p>No hay vacaciones programadas para este mes.</p>
                            <p>El calendario está funcionando correctamente.</p>
                        </div>
                    `;
                    calendarGrid.appendChild(noVacationsMsg);
                }
                
                console.log('Calendario renderizado exitosamente');
                console.log('Días del mes:', daysInMonth);
                console.log('Primer día de la semana:', firstDayOfWeek);
                console.log('Vacaciones disponibles:', this.vacations ? this.vacations.length : 0);
            }

            createDayElement(day, className = '') {
                const dayElement = document.createElement('div');
                dayElement.className = `calendar-day ${className}`;
                
                const dayNumber = document.createElement('div');
                dayNumber.className = 'day-number';
                dayNumber.textContent = day;
                dayElement.appendChild(dayNumber);

                // Agregar evento de clic para abrir el modal
                if (className !== 'other-month') {
                    dayElement.style.cursor = 'pointer';
                    dayElement.addEventListener('click', () => this.openDayModal(day));
                }

                return dayElement;
            }

            isToday(day) {
                const today = new Date();
                return this.currentDate.getFullYear() === today.getFullYear() &&
                       this.currentDate.getMonth() === today.getMonth() &&
                       day === today.getDate();
            }

            addVacationEvents(dayElement, day) {
                const currentDate = new Date(this.currentDate.getFullYear(), this.currentDate.getMonth(), day);
                currentDate.setHours(0, 0, 0, 0);
                
                // Solo mostrar vacaciones activas (aprobadas y pendientes)
                const dayVacations = this.vacations.filter(vacation => {
                    const startDate = new Date(vacation.fecha_inicio);
                    const endDate = new Date(vacation.fecha_fin);
                    startDate.setHours(0, 0, 0, 0);
                    endDate.setHours(0, 0, 0, 0);
                    
                    // Solo incluir vacaciones activas
                    return (vacation.estado === 'aprobada' || vacation.estado === 'pendiente') &&
                           currentDate >= startDate && currentDate <= endDate;
                });

                if (dayVacations.length > 0) {
                    // DEDUPLICAR: Solo una entrada por empleado por día
                    const uniqueVacations = dayVacations.reduce((acc, vacation) => {
                        if (!acc.find(v => v.empleado_id === vacation.empleado_id)) {
                            acc.push(vacation);
                        }
                        return acc;
                    }, []);

                    // Mostrar contador si hay más de 3 vacaciones
                    if (uniqueVacations.length > 3) {
                        const countElement = document.createElement('div');
                        countElement.className = 'vacation-count';
                        countElement.textContent = uniqueVacations.length;
                        dayElement.appendChild(countElement);
                    }

                    // Mostrar hasta 3 eventos de vacaciones
                    uniqueVacations.slice(0, 3).forEach(vacation => {
                        // Pasar la fecha actual para la lógica de colores
                        const eventElement = this.createVacationEvent(vacation, currentDate);
                        dayElement.appendChild(eventElement);
                    });
                }
            }

            createVacationEvent(vacation, currentDate) {
                const eventElement = document.createElement('div');
                eventElement.className = `vacation-event ${vacation.estado}`;
                
                // LÓGICA DE COLORES CORREGIDA: Verde (inicio), Amarillo (intermedios), Rojo (fin)
                if (vacation.estado === 'aprobada' || vacation.estado === 'pendiente') {
                    // Crear fechas y normalizarlas correctamente
                    const startDate = new Date(vacation.fecha_inicio);
                    const endDate = new Date(vacation.fecha_fin);
                    
                    // Normalizar todas las fechas al inicio del día para comparación exacta
                    startDate.setHours(0, 0, 0, 0);
                    endDate.setHours(0, 0, 0, 0);
                    currentDate.setHours(0, 0, 0, 0);
                    
                    // Logs de depuración para ver qué está pasando
                    console.log('=== DEBUG COLORES ===');
                    console.log('Empleado:', vacation.nombre_completo);
                    console.log('Fecha actual (calendario):', currentDate.toDateString());
                    console.log('Fecha inicio (BD):', startDate.toDateString());
                    console.log('Fecha fin (BD):', endDate.toDateString());
                    console.log('¿Es día de inicio?', currentDate.getTime() === startDate.getTime());
                    console.log('¿Es día final?', currentDate.getTime() === endDate.getTime());
                    console.log('=====================');
                    
                    // Determinar el color basado en la posición del día en la secuencia de vacaciones
                    if (currentDate.getTime() === startDate.getTime()) {
                        // Día de inicio: VERDE
                        console.log('-> Día de INICIO (VERDE)');
                        eventElement.classList.add('vacation-start-day');
                    } else if (currentDate.getTime() === endDate.getTime()) {
                        // Día final: ROJO
                        console.log('-> Día FINAL (ROJO)');
                        eventElement.classList.add('vacation-last-day');
                    } else {
                        // Días intermedios: AMARILLO
                        console.log('-> Día INTERMEDIO (AMARILLO)');
                        eventElement.classList.add('vacation-middle-day');
                    }
                }
                
                // Obtener el nombre del empleado
                const employeeName = vacation.nombre_completo || `Empleado ${vacation.empleado_id}`;
                
                // Crear el texto del evento
                const textSpan = document.createElement('span');
                textSpan.className = 'event-text';
                textSpan.textContent = employeeName;
                eventElement.appendChild(textSpan);
                
                // Tooltip simple
                eventElement.title = `${employeeName} - ${vacation.estado}`;

                // Agregar tooltip con información detallada
                this.addTooltip(eventElement, vacation);

                return eventElement;
            }

            // Método para ajustar el truncamiento dinámicamente
            adjustTextTruncation() {
                const events = document.querySelectorAll('.vacation-event .event-text');
                events.forEach(eventText => {
                    const eventElement = eventText.closest('.vacation-event');
                    const maxWidth = eventElement.offsetWidth - 16; // 16px para padding
                    
                    // Si el texto es más ancho que el contenedor, aplicar truncamiento
                    if (eventText.scrollWidth > maxWidth) {
                        eventText.style.maxWidth = maxWidth + 'px';
                    } else {
                        eventText.style.maxWidth = 'none';
                    }
                });
            }

            // Ajustar truncamiento cuando cambie el tamaño de la ventana
            setupResizeListener() {
                let resizeTimeout;
                window.addEventListener('resize', () => {
                    clearTimeout(resizeTimeout);
                    resizeTimeout = setTimeout(() => {
                        this.adjustTextTruncation();
                    }, 100);
                });
            }

            addTooltip(element, vacation) {
                element.addEventListener('mouseenter', (e) => {
                    const tooltip = document.getElementById('vacationTooltip');
                    const employeeName = vacation.nombre_completo || `Empleado ${vacation.empleado_id}`;
                    
                    tooltip.innerHTML = `
                        <strong>${employeeName}</strong><br>
                        <strong>Estado:</strong> ${vacation.estado}<br>
                        <strong>Inicio:</strong> ${new Date(vacation.fecha_inicio).toLocaleDateString('es-ES')}<br>
                        <strong>Fin:</strong> ${new Date(vacation.fecha_fin).toLocaleDateString('es-ES')}<br>
                        <strong>Días:</strong> ${vacation.dias_solicitados || 'N/A'}
                    `;
                    
                    tooltip.classList.add('show');
                    
                    // Posicionar el tooltip
                    const rect = element.getBoundingClientRect();
                    tooltip.style.left = rect.left + 'px';
                    tooltip.style.top = (rect.bottom + 10) + 'px';
                });

                element.addEventListener('mouseleave', () => {
                    const tooltip = document.getElementById('vacationTooltip');
                    tooltip.classList.remove('show');
                });
            }

            showError(message) {
                const calendar = document.querySelector('.calendar');
                calendar.innerHTML = `<div class="error">${message}</div>`;
            }

            showLoading() {
                const calendar = document.querySelector('.calendar');
                calendar.innerHTML = `<div class="loading">Cargando vacaciones...</div>`;
            }

            openDayModal(day) {
                const selectedDate = new Date(this.currentDate.getFullYear(), this.currentDate.getMonth(), day);
                const dayVacations = this.getVacationsForDay(selectedDate);
                
                this.showModal(selectedDate, dayVacations);
            }

            getVacationsForDay(date) {
                return this.vacations.filter(vacation => {
                    const startDate = new Date(vacation.fecha_inicio);
                    const endDate = new Date(vacation.fecha_fin); // ✅ CORREGIDO: usar fecha_fin
                    return date >= startDate && date <= endDate;
                });
            }

            createVacationModalItem(vacation) {
                const employeeName = vacation.nombre_completo || `Empleado ${vacation.empleado_id}`;
                const startDate = this.formatDateSpanish(new Date(vacation.fecha_inicio));
                const endDate = this.formatDateSpanish(new Date(vacation.fecha_fin));
                const requestDate = this.formatDateSpanish(new Date(vacation.fecha_solicitud));
                
                return `
                    <div class="vacation-item ${vacation.estado}">
                        <div class="vacation-header">
                            <div class="employee-name">${employeeName}</div>
                            <div class="vacation-status ${vacation.estado}">${vacation.estado}</div>
                        </div>
                        
                        <div class="vacation-details">
                            <div class="detail-item">
                                <div class="detail-label">Fecha de Inicio</div>
                                <div class="detail-value">${startDate}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Fecha de Fin</div>
                                <div class="detail-value">${endDate}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Días Solicitados</div>
                                <div class="detail-value">${vacation.dias_solicitados || 'N/A'}</div>
                                </div>
                            <div class="detail-item">
                                <div class="detail-label">Fecha de Solicitud</div>
                                <div class="detail-value">${requestDate}</div>
                            </div>
                        </div>
                        
                        ${vacation.comentarios ? `
                            <div class="vacation-notes">
                                <div class="notes-label">Comentarios</div>
                                <div class="notes-content">${vacation.comentarios}</div>
                            </div>
                        ` : ''}
                    </div>
                `;
            }

            formatDateSpanish(date) {
                const options = { 
                    day: 'numeric', 
                    month: 'long', 
                    year: 'numeric' 
                };
                return date.toLocaleDateString('es-ES', options);
            }

            showModal(date, dayVacations) {
                const modal = document.getElementById('vacationModal');
                const modalTitle = document.getElementById('modalTitle');
                const modalBody = document.getElementById('modalBody');

                // Formatear la fecha para el título
                const formattedDate = this.formatDateSpanish(date);
                modalTitle.textContent = `Vacaciones del ${formattedDate}`;

                // Generar contenido del modal
                if (dayVacations.length === 0) {
                    modalBody.innerHTML = `
                        <div class="no-vacations-modal">
                            <div class="icon">🏖️</div>
                            <h3>No hay vacaciones programadas</h3>
                            <p>Este día no tiene solicitudes de vacaciones activas.</p>
                        </div>
                    `;
                } else {
                    modalBody.innerHTML = dayVacations.map(vacation => this.createVacationModalItem(vacation)).join('');
                }

                // Mostrar el modal
                modal.classList.add('show');
                document.body.style.overflow = 'hidden';
            }

            closeModal() {
                const modal = document.getElementById('vacationModal');
                modal.classList.remove('show');
                document.body.style.overflow = 'auto';
            }
        }

        // Inicializar el calendario cuando se carga la página
        document.addEventListener('DOMContentLoaded', () => {
            new VacationCalendar();
        });
    </script>
</body>
</html>
