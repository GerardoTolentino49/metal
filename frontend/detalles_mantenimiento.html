  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Función para mover el highlight de la barra superior
      function moverHighlight() {
        const topbar = document.querySelector('.topbar');
        const highlight = topbar.querySelector('.glass-highlight');
        const btnSel = topbar.querySelector('.menu-item.selected');
        
        if (!btnSel) return;
        
        const rectTopbar = topbar.getBoundingClientRect();
        const rectBtn = btnSel.getBoundingClientRect();
        const left = rectBtn.left - rectTopbar.left;
        
        highlight.style.left = left + 'px';
        highlight.style.width = rectBtn.width + 'px';
      }

      // Función para el efecto de aberración cromática
      function addChromaticEffect(element) {
        element.classList.add('clicked');
        setTimeout(() => {
          element.classList.remove('clicked');
        }, 600);
      }

      // Función para el contraste automático
      function getContrastYIQ(hexcolor) {
        hexcolor = hexcolor.replace('#', '');
        if (hexcolor.length === 3) {
          hexcolor = hexcolor[0]+hexcolor[0]+hexcolor[1]+hexcolor[1]+hexcolor[2]+hexcolor[2];
        }
        var r = parseInt(hexcolor.substr(0,2),16);
        var g = parseInt(hexcolor.substr(2,2),16);
        var b = parseInt(hexcolor.substr(4,2),16);
        var yiq = ((r*299)+(g*587)+(b*114))/1000;
        return (yiq >= 128) ? 'dark' : 'light';
      }

      function updateTopbarContrast() {
        const topbar = document.querySelector('.topbar');
        if (!topbar) return;
        let bg = window.getComputedStyle(topbar).backgroundColor;
        function rgb2hex(rgb) {
          if (!rgb) return '#fff';
          let result = rgb.match(/rgba?\((\d+), (\d+), (\d+)/);
          if (!result) return '#fff';
          return '#' +
            (parseInt(result[1]).toString(16).padStart(2, '0')) +
            (parseInt(result[2]).toString(16).padStart(2, '0')) +
            (parseInt(result[3]).toString(16).padStart(2, '0'));
        }
        let hex = rgb2hex(bg);
        let contrast = getContrastYIQ(hex);
        document.querySelectorAll('.menu-item, .submenu-item, .topbar-header h1, .lisa-btn-cromatica').forEach(el => {
          el.setAttribute('data-contrast', contrast);
        });
      }

      // MANEJO UNIFICADO DE MENÚS Y SUBMENÚS
      document.querySelectorAll('.menu-item').forEach(menuItem => {
        menuItem.addEventListener('click', function(e) {
          // No hacer nada si se hace clic en el submenú mismo
          if (e.target.closest('.submenu')) return;
          
          e.preventDefault();
          e.stopPropagation();
          
          // Efecto cromático
          addChromaticEffect(this);
          
          // Si tiene submenú, manejarlo
          if (this.classList.contains('has-submenu')) {
            const submenu = this.querySelector('.submenu');
            const arrow = this.querySelector('.submenu-arrow');
            
            // Cerrar todos los otros submenús
            document.querySelectorAll('.menu-item.has-submenu').forEach(otherItem => {
              if (otherItem !== this) {
                const otherSubmenu = otherItem.querySelector('.submenu');
                const otherArrow = otherItem.querySelector('.submenu-arrow');
                if (otherSubmenu) {
                  otherSubmenu.classList.remove('active');
                  otherArrow.style.transform = 'rotate(0deg)';
                }
              }
            });
            
            // Alternar el submenú actual
            if (submenu) {
              const isActive = submenu.classList.contains('active');
              
              if (isActive) {
                // Cerrar
                submenu.classList.remove('active');
                arrow.style.transform = 'rotate(0deg)';
              } else {
                // Abrir
                submenu.classList.add('active');
                arrow.style.transform = 'rotate(180deg)';
              }
            }
          } else {
            // Para elementos sin submenú, solo manejar highlight
            document.querySelectorAll('.menu-item.selected').forEach(b => b.classList.remove('selected'));
            this.classList.add('selected');
            moverHighlight();
          }
        });
      });
      
      // Botón LISA
      document.querySelectorAll('.lisa-btn-cromatica').forEach(btn => {
        btn.addEventListener('click', function() {
          window.location.href = 'inicio.html';
        });
      });
      
      // Icono de usuario
      const userIcon = document.getElementById('userIcon');
      if (userIcon) {
        userIcon.addEventListener('click', function() {
          addChromaticEffect(this);
        });
      }
      
      // Cerrar submenús al hacer clic fuera
      document.addEventListener('click', function(e) {
        if (!e.target.closest('.menu-item.has-submenu')) {
          document.querySelectorAll('.menu-item.has-submenu .submenu').forEach(submenu => {
            submenu.classList.remove('active');
          });
          document.querySelectorAll('.menu-item.has-submenu .submenu-arrow').forEach(arrow => {
            arrow.style.transform = 'rotate(0deg)';
          });
        }
      });
      
      // Prevenir que el clic en el submenú cierre el submenú
      document.querySelectorAll('.submenu').forEach(submenu => {
        submenu.addEventListener('click', function(e) {
          e.stopPropagation();
        });
      });
      
      // Inicialización
      setTimeout(() => {
        moverHighlight();
        updateTopbarContrast();
      }, 100);
      
      // Eventos de resize
      window.addEventListener('resize', function() {
        moverHighlight();
        updateTopbarContrast();
      });
    });
  </script>

  <script>
    // FUNCION UTILIDAD: Calcular duración solo en horario hábil (L-V 6:00-16:00)
    function getBusinessDurationMs(start, end) {
      // Copias para no modificar los originales
      let s = new Date(start);
      let e = new Date(end);
      if (e <= s) return 0;
      let totalMs = 0;
      // Horario hábil
      const startHour = 6;
      const endHour = 16;
      // Iterar día por día
      while (s < e) {
        // Si es sábado (6) o domingo (0), saltar al lunes siguiente
        if (s.getDay() === 0) { // domingo
          s.setDate(s.getDate() + 1);
          s.setHours(startHour, 0, 0, 0);
          continue;
        }
        if (s.getDay() === 6) { // sábado
          s.setDate(s.getDate() + 2);
          s.setHours(startHour, 0, 0, 0);
          continue;
        }
        // Si antes de las 6am, mover a 6am
        if (s.getHours() < startHour) {
          s.setHours(startHour, 0, 0, 0);
        }
        // Si después de las 16h, saltar al siguiente día hábil a las 6am
        if (s.getHours() >= endHour) {
          s.setDate(s.getDate() + 1);
          s.setHours(startHour, 0, 0, 0);
          continue;
        }
        // Calcular fin de jornada actual
        let endOfWork = new Date(s);
        endOfWork.setHours(endHour, 0, 0, 0);
        // El siguiente corte es el menor entre fin de jornada y end
        let next = end < endOfWork ? end : endOfWork;
        totalMs += next - s;
        s = new Date(next);
        // Si llegamos al final de la jornada, saltar al siguiente día hábil
        if (s >= endOfWork) {
          s.setDate(s.getDate() + 1);
          s.setHours(startHour, 0, 0, 0);
        }
      }
      return totalMs;
    }

    // Función para manejar el cambio de tema
    function initThemeSwitch() {
      const themeSwitch = document.getElementById('themeSwitch');
      const themeLabel = document.querySelector('.theme-switch-label');

      // Solo proceder si existe el switch de tema
      if (!themeSwitch) {
        console.log('Switch de tema no encontrado, omitiendo inicialización');
        return;
      }

      // Función para actualizar los colores de los gráficos
      function updateChartsColors() {
        const textColor = document.documentElement.getAttribute('data-theme') === 'dark' ? '#ffffff' : '#000000';
        
        if (ticketsChart) {
          ticketsChart.options.scales.x.ticks.color = textColor;
          ticketsChart.options.scales.y.ticks.color = textColor;
          ticketsChart.options.plugins.legend.labels.color = textColor;
          ticketsChart.update();
        }
        
        if (departmentsChart) {
          departmentsChart.options.scales.x.ticks.color = textColor;
          departmentsChart.options.scales.y.ticks.color = textColor;
          departmentsChart.options.plugins.legend.labels.color = textColor;
          departmentsChart.update();
        }
      }

      // Manejar cambio de tema
      themeSwitch.addEventListener('change', function() {
        if (this.checked) {
          document.documentElement.setAttribute('data-theme', 'light');
          localStorage.setItem('theme', 'light');
        } else {
          document.documentElement.setAttribute('data-theme', 'dark');
          localStorage.setItem('theme', 'dark');
        }
        // Actualizar colores de los gráficos
        updateChartsColors();
      });
    }

    // Función para generar los botones de años
    function generateYearButtons() {
      const yearCarousel = document.getElementById('yearCarousel');
      const currentYear = new Date().getFullYear();
      const firstYear = 2025;
      const lastYear = currentYear;

      const years = [];
      for (let y = firstYear; y <= lastYear; y++) years.push(y);

      yearCarousel.innerHTML = years.map(year => `
        <button class="year-button" data-year="${year}">
          ${year}
        </button>
      `).join('');

      // Evento click a los botones
      yearCarousel.querySelectorAll('.year-button').forEach(button => {
        button.addEventListener('click', function() {
          yearCarousel.querySelectorAll('.year-button').forEach(btn => btn.classList.remove('active'));
          this.classList.add('active');
          loadTicketStats(this.dataset.year);
          loadDepartmentStats(this.dataset.year);
          loadToolsRanking(this.dataset.year);
          loadFullMaintenanceRanking(this.dataset.year); // NUEVO
        });
      });

      // Activar el botón del año actual por defecto
      const defaultYearButton = yearCarousel.querySelector(`[data-year="${currentYear}"]`);
      if (defaultYearButton) {
        defaultYearButton.classList.add('active');
      }

      // Configurar navegación del carrusel
      const prevButton = document.getElementById('prevYear');
      const nextButton = document.getElementById('nextYear');
      prevButton.addEventListener('click', () => {
        yearCarousel.scrollBy({ left: -200, behavior: 'smooth' });
      });
      nextButton.addEventListener('click', () => {
        yearCarousel.scrollBy({ left: 200, behavior: 'smooth' });
      });

      // Cargar los datos del año actual manualmente
      loadTicketStats(currentYear);
      loadDepartmentStats(currentYear);
      loadToolsRanking(currentYear);
      loadFullMaintenanceRanking(currentYear); // NUEVO
    }

    // Función para cargar los datos de tickets
    async function loadTicketStats(selectedYear) {
      try {
        console.log('Cargando estadísticas para el año:', selectedYear);
        
        const response = await fetch('/api/mantenimiento/tickets');
        if (!response.ok) {
          console.error('Error al obtener tickets:', response.status, response.statusText);
          document.getElementById('urgencyTimes').innerHTML = 
            '<div style="text-align: center; padding: 20px; color: #e74c3c;">Error al cargar los datos de tickets</div>';
          return;
        }
        
        const tickets = (await response.json())
          .filter(ticket => new Date(ticket.timestamp).getFullYear() === parseInt(selectedYear));
        
        console.log('Tickets obtenidos:', tickets.length);
        
        if (tickets.length === 0) {
          document.getElementById('urgencyTimes').innerHTML = 
            '<div style="text-align: center; padding: 20px; color: #888;">No hay tickets para el año ' + selectedYear + '</div>';
          return;
        }

        const months = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 
                       'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];

        // Inicializar contadores de tickets por mes
        const totalTickets = new Array(12).fill(0);
        const completedTickets = new Array(12).fill(0);
        const notCompletedTickets = new Array(12).fill(0);

        // Contar tickets por mes y estado
        tickets.forEach(ticket => {
          const date = new Date(ticket.timestamp);
          const month = date.getMonth();
          totalTickets[month]++;
          if (ticket.urgency === 'completed') {
            completedTickets[month]++;
          } else {
            notCompletedTickets[month]++;
          }
        });

                  color: '#ffffff'
                }
              }
            }
          }
        });

        // Ranking de usuarios con más tickets terminados
        const userCounts = {};
        const userTimes = {}; // Para calcular tiempos promedio
        
        // Estadísticas de tiempos por nivel de urgencia
        const urgencyStats = {
          'critical': { totalTime: 0, count: 0, tickets: [] },
          'high': { totalTime: 0, count: 0, tickets: [] },
          'medium': { totalTime: 0, count: 0, tickets: [] },
          'low': { totalTime: 0, count: 0, tickets: [] }
        };
        
        tickets.forEach(ticket => {
          const user = ticket.name || 'Desconocido';
          
          userCounts[user] = (userCounts[user] || 0) + 1;
          
          // Calcular tiempo de resolución si existe time_end
          if (ticket.time_end) {
            const startTime = new Date(ticket.timestamp);
            const endTime = new Date(ticket.time_end);
            const duration = getBusinessDurationMs(startTime, endTime);
            
            if (!userTimes[user]) {
              userTimes[user] = { totalTime: 0, count: 0 };
            }
            userTimes[user].totalTime += duration;
            userTimes[user].count += 1;
            
            // Agrupar por la última urgencia del ticket antes de completarse
            const lastUrgency = ticket.last_urgency || ticket.urgency || 'medium'; // Usar last_urgency o urgency como fallback
            if (urgencyStats[lastUrgency]) {
              urgencyStats[lastUrgency].totalTime += duration;
              urgencyStats[lastUrgency].count += 1;
              urgencyStats[lastUrgency].tickets.push(ticket);
            }
          }
        });
        
        const sortedUsers = Object.entries(userCounts).sort((a, b) => b[1] - a[1]).slice(0, 5);
        
        // Mostrar estadísticas de tiempos por urgencia
        const urgencyTimesDiv = document.getElementById('urgencyTimes');
        if (urgencyTimesDiv) {
          console.log('Renderizando tiempos de urgencia...');
          console.log('Estadísticas de urgencia:', urgencyStats);
          
          const urgencyLabels = {
            'critical': 'Crítico',
            'medium': 'Medio',
            'low': 'Bajo'
          };
          
          // Mostrar siempre las 4 categorías de urgencia, incluso si no hay tickets
          const urgencyHTML = Object.entries(urgencyLabels).map(([urgency, label]) => {
            const stats = urgencyStats[urgency] || { totalTime: 0, count: 0, tickets: [] };
            
            // Calcular tiempo promedio en horas y minutos
            let avgTimeHours = 0;
            let avgTimeMinutes = 0;
            let timeDisplay = 'Sin datos';
            
            if (stats.count > 0) {
              const avgTimeMs = stats.totalTime / stats.count;
              avgTimeHours = Math.floor(avgTimeMs / (1000 * 60 * 60));
              avgTimeMinutes = Math.floor((avgTimeMs % (1000 * 60 * 60)) / (1000 * 60));
              
              if (avgTimeHours > 0) {
                timeDisplay = `${avgTimeHours}h ${avgTimeMinutes}m`;
              } else if (avgTimeMinutes > 0) {
                timeDisplay = `${avgTimeMinutes}m`;
              } else {
                timeDisplay = '< 1m';
              }
            }
            
            // Calcular el tiempo máximo para normalizar las barras (solo entre categorías con datos)
            const categoriesWithData = Object.values(urgencyStats).filter(stat => stat.count > 0);
            const maxTime = categoriesWithData.length > 0 ? 
              Math.max(...categoriesWithData.map(stat => stat.totalTime / stats.count)) : 0;
            
            // Calcular el porcentaje para la barra
            let percentage = 0;
            if (maxTime > 0 && stats.count > 0) {
              const avgTimeMs = stats.totalTime / stats.count;
              percentage = (avgTimeMs / maxTime) * 100;
            }
            
            // Si solo hay 1 ticket en esta categoría, mostrar una barra mínima del 10%
            if (stats.count === 1 && percentage === 0) {
              percentage = 10;
            }
            
            // Información adicional para mostrar
            let additionalInfo = '';
            if (stats.count === 1) {
              additionalInfo = '<span class="single-ticket-indicator">1 ticket</span>';
            } else if (stats.count > 1) {
              additionalInfo = `<span class="urgency-info">Promedio de ${stats.count} tickets</span>`;
            } else {
              additionalInfo = '<span class="urgency-info">Sin tickets completados</span>';
            }
            
            return `
              <div class="urgency-time-item clickable-urgency" data-urgency="${urgency}">
                <div class="urgency-header">
                  <span class="urgency-label">${label}</span>
                  <span class="urgency-count">${stats.count} tickets</span>
                </div>
                <div class="time-bar-container">
                  <div class="time-bar">
                    <div class="time-bar-fill ${urgency}" style="width: ${Math.min(percentage, 100)}%"></div>
                  </div>
                  <div class="time-value">
                    ${timeDisplay}
                    ${additionalInfo}
                  </div>
                </div>
              </div>
            `;
          }).join('');
          
          urgencyTimesDiv.innerHTML = urgencyHTML;
          
          // Agregar evento para abrir modal al dar clic en cada urgencia
          urgencyTimesDiv.querySelectorAll('.urgency-time-item').forEach(item => {
            item.addEventListener('click', function() {
              const urgency = this.getAttribute('data-urgency');
              // Filtrar tickets terminados de esa urgencia
              const ticketsFiltrados = tickets.filter(ticket => {
                const urg = ticket.last_urgency || ticket.urgency || 'medium';
                return urg === urgency && ticket.urgency === 'completed';
              });
              showUrgencyTicketsModal(urgency, ticketsFiltrados);
            });
          });
        }
        
        // Cargar ranking de herramientas más utilizadas
        loadToolsRanking(selectedYear);
        
        // Limpiar el gráfico de departamentos al cargar un nuevo año
        clearDepartmentChart();
        
      } catch (error) {
        console.error('Error en loadTicketStats:', error);
        document.getElementById('urgencyTimes').innerHTML = 
          '<div style="text-align: center; padding: 20px; color: #e74c3c;">Error al cargar las estadísticas: ' + error.message + '</div>';
      }
    }

    // Función para cargar el ranking de herramientas más utilizadas
    async function loadToolsRanking(selectedYear) {
      try {
        // Obtener tickets completados del año seleccionado
        const ticketsResponse = await fetch('/api/mantenimiento/tickets');
        if (!ticketsResponse.ok) return;
        
        const allTickets = await ticketsResponse.json();
        const tickets = allTickets.filter(ticket => 
          ticket.urgency === 'completed' && 
          new Date(ticket.timestamp).getFullYear() === parseInt(selectedYear) &&
          ticket.id_herramienta // Solo tickets que tienen herramienta asignada
        );

        // Obtener todas las herramientas
        const toolsResponse = await fetch('/api/mantenimiento/herramientas');
        if (!toolsResponse.ok) return;
        
        const tools = await toolsResponse.json();
        
        // Crear un mapa de herramientas por ID para acceso rápido
        const toolsMap = {};
        tools.forEach(tool => {
          toolsMap[tool.id] = tool;
        });
        
        // Contar uso de herramientas
        const toolUsage = {};
        tickets.forEach(ticket => {
          if (ticket.id_herramienta && toolsMap[ticket.id_herramienta]) {
            const toolId = ticket.id_herramienta;
            if (!toolUsage[toolId]) {
              toolUsage[toolId] = {
                id: toolId,
                name: toolsMap[toolId].nombre,
                description: toolsMap[toolId].descripcion || 'Sin descripción',
                count: 0,
                preventivo: 0,
                correctivo: 0
              };
            }
            toolUsage[toolId].count++;
            if (ticket.mantenimiento_preventivo) toolUsage[toolId].preventivo++;
            if (ticket.mantenimiento_correctivo) toolUsage[toolId].correctivo++;
          }
        });
        
        // Ordenar por cantidad de uso y tomar las primeras 10
        const sortedTools = Object.values(toolUsage)
          .sort((a, b) => b.count - a.count)
          .slice(0, 10);
        
        // Mostrar ranking de herramientas
        const toolsRankingDiv = document.getElementById('toolsRanking');
        if (toolsRankingDiv) {
          if (sortedTools.length === 0) {
            toolsRankingDiv.innerHTML = '<div style="text-align:center;color:#888;padding:20px;">No hay herramientas utilizadas en este año.</div>';
          } else {
            toolsRankingDiv.innerHTML = '<ul class="tools-list">' +
              sortedTools.map((tool, idx) => `
                <li class="tool-item">
                  <div class="tool-info">
                    <span class="tool-rank">#${idx + 1}</span>
                    <div class="tool-details">
                      <span class="tool-name">${tool.name}</span>
                      <span class="tool-description">${tool.description}</span>
                      <div class="tool-counters">
                        <span class="counter-circle">
                          ${tool.count}
                          <span class="counter-label">usos</span>
                        </span>
                        <span class="counter-circle counter-preventivo">
                          ${tool.preventivo}
                          <span class="counter-label">Preventivo</span>
                        </span>
                        <span class="counter-circle counter-correctivo">
                          ${tool.correctivo}
                          <span class="counter-label">Correctivo</span>
                        </span>
                      </div>
                    </div>
                  </div>
                </li>
              `).join('') +
            '</ul>';
          }
        }
      } catch (error) {
        console.error('Error al cargar ranking de herramientas:', error);
        const toolsRankingDiv = document.getElementById('toolsRanking');
        if (toolsRankingDiv) {
          toolsRankingDiv.innerHTML = '<div style="text-align:center;color:#888;padding:20px;">Error al cargar las herramientas.</div>';
        }
      }
    }

    // NUEVA FUNCIÓN: Ranking completo de mantenimiento
    async function loadFullMaintenanceRanking(selectedYear) {
      try {
        console.log('Cargando ranking de mantenimiento para año:', selectedYear);
        
        // Obtener todos los usuarios de mantenimiento
        const usersResponse = await fetch('/api/mantenimiento/usuarios');
        if (!usersResponse.ok) {
          console.error('Error al obtener usuarios:', usersResponse.status);
          return;
        }
        const users = await usersResponse.json();
        console.log('Usuarios obtenidos:', users);

        // Obtener todos los tickets completados del año seleccionado
        const ticketsResponse = await fetch('/api/mantenimiento/tickets');
        if (!ticketsResponse.ok) {
          console.error('Error al obtener tickets:', ticketsResponse.status);
          return;
        }
        const allTickets = await ticketsResponse.json();
        console.log('Total de tickets obtenidos:', allTickets.length);
        
        // Filtrar solo tickets completados del año
        const completedTickets = allTickets.filter(ticket => 
          ticket.urgency === 'completed' && 
          ticket.timestamp && 
          new Date(ticket.timestamp).getFullYear() === parseInt(selectedYear)
        );
        console.log('Tickets completados del año', selectedYear, ':', completedTickets.length);

        // Contar tickets resueltos por cada usuario de mantenimiento
        const userTicketCount = {};
        users.forEach(user => {
          userTicketCount[user.id] = 0;
        });
        
        completedTickets.forEach(ticket => {
          let assigned = ticket.assigned_user_id;
          console.log('Ticket', ticket.id, 'assigned_user_id:', assigned);
          if (Array.isArray(assigned)) {
            assigned.forEach(uid => {
              if (userTicketCount.hasOwnProperty(uid)) {
                userTicketCount[uid]++;
                console.log('Incrementando contador para usuario', uid);
              }
            });
          } else if (typeof assigned === 'number' && userTicketCount.hasOwnProperty(assigned)) {
            userTicketCount[assigned]++;
            console.log('Incrementando contador para usuario', assigned);
          }
        });
        
        console.log('Conteo final por usuario:', userTicketCount);

        // Ordenar usuarios por número de tickets resueltos (desc)
        const sortedUsers = users.slice().sort((a, b) => userTicketCount[b.id] - userTicketCount[a.id]);
        console.log('Usuarios ordenados:', sortedUsers);

        // Renderizar la lista
        const rankingDiv = document.getElementById('fullMaintenanceRanking');
        console.log('Elemento rankingDiv encontrado:', !!rankingDiv);
        
        if (rankingDiv) {
          if (sortedUsers.length === 0) {
            rankingDiv.innerHTML = '<div style="text-align:center;color:#888;padding:20px;">No hay usuarios de mantenimiento.</div>';
          } else {
            const html = '<ul class="users-list">' +
              sortedUsers.map(user =>
                `<li class="user-item" data-userid="${user.id}" data-username="${user.nombre}">
                  <span class="user-name">${user.nombre}</span>
                  <span class="ticket-count">${userTicketCount[user.id]} tickets</span>
                </li>`
              ).join('') +
              '</ul>';
            console.log('HTML generado:', html);
            rankingDiv.innerHTML = html;
            // Agregar evento para mostrar tickets resueltos al hacer clic en el nombre
            rankingDiv.querySelectorAll('.user-item').forEach(item => {
              item.addEventListener('click', function() {
                const userId = this.getAttribute('data-userid');
                const userName = this.getAttribute('data-username');
                // Filtrar tickets resueltos por este usuario
                const ticketsUsuario = completedTickets.filter(ticket => {
                  if (Array.isArray(ticket.assigned_user_id)) {
                    return ticket.assigned_user_id.includes(Number(userId));
                  } else {
                    return ticket.assigned_user_id === Number(userId);
                  }
                });
                showUserTicketsModal(userName, ticketsUsuario);
              });
            });
          }
        } else {
          console.error('No se encontró el elemento fullMaintenanceRanking');
        }
      } catch (error) {
        console.error('Error al cargar ranking completo de mantenimiento:', error);
        const rankingDiv = document.getElementById('fullMaintenanceRanking');
        if (rankingDiv) rankingDiv.innerHTML = '<div style="text-align:center;color:#888;padding:20px;">Error al cargar el ranking.</div>';
      }
    }

    // Nueva función para cargar tiempos de resolución por urgencia para un mes específico
    function loadUrgencyTimesForMonth(monthTickets, monthName) {
      // Filtrar solo tickets terminados del mes seleccionado
      const completedMonthTickets = monthTickets.filter(ticket => 
        ticket.urgency === 'completed' && ticket.time_end
      );
      
      // Estadísticas de tiempos por nivel de urgencia para este mes
      const urgencyStats = {
        'critical': { totalTime: 0, count: 0, tickets: [] },
        'high': { totalTime: 0, count: 0, tickets: [] },
        'medium': { totalTime: 0, count: 0, tickets: [] },
        'low': { totalTime: 0, count: 0, tickets: [] }
      };
      
      // Calcular tiempos de resolución por urgencia para este mes
      completedMonthTickets.forEach(ticket => {
        const startTime = new Date(ticket.timestamp);
        const endTime = new Date(ticket.time_end);
        const duration = getBusinessDurationMs(startTime, endTime);
        
        // Agrupar por la última urgencia del ticket antes de completarse
        const lastUrgency = ticket.last_urgency || ticket.urgency || 'medium';
        if (urgencyStats[lastUrgency]) {
          urgencyStats[lastUrgency].totalTime += duration;
          urgencyStats[lastUrgency].count += 1;
          urgencyStats[lastUrgency].tickets.push(ticket);
        }
      });
      
      // Mostrar estadísticas de tiempos por urgencia para este mes
      const urgencyTimesDiv = document.getElementById('urgencyTimes');
      if (urgencyTimesDiv) {
        console.log(`Renderizando tiempos de urgencia para ${monthName}...`);
        console.log('Estadísticas de urgencia del mes:', urgencyStats);
        
        const urgencyLabels = {
          'critical': 'Crítico',
          'high': 'Alto',
          'medium': 'Medio',
          'low': 'Bajo'
        };
        
        // Mostrar siempre las 4 categorías de urgencia, incluso si no hay tickets
        const urgencyHTML = Object.entries(urgencyLabels).map(([urgency, label]) => {
          const stats = urgencyStats[urgency] || { totalTime: 0, count: 0, tickets: [] };
          
          // Calcular tiempo promedio en horas y minutos
          let avgTimeHours = 0;
          let avgTimeMinutes = 0;
          let timeDisplay = 'Sin datos';
          
          if (stats.count > 0) {
            const avgTimeMs = stats.totalTime / stats.count;
            avgTimeHours = Math.floor(avgTimeMs / (1000 * 60 * 60));
            avgTimeMinutes = Math.floor((avgTimeMs % (1000 * 60 * 60)) / (1000 * 60));
            
            if (avgTimeHours > 0) {
              timeDisplay = `${avgTimeHours}h ${avgTimeMinutes}m`;
            } else if (avgTimeMinutes > 0) {
              timeDisplay = `${avgTimeMinutes}m`;
            } else {
              timeDisplay = '< 1m';
            }
          }
          
          // Calcular el tiempo máximo para normalizar las barras (solo entre categorías con datos)
          const categoriesWithData = Object.values(urgencyStats).filter(stat => stat.count > 0);
          const maxTime = categoriesWithData.length > 0 ? 
            Math.max(...categoriesWithData.map(stat => stat.totalTime / stat.count)) : 0;
          
          // Calcular el porcentaje para la barra
          let percentage = 0;
          if (maxTime > 0 && stats.count > 0) {
            const avgTimeMs = stats.totalTime / stats.count;
            percentage = (avgTimeMs / maxTime) * 100;
          }
          
          // Si solo hay 1 ticket en esta categoría, mostrar una barra mínima del 10%
          if (stats.count === 1 && percentage === 0) {
            percentage = 10;
          }
          
          // Información adicional para mostrar
          let additionalInfo = '';
          if (stats.count === 1) {
            additionalInfo = '<span class="single-ticket-indicator">1 ticket</span>';
          } else if (stats.count > 1) {
            additionalInfo = `<span class="urgency-info">Promedio de ${stats.count} tickets</span>`;
          } else {
            additionalInfo = '<span class="urgency-info">Sin tickets completados</span>';
          }
          
          return `
            <div class="urgency-time-item clickable-urgency" data-urgency="${urgency}">
              <div class="urgency-header">
                <span class="urgency-label">${label}</span>
                <span class="urgency-count">${stats.count} tickets</span>
              </div>
              <div class="time-bar-container">
                <div class="time-bar">
                  <div class="time-bar-fill ${urgency}" style="width: ${Math.min(percentage, 100)}%"></div>
                </div>
                <div class="time-value">
                  ${timeDisplay}
                  ${additionalInfo}
                </div>
              </div>
            </div>
          `;
        }).join('');
        
        // Agregar título indicando el mes seleccionado
        const titleHTML = `<div class="urgency-section-title">Tiempos de Resolución por Urgencia - ${monthName}</div>`;
        urgencyTimesDiv.innerHTML = titleHTML + urgencyHTML;
        
        // Agregar evento para abrir modal al dar clic en cada urgencia
        urgencyTimesDiv.querySelectorAll('.urgency-time-item').forEach(item => {
          item.addEventListener('click', function() {
            const urgency = this.getAttribute('data-urgency');
            // Filtrar tickets terminados de esa urgencia en este mes
            const ticketsFiltrados = completedMonthTickets.filter(ticket => {
              const urg = ticket.last_urgency || ticket.urgency || 'medium';
              return urg === urgency && ticket.urgency === 'completed';
            });
            showUrgencyTicketsModal(urgency, ticketsFiltrados);
          });
        });
      }
    }
  </script>
