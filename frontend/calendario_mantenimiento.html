<script>
    // Navegación del tab-switch de RH
document.addEventListener('DOMContentLoaded', function() {
  const tabRoutes = {
    inicio: 'nuevo-inicio.html',
    tickets: 'mantenimiento.html',
    calendario_de_mantenimiento_preventivo: 'calendario_mantenimiento.html',
    estadisticas_preventivas: 'detalles_mantenimiento_preventivo.html',
    estadisticas_correctivas: 'detalles_mantenimiento.html',


  };

  const currentPage = window.location.pathname.split('/').pop() || 'inventario.html';

  document.querySelectorAll('.tab-switch-button[data-tab]').forEach(button => {
    button.addEventListener('click', function() {
      const targetPage = tabRoutes[this.dataset.tab];
      if (!targetPage || targetPage === currentPage) {
        return;
      }
      window.location.href = targetPage;
    });
  });
});

  <script>
    // Variables globales
    let currentDate = new Date();
    let events = []; // Ahora se cargará desde la base de datos
    let selectedDate = null;
    let editingEventId = null; // Para saber si estamos editando un evento
    let postponingEventId = null; // Para saber qué evento estamos aplazando

    // Inicialización
    document.addEventListener('DOMContentLoaded', function() {
        initializeCalendar();
        loadEventsFromDatabase();
        setupEventListeners();
    });

    function initializeCalendar() {
      updateCalendarHeader();
      renderMonthlyCalendar();
      renderYearlyCalendar();
    }

    function updateCalendarHeader() 
    {
      const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
      document.getElementById('currentMonth').textContent = 
        `${monthNames[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
    }

    // Función para renderizar el calendario mensual con hilos visuales
    function renderMonthlyCalendar() 
    {
      const grid = document.getElementById('calendarGrid');
      grid.innerHTML = '';

      // Crear contenedor para los hilos SVG (solo si el panel de conexiones está visible)
      const connectionsPanel = document.getElementById('connectionsPanel');
      if (connectionsPanel.style.display !== 'none') 
      {
        const linesContainer = document.createElement('div');
        linesContainer.className = 'postponement-lines';
        linesContainer.innerHTML = '<svg width="100%" height="100%" style="position: absolute; top: 0; left: 0;"></svg>';
        grid.appendChild(linesContainer);
      }

      const firstDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
      const lastDay = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0);
      const startDate = new Date(firstDay);
      const dayOfWeek = firstDay.getDay();
      const mondayOffset = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
      startDate.setDate(startDate.getDate() - mondayOffset);

      for (let i = 0; i < 42; i++) 
      {
        const day = new Date(startDate);
        day.setDate(startDate.getDate() + i);

        const dayElement = document.createElement('div');
        dayElement.className = 'calendar-day';
        dayElement.textContent = day.getDate();

        if (isToday(day)) 
        {
          dayElement.classList.add('today');
        }

        // Marcar días de otros meses
        if (day.getMonth() !== currentDate.getMonth()) 
        {
          dayElement.classList.add('other-month');
        }

        // Agregar indicador de porcentaje de completado primero
        const completionPercentage = getCompletionPercentage(day);
        const percentageBadge = document.createElement('div');
        percentageBadge.className = 'completion-percentage';
        
        const percentageColorClass = getPercentageColorClass(completionPercentage);
        percentageBadge.classList.add(percentageColorClass);
        
        percentageBadge.textContent = completionPercentage + '%';
        dayElement.appendChild(percentageBadge);

        // Marcar días con eventos y mostrar cantidad
        const eventCount = getEventCount(day);
        if (eventCount > 0) {
          dayElement.classList.add('has-event');
          if (eventCount >= 30) { // Cambiado de 3 a 30
            dayElement.classList.add('has-many-events');
          }
          if (eventCount > 1) {
            const completedCount = getCompletedTasksCount(day);
            const eventBadge = document.createElement('div');
            eventBadge.className = 'event-count';
            // Aplicar la misma clase de color que el porcentaje
            eventBadge.classList.add(percentageColorClass);
            eventBadge.textContent = `${completedCount}/${eventCount}`;
            dayElement.appendChild(eventBadge);
          }
        }
        createTaskDots(day, dayElement);
        if (areAllEventsCompleted(day)) 
        {
          dayElement.classList.add('all-events-completed');
        }

        if (connectionsPanel.style.display !== 'none') 
        {
          markPostponedConnections(day, dayElement);
        }

        dayElement.addEventListener('click', () => {
          selectDate(day);
        });

        grid.appendChild(dayElement);
      }

      if (connectionsPanel.style.display !== 'none') 
      {
        setTimeout(() => 
        {
          drawPostponementLines();
        }, 100);
      }
    }

    function markPostponedConnections(date, dayElement) 
    {
      const dateString = date.toISOString().split('T')[0];
      
      // Buscar eventos que son origen de aplazamientos
      const originEvents = events.filter(event => 
        event.fecha_evento === dateString && 
        event.fecha_aplazamiento && 
        event.fecha_aplazamiento !== null && 
        event.fecha_aplazamiento !== ''
      );

      // Buscar eventos que son destino de aplazamientos
      const destinationEvents = events.filter(event => 
        event.fecha_evento === dateString && 
        event.titulo && 
        events.some(origEvent => 
          origEvent.fecha_evento !== dateString &&
          origEvent.titulo === event.titulo &&
          origEvent.fecha_aplazamiento === dateString
        )
      );

      if (originEvents.length > 0) 
      {
        dayElement.classList.add('postponed-origin');
        const indicator = document.createElement('div');
        indicator.className = 'connection-indicator origin';
        indicator.textContent = originEvents.length;
        indicator.title = `${originEvents.length} tarea(s) aplazada(s) desde este día`;
        dayElement.appendChild(indicator);
      }

      if (destinationEvents.length > 0) 
      {
        dayElement.classList.add('postponed-destination');
        const indicator = document.createElement('div');
        indicator.className = 'connection-indicator destination';
        indicator.textContent = destinationEvents.length;
        indicator.title = `${destinationEvents.length} tarea(s) aplazada(s) hacia este día`;
        dayElement.appendChild(indicator);
      }
    }

    // Función para dibujar las líneas de conexión
    function drawPostponementLines() 
    {
      const svg = document.querySelector('.postponement-lines svg');
      if (!svg) return;

      // Limpiar líneas existentes
      svg.innerHTML = '';

      const postponedEvents = events.filter(event => 
        event.fecha_aplazamiento && 
        event.fecha_aplazamiento !== null && 
        event.fecha_aplazamiento !== ''
      );

      postponedEvents.forEach(event => {
        const originDate = new Date(event.fecha_evento);
        const destinationDate = new Date(event.fecha_aplazamiento);
        
        // Solo dibujar si ambas fechas están en el mes actual
        if (originDate.getMonth() === currentDate.getMonth() && 
            originDate.getFullYear() === currentDate.getFullYear() &&
            destinationDate.getMonth() === currentDate.getMonth() && 
            destinationDate.getFullYear() === currentDate.getFullYear()) {
          
          const originElement = findDayElement(originDate);
          const destinationElement = findDayElement(destinationDate);
          
          if (originElement && destinationElement) {
            drawLine(originElement, destinationElement, event.titulo);
          }
        }
      });
    }

    // Función para encontrar el elemento del día
    function findDayElement(date) 
    {
      const dayElements = document.querySelectorAll('.calendar-day');
      const firstDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
      const startDate = new Date(firstDay);
      const dayOfWeek = firstDay.getDay();
      const mondayOffset = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
      startDate.setDate(startDate.getDate() - mondayOffset);
      
      for (let i = 0; i < dayElements.length; i++) 
      {
        const day = new Date(startDate);
        day.setDate(startDate.getDate() + i);
        
        if (day.getDate() === date.getDate() && day.getMonth() === date.getMonth() && day.getFullYear() === date.getFullYear()) 
        {
          return dayElements[i];
        }
      }
      return null;
    }

    // Función para dibujar una línea entre dos elementos
    function drawLine(fromElement, toElement, eventTitle) {
      const svg = document.querySelector('.postponement-lines svg');
      if (!svg) return;

      const fromRect = fromElement.getBoundingClientRect();
      const toRect = toElement.getBoundingClientRect();
      const svgRect = svg.getBoundingClientRect();

      const fromX = fromRect.left + fromRect.width / 2 - svgRect.left;
      const fromY = fromRect.top + fromRect.height / 2 - svgRect.top;
      const toX = toRect.left + toRect.width / 2 - svgRect.left;
      const toY = toRect.top + toRect.height / 2 - svgRect.top;

      const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      line.setAttribute('d', `M ${fromX} ${fromY} L ${toX} ${toY}`);
      line.setAttribute('class', 'postponement-line');
      line.setAttribute('data-event', eventTitle);
      
      // Agregar tooltip
      line.addEventListener('mouseenter', (e) => {
        showConnectionTooltip(e, eventTitle);
      });
      
      line.addEventListener('mouseleave', hideConnectionTooltip);
      
      svg.appendChild(line);
    }

    // Función para mostrar tooltip de conexión
    function showConnectionTooltip(event, eventTitle) {
      const tooltip = document.createElement('div');
      tooltip.className = 'connection-tooltip';
      tooltip.textContent = `Tarea aplazada: ${eventTitle}`;
      tooltip.style.left = event.pageX + 10 + 'px';
      tooltip.style.top = event.pageY - 10 + 'px';
      document.body.appendChild(tooltip);
      
      setTimeout(() => tooltip.classList.add('show'), 10);
    }

    // Función para ocultar tooltip de conexión
    function hideConnectionTooltip() 
    {
      const tooltip = document.querySelector('.connection-tooltip');
      if (tooltip) 
      {
        tooltip.remove();
      }
    }

    // Función para mostrar/ocultar el panel de conexiones
    function toggleConnectionsPanel() 
    {
      const panel = document.getElementById('connectionsPanel');
      const button = document.getElementById('toggleConnectionsBtn');
      
      if (panel.style.display === 'none') 
      {
        panel.style.display = 'block';
        button.innerHTML = '<i class="fas fa-eye-slash"></i> Ocultar';
        loadConnectionsList();
        // Redibujar el calendario para mostrar los hilos
        renderMonthlyCalendar();
      } else 
      {
        panel.style.display = 'none';
        button.innerHTML = '<i class="fas fa-eye"></i> Mostrar';
        // Redibujar el calendario para ocultar los hilos
        renderMonthlyCalendar();
      }
    }

    // Función para cargar la lista de conexiones
    function loadConnectionsList() 
    {
      const connectionsList = document.getElementById('connectionsList');
      connectionsList.innerHTML = '';

      const postponedEvents = events.filter(event => 
        event.fecha_aplazamiento && 
        event.fecha_aplazamiento !== null && 
        event.fecha_aplazamiento !== ''
      );

      if (postponedEvents.length === 0) 
      {
        connectionsList.innerHTML = '<p>No hay tareas aplazadas</p>';
        return;
      }

      postponedEvents.forEach(event => 
      {
        const connectionItem = document.createElement('div');
        connectionItem.className = 'connection-item';
        
        connectionItem.innerHTML = `
          <div class="connection-info">

    function isToday(date) 
    {
      const today = new Date();
      return date.getDate() === today.getDate() &&
             date.getMonth() === today.getMonth() &&
             date.getFullYear() === today.getFullYear();
    }

    function getEventCount(date) 
    {
      return events.filter(event => 
      {
        const eventDate = new Date(event.fecha_evento);
        const compareDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        return eventDate.getTime() === compareDate.getTime();
      }).length;
    }

    function hasEvents(date) 
    {
      return getEventCount(date) > 0;
    }

    function areAllEventsCompleted(date) 
    {
      const dayEvents = events.filter(event => 
      {
        const eventDate = new Date(event.fecha_evento);
        const compareDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        return eventDate.getTime() === compareDate.getTime();
      });

      if (dayEvents.length === 0) {
        return false; // No hay eventos para este día
      }

      return dayEvents.every(event => event.completado);
    }

    function getMonthEventCount(month) {
      return events.filter(event => {
        const eventDate = new Date(event.fecha_evento);
        return eventDate.getMonth() === month && 
               eventDate.getFullYear() === currentDate.getFullYear();
      }).length;
    }

    function selectDate(date) 
    {
      selectedDate = date;
      loadEvents();
      
      // Actualizar selección visual
      document.querySelectorAll('.calendar-day').forEach(day => {
        day.classList.remove('selected');
      });
      
      const dayElements = document.querySelectorAll('.calendar-day');
      const firstDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
      const startDate = new Date(firstDay);
      const dayOfWeek = firstDay.getDay();
      const mondayOffset = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
      startDate.setDate(startDate.getDate() - mondayOffset);
      
      for (let i = 0; i < dayElements.length; i++) 
      {
        const day = new Date(startDate);
        day.setDate(startDate.getDate() + i);
        
        if (day.getDate() === date.getDate() && day.getMonth() === date.getMonth() && day.getFullYear() === date.getFullYear()) 
        {
          dayElements[i].classList.add('selected');
          break;
        }
      }
    }

    // Función para calcular estadísticas del mes seleccionado
    function calculateCurrentMonthStats() {
        // Usar el mes seleccionado en el calendario en lugar del mes actual
        const selectedMonth = currentDate.getMonth();
        const selectedYear = currentDate.getFullYear();
        
        let pendingCount = 0;
        let completedCount = 0;
        let postponedCount = 0;
        
        events.forEach(event => 
        {
            const eventDate = new Date(event.fecha_evento);
            
            // Verificar si el evento es del mes seleccionado
            if (eventDate.getMonth() === selectedMonth && eventDate.getFullYear() === selectedYear) 
            {
                console.log('Evento del mes seleccionado:', event.titulo, 
                {
                    completado: event.completado,
                    fecha_aplazamiento: event.fecha_aplazamiento,
                    fecha_evento: event.fecha_evento
                });
                
                if (event.completado) 
                {
                    completedCount++;
                } else if (event.fecha_aplazamiento && event.fecha_aplazamiento !== null && event.fecha_aplazamiento !== '') 
                {
                    postponedCount++;
                } else 
                {
                    pendingCount++;
                }
            }
        });
        
        const stats = { pendingCount, completedCount, postponedCount };
        return stats;
    }

    function formatDate(date) {
      const options = { 
        weekday: 'long', 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric' 
      };
      return date.toLocaleDateString('es-ES', options);
    }

    // Escapa HTML para mostrar texto plano en el UI
    function escapeHTML(str) {
      if (!str && str !== 0) return '';
      return String(str).replace(/[&<>"']/g, function (s) {
        switch (s) {
          case '&': return '&amp;';
          case '<': return '&lt;';
          case '>': return '&gt;';
          case '"': return '&quot;';
          case "'": return '&#39;';
          default: return s;
        }
      });
    }

    // Nueva función para calcular el porcentaje de completado
    function getCompletionPercentage(date) {
      const dayEvents = events.filter(event => {
        const eventDate = new Date(event.fecha_evento);
        const compareDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        return eventDate.getTime() === compareDate.getTime();
      });

      if (dayEvents.length === 0) 
      {
        return 0;
      }

      const completedEvents = dayEvents.filter(event => event.completado);
      const percentage = Math.round((completedEvents.length / dayEvents.length) * 100);
      return percentage;
    }

    // Función para obtener las tareas por estado para un día específico
    function getTasksByStatus(date) {
      const dayEvents = events.filter(event => {
        const eventDate = new Date(event.fecha_evento);
        const compareDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        return eventDate.getTime() === compareDate.getTime();
      });

      const tasksByStatus = 
      {
        completed: 0,
        inProgress: 0,
        pending: 0
      };

      dayEvents.forEach(event => 
      {
        if (event.completado) 
        {
          tasksByStatus.completed++;
        } else if (event.fecha_aplazamiento && event.fecha_aplazamiento !== null && event.fecha_aplazamiento !== '') 
        {
          tasksByStatus.inProgress++;
        } else 
        {
          tasksByStatus.pending++;
        }
      });

      return tasksByStatus;
    }

    // Función para obtener las tareas completadas de un día específico
    function getCompletedTasksCount(date) {
      const dayEvents = events.filter(event => {
        const eventDate = new Date(event.fecha_evento);
        const compareDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        return eventDate.getTime() === compareDate.getTime();
      });

      return dayEvents.filter(event => event.completado).length;
    }

    // Función para obtener la clase de color del porcentaje
    function getPercentageColorClass(completionPercentage) {
      if (completionPercentage === 0) {
        return 'zero';
      } else if (completionPercentage >= 1 && completionPercentage <= 50) 
      {
        return 'low';
      } else if (completionPercentage >= 51 && completionPercentage <= 70) 
      {
        return 'medium';
      } else if (completionPercentage >= 71 && completionPercentage <= 99) 
      {
        return 'high';
      } else if (completionPercentage === 100) 
      {
        return 'complete';
      }
      return 'zero';
    }

    // Función para crear los puntitos de tareas
    function createTaskDots(date, dayElement) {
      const tasksByStatus = getTasksByStatus(date);
      const totalTasks = tasksByStatus.completed + tasksByStatus.inProgress + tasksByStatus.pending;
      
      if (totalTasks === 0) return;

      // Crear contenedor para los puntitos
      const dotsContainer = document.createElement('div');
      dotsContainer.className = 'task-dots-container';
      
      // Crear puntitos para cada estado
      const statuses = [
        { key: 'completed', color: '#4CAF50', count: tasksByStatus.completed },
        { key: 'inProgress', color: '#FFC107', count: tasksByStatus.inProgress },
        { key: 'pending', color: '#F44336', count: tasksByStatus.pending }
      ];

      statuses.forEach(status => 
      {
        for (let i = 0; i < status.count; i++) 
        {
          const dot = document.createElement('div');
          dot.className = 'task-dot';
          dot.style.backgroundColor = status.color;
          dotsContainer.appendChild(dot);
        }
      });

      dayElement.appendChild(dotsContainer);
    }

    // Función para calcular el promedio del mes activo (mes actual)
    function calculateCurrentMonthAverage() {
      const currentDate = new Date();
      const currentMonth = currentDate.getMonth();
      const currentYear = currentDate.getFullYear();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      
      let totalPercentage = 0;
      let daysWithEvents = 0;

      // Calcular para todos los días del mes actual
      for (let day = 1; day <= daysInMonth; day++) {
        const date = new Date(currentYear, currentMonth, day);
        const percentage = getCompletionPercentage(date);
        
        // Solo contar días que tienen eventos
        const dayEvents = events.filter(event => {
          const eventDate = new Date(event.fecha_evento);
          const compareDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
          return eventDate.getTime() === compareDate.getTime();
        });

        if (dayEvents.length > 0) {
          totalPercentage += percentage;
          daysWithEvents++;
        }
      }

      // Si no hay días con eventos, retornar 0
      if (daysWithEvents === 0) {
        return 0;
      }

      return Math.round(totalPercentage / daysWithEvents);
    }

    // Función para obtener el promedio del mes actual
    function getCurrentMonthAverage() 
    {
      return calculateCurrentMonthAverage();
    }

    function updateMaintenanceStats() 
    {
      const currentAverage = getCurrentMonthAverage();
      const currentMonth = new Date().getMonth();
      const currentYear = new Date().getFullYear();
      
      localStorage.setItem('maintenanceMonthlyAverage', currentAverage);
      // Guardar el promedio del mes actual con clave específica
      localStorage.setItem(`maintenanceMonthlyAverage_${currentYear}_${currentMonth}`, currentAverage);
      fetch('/api/mantenimiento/estadisticas/promedio-mensual', 
      {
        method: 'POST',
        headers: 
        {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(
          {
          promedio: currentAverage,
          mes: currentMonth + 1,
          año: currentYear
        })
      }).catch(error => 
      {
      });
    }

    // Función para abrir el modal de aplazar
    function openPostponeModal(eventId) 
    {
        postponingEventId = eventId;
        const numericId = typeof eventId === 'string' ? parseInt(eventId) : eventId;
        const event = events.find(e => e.id === numericId);
        
        if (event) 
        {
            document.getElementById('postponeEventTitle').value = event.titulo;
            document.getElementById('postponeEventDescription').value = event.descripcion || '';
            
            // Permitir seleccionar cualquier fecha (sin restricción de fecha mínima)
            const dateInput = document.getElementById('postponeEventDate');
            dateInput.min = ''; // Remover restricción de fecha mínima
            dateInput.value = ''; // Limpiar el valor para que el usuario seleccione
            dateInput.placeholder = 'Selecciona la nueva fecha';
            
            document.getElementById('postponeModal').style.display = 'block';
        } else 
        {
            console.error('No se encontró el evento con ID:', numericId);
            alert('Error: No se encontró el evento para aplazar');
        }
    }

    // Función para cerrar el modal de aplazar
    function closePostponeModal() 
    {
        document.getElementById('postponeModal').style.display = 'none';
        postponingEventId = null;
        document.getElementById('postponeForm').reset();
    }

    // Función para aplazar evento a nueva fecha
    async function postponeEventToNewDate() {
        const newDate = document.getElementById('postponeEventDate').value;
        
        if (!newDate) 
        {
            alert('Por favor selecciona una fecha válida');
            return;
        }

        const numericId = typeof postponingEventId === 'string' ? parseInt(postponingEventId) : postponingEventId;
        const originalEvent = events.find(e => e.id === numericId);
        
        if (!originalEvent) 
        {
            alert('Error: No se encontró el evento original');
            return;
        }

        // Crear nueva copia del evento con la nueva fecha
        const newEventData = {
            titulo: originalEvent.titulo,
            fecha_evento: newDate,
            descripcion: originalEvent.descripcion,
            usuario_creador: 'IT Admin',
            departamento: 'IT',
            prioridad: 'normal',
            color_evento: '#ffc107'
        };

        // Actualizar el evento original para marcarlo como aplazado
        const updateOriginalEvent = 
        {
            titulo: originalEvent.titulo,
            fecha_evento: originalEvent.fecha_evento,
            descripcion: originalEvent.descripcion,
            usuario_creador: originalEvent.usuario_creador,
            departamento: originalEvent.departamento,
            prioridad: originalEvent.prioridad,
            color_evento: originalEvent.color_evento,
            aplazado_a_fecha: newDate
        };

        try 
        {
            // Crear la copia en la nueva fecha
            const newEvent = await addEventToDatabase(newEventData);
            
            if (newEvent) 
            {
                // Marcar el evento original como aplazado
                const updatedEvent = await updateEventInDatabase(numericId, updateOriginalEvent);
                
                if (updatedEvent) 
                {
                    closePostponeModal();
                    alert('Evento aplazado exitosamente. Se ha creado una copia en la nueva fecha.');
                } else {
                    console.error('Error al marcar evento como aplazado');
                    alert('Error al marcar el evento como aplazado');
                }
            }
        } catch (error) {
            console.error('Error al aplazar evento:', error);
            alert('Error al aplazar el evento');
        }
    }

    // Función para manejar el clic en el botón de aplazar
    function postponeEvent(eventId) 
    {
        openPostponeModal(eventId);
    }

    // Función para formatear fecha corta
    function formatShortDate(dateString) 
    {
        const date = new Date(dateString);
        const options = { 
            day: '2-digit', 
            month: '2-digit', 
            year: 'numeric' 
        };
        return date.toLocaleDateString('es-ES', options);
    }
