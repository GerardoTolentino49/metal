    <button class="tab-switch-button" data-tab="inicio">

    </button>

    <button class="tab-switch-button active" data-tab="tickets">
      <i class="fas fa-ticket-alt"></i> Tickets
    </button>        

    <button class="tab-switch-button" data-tab="calendario">
      <i class="fas fa-calendar-alt"></i> Calendario
    </button>

    <button class="tab-switch-button" data-tab="qr">
      <i class="fas fa-qrcode"></i> QR
    </button>

    <button class="tab-switch-button" data-tab="boveda">
      <i class="fas fa-vault"></i> Bóveda
    </button>

    <button class="tab-switch-button" data-tab="estadisticas">
      <i class="fas fa-chart-bar"></i> Estadísticas

      <i class="fas fa-tools"></i> Ajustes

<script>
document.addEventListener('DOMContentLoaded', function() {
  const tabRoutes = {
    inicio: 'nuevo-inicio.html',
    tickets: 'panel.html',
    calendario: 'calendario_it.html',
    qr: 'qr_inventario.html',
    boveda: 'boveda.html',
    estadisticas: 'detalles.html',
    Aingenieria: 'admin_it.html'
  };

  const currentPage = window.location.pathname.split('/').pop() || 'inventario.html';

  document.querySelectorAll('.tab-switch-button[data-tab]').forEach(button => {
    button.addEventListener('click', function() {
      const targetPage = tabRoutes[this.dataset.tab];
      if (!targetPage || targetPage === currentPage) {
        return;
      }
      window.location.href = targetPage;
    });
  });
});

  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      document.body.style.display = 'none';
      const username = localStorage.getItem('username');
      if (!username) {
        window.location.href = 'login.html';
        return;
      }
      try {
        const response = await fetch('/api/auth/check-permissions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username })
        });
        if (!response.ok) throw new Error('Error al verificar permisos');
        const data = await response.json();
        // Verificar acceso a la página actual
        const currentPage = window.location.pathname.split('/').pop();
        let tieneAcceso = false;
        if (data.user.rol === 'IT') tieneAcceso = true;
        else {
          switch(currentPage) {
            case 'panel.html': tieneAcceso = data.permissions.includes('tickets'); break;
            case 'detalles.html': tieneAcceso = data.permissions.includes('estadisticas'); break;
            case 'apoyos.html': tieneAcceso = data.permissions.includes('apoyos'); break;
            case 'amonestaciones.html': tieneAcceso = data.permissions.includes('amonestaciones'); break;
            case 'design.html': tieneAcceso = data.permissions.includes('design'); break;
            case 'inventario.html': tieneAcceso = data.permissions.includes('inventario'); break;
            case 'admin.html':
            case 'departamentos.html':
            case 'contrasenas.html':
            case 'admin_design.html':
              tieneAcceso = data.user.rol === 'IT';
              break;
            case 'inicio.html': tieneAcceso = true; break;
            default: tieneAcceso = true;
          }
        }
        if (!tieneAcceso) 
        {
          alert('No tienes permiso para acceder a esta página.');
          window.location.href = 'inicio.html';
          return;
        }
        document.body.style.display = '';
        document.body.classList.add('topbar-ready');
      } catch (e) {
        alert('Error al verificar permisos.');
        window.location.href = 'inicio.html';
      }
    });

    let draggedTicket = null;
    let lastTicketCount = 0; // Para rastrear tickets nuevos

    // Función para solicitar permiso de notificaciones
    async function requestNotificationPermission() {
      try {
        const permission = await Notification.requestPermission();
        return permission === 'granted';
      } catch (error) {
        console.error('Error al solicitar permiso de notificaciones:', error);
        return false;
      }
    }

    // Función para mostrar notificación de nuevo ticket
    function showNewTicketNotification(ticket) {
      if (Notification.permission === 'granted') {
        const notification = new Notification('Nuevo Ticket Recibido', {
          body: `${ticket.name} - ${ticket.department}\n${ticket.issue.substring(0, 50)}...`,
          icon: '/img/logo.png', // Asegúrate de tener un ícono
          badge: '/img/logo.png',
          tag: 'new-ticket',
          requireInteraction: true
        });

        // Reproducir un sonido de notificación
        const audio = new Audio('/audios/notificacion-lisa.mp3');
        audio.play().catch(e => console.log('Error al reproducir sonido:', e));
      }
    }

    async function loadTickets() 
    {

      if (!window.containers) 
      {
        window.containers = {
          pending: document.querySelector('.kanban-column.pending .tickets-container'),
          critical: document.querySelector('.kanban-column.critical .tickets-container'),
          high: document.querySelector('.kanban-column.high .tickets-container'),
          medium: document.querySelector('.kanban-column.medium .tickets-container'),
          low: document.querySelector('.kanban-column.low .tickets-container')
        };
      }
      const { pending, critical, high, medium, low } = window.containers;    
      if (!pending || !critical || !high || !medium || !low) 
      {
        console.error('Contenedores no encontrados en el DOM');
        return;
      }

      try 
      {
        const response = await fetch('/api/tickets', {
          headers: {
            'Cache-Control': 'no-cache',
            'Pragma': 'no-cache'
          }
        });
        
        if (!response.ok) 
        {
          throw new Error('Error al obtener tickets');
        }
        
        const tickets = await response.json();
        const ticketMap = new Map();
        tickets.forEach(ticket => {
          ticketMap.set(ticket.id, ticket);
        });
        const uniqueTickets = Array.from(ticketMap.values());

        if (lastTicketCount > 0 && uniqueTickets.length > lastTicketCount) 
        {
          const newTickets = uniqueTickets.slice(lastTicketCount);
          newTickets.forEach(ticket => {
            if (document.hidden) 
            {
              showNewTicketNotification(ticket);
            }
          });
        }
        
        lastTicketCount = uniqueTickets.length;
        const currentTicketsStr = JSON.stringify(uniqueTickets);
        if (window.lastTicketsStr === currentTicketsStr) 
        {
          return;
        }
        window.lastTicketsStr = currentTicketsStr;
        [pending, critical, high, medium, low].forEach(container => {
          container.innerHTML = '';
        });

        const completedCount = uniqueTickets.filter(ticket => ticket.urgency === 'completed').length;
        const countSpan = document.querySelector('.completed-button .ticket-count');
        if (countSpan) countSpan.textContent = completedCount;
        if (!Array.isArray(uniqueTickets) || uniqueTickets.length === 0) 
        {
          return;
        }

        const fragments = {pending: document.createDocumentFragment(), critical: document.createDocumentFragment(), high: document.createDocumentFragment(), medium: document.createDocumentFragment(), low: document.createDocumentFragment()};

        uniqueTickets.forEach(ticket => {
          if (ticket.urgency === 'completed') return;
          
          const div = createTicketElement(ticket);
          const targetFragment = fragments[ticket.urgency] || fragments.pending;
          targetFragment.appendChild(div);
        });

        Object.entries(fragments).forEach(([urgency, fragment]) => {
          const container = window.containers[urgency];
          if (container) 
          {
            container.appendChild(fragment);
          }
        });

      } catch (error) 
      {
        console.error('Error al cargar tickets:', error);
      }
    }

    async function updateTicketUrgency(ticketId, newUrgency) 
    {
      try 
      {
        const response = await fetch(`/api/tickets/${ticketId}/urgency`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ urgency: newUrgency })
        });

        if (!response.ok) throw new Error('Error al actualizar la urgencia del ticket');
        const ticket = draggedTicket;
        if (ticket) 
        {
          const urgencySpan = ticket.querySelector('span[style="color:#d00"]');
          if (urgencySpan) 
          {
            urgencySpan.textContent = `[${newUrgency}]`;
          }

          const targetContainer = document.querySelector(`.kanban-column[data-status="${newUrgency}"] .tickets-container`);
          if (targetContainer) 
          {
            if (ticket.parentNode) 
            {
              ticket.parentNode.removeChild(ticket);
            }
            targetContainer.appendChild(ticket);
          }
        }
      } catch (error) {
        console.error('Error:', error);
        alert('Error al actualizar el estado del ticket');
      }
    }

    async function deleteTicket(ticketId) 
    {
      if (!confirm('¿Estás seguro de que deseas eliminar este ticket?')) {
        return;
      }

      try {
        const response = await fetch(`/api/tickets/${ticketId}`, {
          method: 'DELETE'
        });

        if (!response.ok) {
          throw new Error('Error al eliminar el ticket');
        }

        loadTickets();
      } catch (error) 
      {
        console.error('Error:', error);
        alert('Error al eliminar el ticket');
      }
    }

    function animateTicketEntry(element) 
    {
      element.style.opacity = '0';
      element.style.transform = 'translateY(20px)';
      requestAnimationFrame(() => {
        element.style.transition = 'opacity 0.4s, transform 0.4s';
        element.style.opacity = '1';
        element.style.transform = 'translateY(0)';
      });
    }

    function createTicketElement(ticket) {
      const div = document.createElement('div');
      div.className = 'ticket';
      div.draggable = true;
      div.dataset.ticketId = ticket.id;
      
      const ticketTime = new Date(ticket.timestamp);
      const now = new Date();
      const timeDiff = now - ticketTime;
      const hoursDiff = Math.floor(timeDiff / (1000 * 60 * 60));
      const minutesDiff = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
      let timeColor = 'green';
      if (hoursDiff >= 4) 
      {
        timeColor = 'red';
      } else if (hoursDiff >= 2) 
      {
        timeColor = 'orange';
      } else if (hoursDiff >= 1) 
      {
        timeColor = 'yellow';
      }
      
      const problemPreview = ticket.issue.length > 50 ? ticket.issue.substring(0, 50) + '...' : ticket.issue;
      
      div.innerHTML = `
        <div class="ticket-name" title="${ticket.name}">${ticket.name}</div>
        <div class="problem-preview">
          <b></b> ${problemPreview}
        </div>
        <div class="time-indicator ${timeColor}">
          <b>Tiempo:</b> ${hoursDiff}h ${minutesDiff}m
        </div>
        ${ticket.assigned_user_id ? `<div class="assigned-user-badge">${ticket.assigned_user_name || 'Usuario IT'}</div>` : ''}
        <button class="assign-button" onclick="showAssignModal('${ticket.id}')" title="Asignar ticket">
          <i class="fas fa-plus"></i>
        </button>
      `;
      div.addEventListener('dragstart', handleDragStart);
      div.addEventListener('dragend', handleDragEnd);
      div.addEventListener('dblclick', (e) => {
        e.preventDefault();
        e.stopPropagation();
        showTicketDetails(ticket);
      });
      animateTicketEntry(div);
      return div;
    }

    function showProblemModal(ticketId, problem, userName) 
    {
      const modal = document.createElement('div');
      modal.className = 'problem-modal';
      modal.innerHTML = `
        <div class="problem-modal-content">
          <div class="problem-modal-header">
            <h3>Problema - ${userName}</h3>
            <button class="problem-modal-close" onclick="closeProblemModal()">×</button>
          </div>
          <div class="problem-modal-body">
            <div class="problem-content">
              ${problem}
            </div>
          </div>
        </div>
      `;
      
      document.body.appendChild(modal);
      setTimeout(() => modal.classList.add('active'), 10);
    }

    function closeProblemModal() 
    {
      const modal = document.querySelector('.problem-modal');
      if (modal) 
      {
        modal.classList.remove('active');
        setTimeout(() => modal.remove(), 300);
      }
    }

    async function showAssignModal(ticketId) 
    {
      try 
      {
        const response = await fetch('/api/usuarios/it');
        if (!response.ok) throw new Error('Error al obtener usuarios de IT');
        
        const users = await response.json();
        
        const modal = document.createElement('div');
        modal.className = 'assign-modal';
        modal.innerHTML = `
          <div class="assign-modal-content">
            <div class="assign-modal-header">
              <h3>Asignar Ticket a:</h3>
              <button class="assign-modal-close" onclick="closeAssignModal()">×</button>
            </div>
            <div class="assign-modal-body">
              <div class="users-list">
                ${users.map(user => `
                  <div class="user-item" onclick="assignTicket('${ticketId}', ${user.id}, '${user.nombre_completo}')">
                    <div class="user-info">
                      <span class="user-name">${user.nombre_completo}</span>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        `;
        
        document.body.appendChild(modal);
        setTimeout(() => modal.classList.add('active'), 10);
      } catch (error) {
        console.error('Error al mostrar modal de asignación:', error);
        alert('Error al cargar usuarios de IT');
      }
    }

    async function assignTicket(ticketId, userId, userName) 
    {
      try 
      {
        const response = await fetch(`/api/tickets/${ticketId}/assign`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ assigned_user_id: userId })
        });

        if (!response.ok) throw new Error('Error al asignar ticket');     
        const result = await response.json();
        const ticketElement = document.querySelector(`[data-ticket-id="${ticketId}"]`);
        if (ticketElement) 
        {
          const existingBadge = ticketElement.querySelector('.assigned-user-badge');
          if (existingBadge) 
          {
            existingBadge.remove();
          }

          const newAssignedInfo = document.createElement('div');
          newAssignedInfo.textContent = userName;
          newAssignedInfo.className = 'assigned-user-badge';
          ticketElement.appendChild(newAssignedInfo);
        }
        
        closeAssignModal();
      } catch (error) 
      {
        console.error('Error al asignar ticket:', error);
        alert('Error al asignar el ticket');
      }
    }

    function closeAssignModal() 
    {
      const modal = document.querySelector('.assign-modal');
      if (modal) 
      {
        modal.classList.remove('active');
        setTimeout(() => modal.remove(), 300);
      }
    }

    function handleDragStart(e) {
      draggedTicket = this;
      this.classList.add('dragging');

      function updateTimeIndicators() 
      {
        const tickets = document.querySelectorAll('.ticket');
        tickets.forEach(ticket => {
          const timeIndicator = ticket.querySelector('.time-indicator');
          if (timeIndicator) 
          {
            const ticketId = ticket.dataset.ticketId;
            const currentText = timeIndicator.textContent;
            const timeMatch = currentText.match(/(\d+)h (\d+)m/);
            if (timeMatch) {
              let hours = parseInt(timeMatch[1]);
              let minutes = parseInt(timeMatch[2]);
              minutes++;
              if (minutes >= 60) {
                hours++;
                minutes = 0;
              }
              
              // Actualizar color basado en el tiempo
              let timeColor = 'green';
              if (hours >= 4) 
              {
                timeColor = 'red';
              } else if (hours >= 2) 
              {
                timeColor = 'orange';
              } else if (hours >= 1) 
              {
                timeColor = 'yellow';
              }
              
              timeIndicator.textContent = `Tiempo: ${hours}h ${minutes}m`;
              timeIndicator.className = `time-indicator ${timeColor}`;
            }
          }
        });
      }

      setInterval(updateTimeIndicators, 60000);
      let isUpdating = false;
      async function checkForUpdates() {
        if (isUpdating) return;
        
        try

            headers: {
              'Cache-Control': 'no-cache',
              'Pragma': 'no-cache'
            }
          });
          
          if (!response.ok) 
          {
            throw new Error('Error al verificar actualizaciones');
          }
          
          const { hasUpdates } = await response.json();

          {
            await loadTickets();
          }
        } catch (error) 
        {
          console.error('Error al verificar actualizaciones:', error);
        } finally 
        {
          isUpdating = false;
        }
      }
      
      setInterval(checkForUpdates, 10000); // Verificar cada 10 segundos

    function loadCompletedTicketsPage() {
      const completedTicketsGrid = document.getElementById('completedTicketsGrid');
      if (currentPage === 0) 
      {
        completedTicketsGrid.innerHTML = '';
      }
      
      const startIndex = currentPage * TICKETS_PER_PAGE;
      const endIndex = startIndex + TICKETS_PER_PAGE;
      const ticketsToShow = allCompletedTickets.slice(startIndex, endIndex);
      
      if (ticketsToShow.length === 0 && currentPage === 0) 
      {
        completedTicketsGrid.innerHTML = '<div class="no-tickets-message">No hay tickets terminados</div>';
        return;
      }

      ticketsToShow.forEach(ticket => {

        ticketElement.className = 'completed-ticket';

    function updateLoadMoreButton() 
    {
      const completedTicketsGrid = document.getElementById('completedTicketsGrid');
      const totalTickets = allCompletedTickets.length;

      const existingButton = completedTicketsGrid.querySelector('.load-more-button');
      if (existingButton) 
      {
        existingButton.remove();
      }

      if (loadedTickets < totalTickets) 
      {
        const loadMoreButton = document.createElement('div');

        loadMoreButton.innerHTML = `
          <button class="load-more-button" onclick="loadMoreTickets()">

          </button>
        `;
        completedTicketsGrid.appendChild(loadMoreButton);

    async function deleteCompletedTicket(ticketId) 
    {
      if (!confirm('¿Estás seguro de que deseas eliminar permanentemente este ticket?')) {
        return;
      }

      try 
      {
        const response = await fetch(`/api/tickets/${ticketId}`, {
          method: 'DELETE'
        });

        if (!response.ok) 
        {
          throw new Error('Error al eliminar el ticket');
        }

        allCompletedTickets = allCompletedTickets.filter(ticket => ticket.id !== ticketId);
        const ticketElement = document.querySelector(`.completed-ticket button[onclick="deleteCompletedTicket('${ticketId}')"]`).parentElement;
        ticketElement.remove();
        const countSpan = completedButton.querySelector('.ticket-count');
        let currentCount = parseInt(countSpan.textContent, 10) || 0;
        countSpan.textContent = Math.max(0, currentCount - 1);
        updateLoadMoreButton();
        const completedTicketsGrid = document.getElementById('completedTicketsGrid');
        if (allCompletedTickets.length === 0) 
        {
          completedTicketsGrid.innerHTML = '<div class="no-tickets-message">No hay tickets terminados</div>';
        }
      } catch (error) 
      {
        console.error('Error:', error);
        alert('Error al eliminar el ticket: ' + error.message);
      }
    }

      updateInput.value = '';
      updateInput.removeEventListener('keydown', handleUpdateKeyPress);
      document.getElementById('updatesThread').innerHTML = '';
    }
    function escapeHtml(str) {
      if (str === null || str === undefined) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    async function loadTicketUpdates(ticketId) {
      const updatesThread = document.getElementById('updatesThread');
      
      try {
        const response = await fetch(`/api/tickets/${ticketId}/messages`);
        if (!response.ok) {
          throw new Error('Error al cargar mensajes');
        }
        
        const updates = await response.json();
        
        if (updates.length === 0) {
          updatesThread.innerHTML = `
            <div class="no-updates">
              <i class="fas fa-comments" style="font-size: 48px; color: #666; margin-bottom: 15px;"></i>
              <p style="color: #888; text-align: center;">No hay mensajes aún.</p>
            </div>
          `;
          return;
        }
        
        updatesThread.innerHTML = updates.map(update => {
          let displaySender;
          let badgeHtml = '';
          
          if (update.is_staff) 
          {
            displaySender = 'Usted';
            badgeHtml = '<span class="staff-badge">IT</span>';
          } else 
          {
            if (update.sender === 'Sistema') 
            {
              displaySender = window.currentTicketUserName || 'Usuario';
            } else 
            {
              displaySender = update.sender;
            }
          }
          
          return `
            <div class="update-item">
              <div class="update-header">
                <div class="update-author">
                  <i class="fas fa-user-circle"></i>
                  <span>${escapeHtml(displaySender)}</span>
                  ${badgeHtml}
                </div>
                <div class="update-timestamp">${new Date(update.timestamp).toLocaleString()}</div>
              </div>
              <div class="update-content">${escapeHtml(update.content).replace(/\n/g, '<br>')}</div>
            </div>
          `;
        }).join('');
        
        // Scroll al final
        updatesThread.scrollTop = updatesThread.scrollHeight;
      } catch (error) {
        console.error('Error al cargar mensajes:', error);
        updatesThread.innerHTML = `
          <div class="no-updates">
            <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: #ff6b6b; margin-bottom: 15px;"></i>
            <p style="color: #ff6b6b; text-align: center;">Error al cargar mensajes</p>
          </div>
        `;
      }
    }

    let messagePollingInterval = null;
    let lastMessageCount = 0;
    function startMessagePolling(ticketId) 
    {
      stopMessagePolling();
      loadTicketUpdates(ticketId).then(() => {
        const updatesThread = document.getElementById('updatesThread');
        lastMessageCount = updatesThread.children.length;
      });

      messagePollingInterval = setInterval(async () => {
        try 
        {
          const response = await fetch(`/api/tickets/${ticketId}/messages`);
          if (!response.ok) return;
          
          const updates = await response.json();
          
          if (updates.length > lastMessageCount) 
          {
            await loadTicketUpdates(ticketId);
            lastMessageCount = updates.length;
          }
        } catch (error) {
          console.error('Error al verificar mensajes:', error);
        }
      }, 3000);
    }

    function stopMessagePolling() 
    {
      if (messagePollingInterval) 
      {
        clearInterval(messagePollingInterval);
        messagePollingInterval = null;
      }
      lastMessageCount = 0;
    }

    async function sendUpdate() {
      const updateInput = document.getElementById('updateInput');
      const content = updateInput.value.trim();
      
      if (!content) {
        alert('Por favor escribe un mensaje');
        return;
      }
      
      const ticketId = window.currentTicketId;
      if (!ticketId) 
      {
        alert('Error: No se pudo identificar el ticket');
        return;
      }
      
      try 
      {
        const response = await fetch(`/api/tickets/${ticketId}/messages`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            content: content,
            is_staff: true
          })
        });
        
        if (!response.ok) 
        {
          throw new Error('Error al enviar mensaje');
        }
        updateInput.value = '';
        await loadTicketUpdates(ticketId);
        showNotification('Mensaje enviado correctamente', 'success');
      } catch (error) 
      {
        console.error('Error al enviar mensaje:', error);
        showNotification('Error al enviar mensaje', 'error');
      }
    }

    function handleUpdateKeyPress(event) 
    {
      if (event.key === 'Enter' && !event.shiftKey) 
      {
        event.preventDefault();
        sendUpdate();
      }
    }

    function showNotification(message, type = 'info') 
    {
      const notification = document.createElement('div');
      notification.className = `notification notification-${type}`;
      notification.textContent = message; 
      document.body.appendChild(notification);
      setTimeout(() => notification.classList.add('show'), 100);
      setTimeout(() => {
        notification.classList.remove('show');
        setTimeout(() => notification.remove(), 300);
      }, 3000);
    }

    document.addEventListener('keydown', function(event) 
    {
      if (event.key === 'Escape') 
      {
        const updatesModal = document.getElementById('updatesModal');
        if (updatesModal.classList.contains('active')) 
        {
          closeUpdatesModal();
        }
      }
    });
  </script>
  <script src="js/permisos.js"></script>
  <script src="js/topbar.js"></script>
  <script src="js/floating-buttons.js"></script>
</body>
