  <script>
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(() => {
        document.querySelectorAll('.menu-item.has-submenu').forEach(menuItem => {
          const submenu = menuItem.querySelector('.submenu');
          const arrow = menuItem.querySelector('.submenu-arrow');

          menuItem.addEventListener('click', function(e) {
            if (e.target.closest('.submenu')) return;
            e.preventDefault();
            e.stopPropagation();

            document.querySelectorAll('.menu-item.has-submenu .submenu.active').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-item.has-submenu .submenu-arrow').forEach(a => a.style.transform = 'rotate(0deg)');

            if (submenu) {
              submenu.classList.toggle('active');
              if (submenu.classList.contains('active')) {
                arrow.style.transform = 'rotate(180deg)';
              } else {
                arrow.style.transform = 'rotate(0deg)';
              }
            }
          });
        });

        document.addEventListener('click', function(e) {
          if (!e.target.closest('.menu-item.has-submenu') && !e.target.closest('.submenu')) {
            document.querySelectorAll('.menu-item.has-submenu .submenu.active').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-item.has-submenu .submenu-arrow').forEach(a => a.style.transform = 'rotate(0deg)');
          }
        });
      }, 1500);
    });
  </script>

  <script>
    // Control de submenús desplegables para la barra superior
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(() => {
        // Control de submenús
        document.querySelectorAll('.menu-item.has-submenu').forEach(menuItem => {
          const submenu = menuItem.querySelector('.submenu');
          const arrow = menuItem.querySelector('.submenu-arrow');

          menuItem.addEventListener('click', function(e) {
            // Solo si el clic es en el propio botón, no en el submenú
            if (e.target.closest('.submenu')) return;
            e.preventDefault();
            e.stopPropagation();

            // Oculta todos los submenús primero
            document.querySelectorAll('.menu-item.has-submenu .submenu.active').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-item.has-submenu .submenu-arrow').forEach(a => a.style.transform = 'rotate(0deg)');

            // Alterna el submenú del botón clickeado
            if (submenu) {
              submenu.classList.toggle('active');
              if (submenu.classList.contains('active')) {
                arrow.style.transform = 'rotate(180deg)';
              } else {
                arrow.style.transform = 'rotate(0deg)';
              }
            }
          });
        });

        // Ocultar submenús al hacer clic fuera
        document.addEventListener('click', function(e) {
          if (!e.target.closest('.menu-item.has-submenu') && !e.target.closest('.submenu')) {
            document.querySelectorAll('.menu-item.has-submenu .submenu.active').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-item.has-submenu .submenu-arrow').forEach(a => a.style.transform = 'rotate(0deg)');
          }
        });

        // Highlight y efecto cromático
        function moverHighlight() {
          const topbar = document.querySelector('.topbar');
          const highlight = topbar.querySelector('.glass-highlight');
          const btnSel = topbar.querySelector('.menu-item.selected');
          if (!btnSel) return;
          const rectTopbar = topbar.getBoundingClientRect();
          const rectBtn = btnSel.getBoundingClientRect();
          const left = rectBtn.left - rectTopbar.left;
          highlight.style.left = left + 'px';
          highlight.style.width = rectBtn.width + 'px';
        }

        function addChromaticEffect(element) {
          element.classList.add('clicked');
          setTimeout(() => {
            element.classList.remove('clicked');
          }, 600);
        }

        document.querySelectorAll('.menu-item').forEach(button => {
          button.addEventListener('click', function() {
            document.querySelectorAll('.menu-item.selected').forEach(b => b.classList.remove('selected'));
            this.classList.add('selected');
            addChromaticEffect(this);
            moverHighlight();
          });
        });

        const userIcon = document.getElementById('userIcon'); //Efecto cromático al icono de usuario
        if (userIcon) {
          userIcon.addEventListener('click', function() {
            addChromaticEffect(this);
          });
        }

        setTimeout(() => {
          moverHighlight();
        }, 100);
        window.addEventListener('resize', moverHighlight);
      }, 1500);
    });

    document.querySelectorAll('.lisa-btn-cromatica').forEach(btn => {
      btn.addEventListener('click', function() {
        btn.classList.remove('clicked');
        void btn.offsetWidth; // Reflow para reiniciar animación
        btn.classList.add('clicked');
      });
    });
  </script>
  <script>
    function getContrastYIQ(hexcolor) { //Contraste automático para el texto del topbar
      hexcolor = hexcolor.replace('#', '');
      if (hexcolor.length === 3) {
        hexcolor = hexcolor[0]+hexcolor[0]+hexcolor[1]+hexcolor[1]+hexcolor[2]+hexcolor[2];
      }
      var r = parseInt(hexcolor.substr(0,2),16);
      var g = parseInt(hexcolor.substr(2,2),16);
      var b = parseInt(hexcolor.substr(4,2),16);
      var yiq = ((r*299)+(g*587)+(b*114))/1000;
      return (yiq >= 128) ? 'dark' : 'light';
    }

    function updateTopbarContrast() {
      // Detecta el color de fondo real de la topbar
      const topbar = document.querySelector('.topbar');
      if (!topbar) return;
      let bg = window.getComputedStyle(topbar).backgroundColor;
      // Convierte a hex
      function rgb2hex(rgb) {
        if (!rgb) return '#fff';
        let result = rgb.match(/rgba?\((\d+), (\d+), (\d+)/);
        if (!result) return '#fff';
        return '#' +
          (parseInt(result[1]).toString(16).padStart(2, '0')) +
          (parseInt(result[2]).toString(16).padStart(2, '0')) +
          (parseInt(result[3]).toString(16).padStart(2, '0'));
      }
      let hex = rgb2hex(bg);
      let contrast = getContrastYIQ(hex);
      // Aplica el data-contrast a los elementos del menú
      document.querySelectorAll('.menu-item, .submenu-item, .topbar-header h1, .lisa-btn-cromatica').forEach(el => {
        el.setAttribute('data-contrast', contrast);
      });
    }
    // Ejecuta al cargar y al cambiar el tema
    document.addEventListener('DOMContentLoaded', updateTopbarContrast);
    window.addEventListener('resize', updateTopbarContrast);
    // Si tienes un switch de tema, llama a updateTopbarContrast() después de cambiar el tema
  </script>

  <script>
    // Nueva función para calcular el porcentaje de completado
    function getCompletionPercentage(date) {
      const dayEvents = events.filter(event => {
        const eventDate = new Date(event.fecha_evento);
        const compareDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        return eventDate.getTime() === compareDate.getTime();
      });

      if (dayEvents.length === 0) {
        return 0;
      }

      const completedEvents = dayEvents.filter(event => event.completado);
      const percentage = Math.round((completedEvents.length / dayEvents.length) * 100);
      return percentage;
    }

    // Función para calcular el promedio del mes activo (mes actual)
    function calculateCurrentMonthAverage() {
      const currentDate = new Date();
      const currentMonth = currentDate.getMonth();
      const currentYear = currentDate.getFullYear();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      
      let totalPercentage = 0;
      let daysWithEvents = 0;

      // Calcular para todos los días del mes actual
      for (let day = 1; day <= daysInMonth; day++) {
        const date = new Date(currentYear, currentMonth, day);
        const percentage = getCompletionPercentage(date);
        
        // Solo contar días que tienen eventos
        const dayEvents = events.filter(event => {
          const eventDate = new Date(event.fecha_evento);
          const compareDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
          return eventDate.getTime() === compareDate.getTime();
        });

        if (dayEvents.length > 0) {
          totalPercentage += percentage;
          daysWithEvents++;
        }
      }

      // Si no hay días con eventos, retornar 0
      if (daysWithEvents === 0) {
        return 0;
      }

      return Math.round(totalPercentage / daysWithEvents);
    }

    // Función para obtener el promedio del mes actual
    function getCurrentMonthAverage() {
      return calculateCurrentMonthAverage();
    }

    // Función para actualizar el porcentaje en detalles_mantenimiento_preventivo.html
    function updateMaintenanceStats() {
      const currentAverage = getCurrentMonthAverage();
      const currentMonth = new Date().getMonth();
      const currentYear = new Date().getFullYear();
      
      // Guardar en localStorage para que esté disponible en otros archivos
      localStorage.setItem('maintenanceMonthlyAverage', currentAverage);
      
      // Guardar el promedio del mes actual con clave específica
      localStorage.setItem(`maintenanceMonthlyAverage_${currentYear}_${currentMonth}`, currentAverage);
      
      // También puedes enviar a una API si es necesario
      fetch('/api/mantenimiento/estadisticas/promedio-mensual', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          promedio: currentAverage,
          mes: currentMonth + 1,
          año: currentYear
        })
      }).catch(error => {
        console.log('No se pudo enviar el promedio a la API:', error);
      });
    }

    // Llamar a la función cuando se carguen los eventos
    async function loadEventsFromDatabase() {
        try {
            const response = await fetch('/api/mantenimiento/calendario/eventos');
            if (response.ok) {
                events = await response.json();
                renderMonthlyCalendar();
                renderYearlyCalendar();
                if (selectedDate) {
                    loadEvents();
                }
                // Actualizar estadísticas después de cargar eventos
                updateMaintenanceStats();
            } else {
                console.error('Error al cargar eventos:', response.statusText);
            }
        } catch (error) {
            console.error('Error al cargar eventos:', error);
        }
    }
