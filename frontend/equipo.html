  <!-- Modal para ver detalles del empleado -->
  <div class="modal" id="employeeModal">
    <div class="modal-content glass-card">

      <div class="modal-header">
        <h3 id="modalEmployeeName">Employee Details</h3>
        <button class="modal-close" id="closeModal">

        </button>

      <div class="modal-body" id="modalBody">

  <!-- Modal para agregar número de parte -->

  <!-- Modal para agregar/editar orden -->
  <div class="modal" id="orderModal">
    <div class="modal-content glass-card">
      <div class="modal-header">
        <h3 id="modalOrderTitle">New Production Order</h3>
        <button class="modal-close" id="closeOrderModal">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <form id="orderForm">
        <div class="form-group">
          <label for="orderClient">Client *</label>
          <select id="orderClient" name="cliente" required>
            <option value="">Select a client</option>
            <option value="SMD">SMD</option>
            <option value="PDM">PDM</option>
            <option value="RS">RS</option>
            <option value="CREW">CREW</option>
            <option value="SPOONERS">SPOONERS</option>
            <option value="LEVEL-23">LEVEL-23</option>
            <option value="GD">GD</option>
            <option value="MXC">MXC</option>
            <option value="IH">IH</option>
            <option value="SSW">SSW</option>
            <option value="CSM">CSM</option>
            <option value="WM">WM</option>
            <option value="OCS">OCS</option>
          </select>

        <div class="form-group">
          <label for="orderNumber">Order Number *</label>
          <input type="text" id="orderNumber" name="nombre" required placeholder="Example: 5004.A">

        <div class="form-group">
          <label for="orderCustomerJob">Customer Job *</label>
          <input type="text" id="orderCustomerJob" name="customer_job" required placeholder="Example: 182024">

        <div class="form-group">
          <label for="orderProjectSelect">Project Name *</label>
          <select id="orderProjectSelect" required>
            <option value="">Loading projects...</option>
          </select>
        </div>
        <div class="form-group new-project-input" id="newProjectNameGroup" style="display: none;">
          <label for="orderProjectName">New Project Name *</label>
          <input type="text" id="orderProjectName" name="project_name" placeholder="Example: ECON 10th & Robinson- Balcony Rails North Elevation (L2 to L4)">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="cancelOrderBtn">Cancel</button>
          <button type="submit" class="btn-save">Save Order</button>
        </div>
        <input type="hidden" id="orderId" name="orderId">
      </form>
    </div>
  </div>

  <script>
    let activeUsers = [];
    let designEmployees = [];
    let editingOrderId = null;
    let currentView = 'orders';
    let projectsList = [];
    let isLoadingProjects = false;
    const sessionsCache = new Map();
    const scoresCache = new Map();
    const CACHE_DURATION = 30000; // 30 segundos de cache
    const resizedImagesCache = new Map();//Imagenes  renderizadas en cache
    
    function resizeImageToHalf(imageUrl) //Renderiza la imagen a la mitad de su tamaño original para evitar consumo excesivo de memoria
    {
      const cached = resizedImagesCache.get(imageUrl);
      if (cached && cached !== imageUrl) 
      {
        return Promise.resolve(cached);
      }
      if (imageUrl.startsWith('data:')) 
      {
        return Promise.resolve(imageUrl);
      }
      
      const resizePromise = new Promise((resolve) => {
        const img = new Image();
        
        try 
        {
          if (!imageUrl.startsWith(window.location.origin) && !imageUrl.startsWith('/')) 
          {
            img.crossOrigin = 'anonymous';
          }
        } catch (e) {
        }
        
        img.onload = function() 
        {
          try 
          {
            const canvas = document.createElement('canvas');
            canvas.width = Math.floor(img.width / 2);
            canvas.height = Math.floor(img.height / 2);
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            const resizedDataUrl = canvas.toDataURL('image/jpeg', 0.85);
            resizedImagesCache.set(imageUrl, resizedDataUrl);
            resolve(resizedDataUrl);
          } catch (error) 
          {
            console.error('Error redimensionando imagen:', error);
            resizedImagesCache.set(imageUrl, imageUrl);
            resolve(imageUrl);
          }
        };
        
        img.onerror = function() 
        {
          resizedImagesCache.set(imageUrl, imageUrl);
          resolve(imageUrl);
        };
        
        img.src = imageUrl;
      });
      return resizePromise;
    }
  
    function processResizedImages(container) 
    {
      const images = container.querySelectorAll('img.avatar-photo-list[data-original-src]');
      images.forEach(img => {
        const originalSrc = img.getAttribute('data-original-src');
        if (originalSrc && !img.hasAttribute('data-resized')) 
        {
          img.setAttribute('data-resized', 'true');
          resizeImageToHalf(originalSrc).then(resizedUrl => {
            if (img.src !== resizedUrl) 
            {
              img.src = resizedUrl;
            }
          });
        }
      });
    }
    // Verificar autenticación
    document.addEventListener('DOMContentLoaded', function() 
    {
      const username = localStorage.getItem('username');
      const isLoggedIn = localStorage.getItem('isLoggedIn');

      if (!isLoggedIn || isLoggedIn !== 'true') 
      {
        window.location.href = 'login.html';
        return;
      }

      const rol = localStorage.getItem('rol');
      if (rol === 'diseñador') 
      {
        // Hide all tabs except Home and Design
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
          const text = item.textContent.trim().toLowerCase();
          if (text !== 'home' && text !== 'design') 
          {
            item.style.display = 'none';
          }
        });
      }
      if (rol === 'pm') {
        // Ocultar todas las pestañas excepto Home y PM
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
          const text = item.textContent.trim().toLowerCase();
          const href = item.getAttribute('href') || '';
          if (text !== 'home' && !href.includes('pm.html')) {
            item.style.display = 'none';
          }
        });
      }

      if (username) 
      {
        loadEmployeeNameAndPhoto(username);
      }
      
      async function loadEmployeeNameAndPhoto(username) 
      {
        try 
        {
          const responseDesign = await fetch('/api/employees/design');
          const responseIT = await fetch('/api/employees/it');
          let employee = null;
          if (responseDesign.ok) 
          {
            const data = await responseDesign.json();
            if (data.success && data.employees) 
            {
              employee = data.employees.find(emp => {
                const empName = (emp.nombre_completo || `${emp.nombre || ''} ${emp.apellidos || ''}`).toLowerCase();
                return empName.includes(username.toLowerCase()) || (emp.usuario && emp.usuario.toLowerCase() === username.toLowerCase());
              });
            }
          }
          
          if (!employee && responseIT.ok) 
          {
            const data = await responseIT.json();
            if (data.success && data.employees) {
              employee = data.employees.find(emp => {
                const empName = (emp.nombre_completo || `${emp.nombre || ''} ${emp.apellidos || ''}`).toLowerCase();
                return empName.includes(username.toLowerCase()) || (emp.usuario && emp.usuario.toLowerCase() === username.toLowerCase());
              });
            }
          }
          
          if (employee) 
          {
            const fullName = employee.nombre_completo || employee.nombre || username;
            const firstName = fullName.split(' ')[0];
            document.getElementById('username').textContent = firstName;
            if (employee.foto_url) 
            {
              updateTopbarPhoto(employee.foto_url);
            } else 
            {
              const avatar = document.querySelector('.user-avatar');
              if (avatar) 
              {
                const initialsDiv = avatar.querySelector('.avatar-initials');
                if (initialsDiv) 
                {
                  const initials = firstName.substring(0, 2).toUpperCase();
                  initialsDiv.textContent = initials;
                  initialsDiv.style.display = 'flex';
                }
              }
            }
          } else 
          {
            const firstName = username.split(' ')[0];
            document.getElementById('username').textContent = firstName;
            const avatar = document.querySelector('.user-avatar');
            if (avatar) 
            {
              const initialsDiv = avatar.querySelector('.avatar-initials');
              if (initialsDiv) 
              {
                const initials = firstName.substring(0, 2).toUpperCase();
                initialsDiv.textContent = initials;
                initialsDiv.style.display = 'flex';
              }
            }
          }
        } catch (error) 
        {
          console.error('Error al cargar información del empleado:', error);
          // Fallback: usar solo el primer nombre del username
          const firstName = username.split(' ')[0];
          document.getElementById('username').textContent = firstName;
        }
      }
      
      async function loadUserPhoto(username) 
      {
        await loadEmployeeNameAndPhoto(username);
      }
      
      function updateTopbarPhoto(photoUrl) 
      {
        const avatar = document.querySelector('.user-avatar');
        if (avatar) 
        {
          const initials = avatar.querySelector('.avatar-initials');
          if (initials) 
          {
            initials.style.display = 'none';
          }
          
          let img = avatar.querySelector('img');
          if (!img) 
          {
            img = document.createElement('img');
            img.className = 'avatar-photo-topbar';
            img.alt = 'User';
            avatar.appendChild(img);
          }
          img.src = photoUrl;
          img.style.display = 'block';
          img.onerror = function() {
            this.style.display = 'none';
            if (initials) initials.style.display = 'flex';
          };
        }
      }

      // Función para verificar si hay una orden activa
      function hasActiveOrder() 
      {
        const activeSession = localStorage.getItem('activeSession');
        if (activeSession) 
        {
          try 
          {
            const session = JSON.parse(activeSession);
            if (session.orderNumber && session.startTime) 
            {
              return true;
            }
          } catch (e) 
          {
            console.error('Error al parsear activeSession:', e);
          }
        }
        return false;
      }

      document.getElementById('logoutBtn').addEventListener('click', async function(e) //Logout
      {
        if (hasActiveOrder()) 
        {
          e.preventDefault();
          await showAlertModal('You cannot log out while you have an active order. Please go to the Design page and finish the order first.', 'Warning');
          return;
        }

        localStorage.clear();
        window.location.href = 'login.html';
      });

      window.addEventListener('beforeunload', function(e) 
      {
        if (hasActiveOrder()) 
        {
          e.preventDefault();
          e.returnValue = 'You have an active order. Are you sure you want to close the tab? You must finish the order first from the Design page.';
          return e.returnValue;
        }
      });
      switchView('orders');

      setInterval(() => {
        if (currentView === 'users') 
        {
          sessionsCache.clear();
          scoresCache.clear();
          loadActiveUsers();
        }
      }, 10000);

      // Filtros
      document.getElementById('searchInput').addEventListener('input', function() {
        if (currentView === 'users') 
        {
          filterActiveUsers();
        } else if (currentView === 'orders') 
        {
          filterOrders();
        }
      });

      document.getElementById('viewUsersBtn').addEventListener('click', function() 
      {
        switchView('users');
      });
      document.getElementById('viewOrdersBtn').addEventListener('click', function() 
      {
        switchView('orders');
      });

      document.getElementById('closeModal').addEventListener('click', closeModal);
      document.getElementById('employeeModal').addEventListener('click', function(e) 
      {
        if (e.target === this) 
        {
          closeModal();
        }
      });

      document.getElementById('closeSessionsBtn').addEventListener('click', async function() {
        try 
        {
          const token = localStorage.getItem('sessionToken');
          if (!token) 
          {
            await showAlertModal('No session token available', 'Error');
            return;
          }

          const listResponse = await fetch('/api/sesiones-activas', 
          {
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json'
            }
          });

          if (!listResponse.ok) 
          {
            await showAlertModal('Error getting active sessions', 'Error');
            return;
          }

          const listData = await listResponse.json();
          const sessions = listData.sessions || [];

          if (sessions.length === 0) 
          {
            await showAlertModal('There are no active sessions to close.', 'Information');
            return;
          }

          showSessionsModal(sessions, token);
        } catch (error) 
        {
          console.error('Error al obtener sesiones activas:', error);
          await showAlertModal('Error getting active sessions. Please try again.', 'Error');
        }
      });

      function showSessionsModal(sessions, token) {
        let modal = document.getElementById('sessionsModal');
        if (!modal) {
          modal = document.createElement('div');
          modal.id = 'sessionsModal';
          modal.className = 'modal';
          modal.innerHTML = `
            <div class="modal-content glass-card" style="max-width: 800px; max-height: 80vh; overflow-y: auto;">
              <div class="modal-header">
                <h2>Sesiones Activas</h2>
                <button class="close-modal" id="closeSessionsModal">&times;</button>
              </div>
              <div class="modal-body">
                <div id="sessionsList"></div>
                <div class="modal-actions" style="margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end;">
                  <button class="btn-secondary" id="closeAllStuckBtn">Cerrar Sesiones Huérfanas (>2h)</button>
                  <button class="btn-primary" id="closeSessionsModalBtn">Cerrar</button>
                </div>
              </div>
            </div>
          `;
          document.body.appendChild(modal);

          // Event listeners del modal
          document.getElementById('closeSessionsModal').addEventListener('click', () => {
            modal.style.display = 'none';
          });
          document.getElementById('closeSessionsModalBtn').addEventListener('click', () => {
            modal.style.display = 'none';
          });
          modal.addEventListener('click', (e) => {
            if (e.target === modal) 
            {
              modal.style.display = 'none';
            }
          });
        }

        const sessionsList = document.getElementById('sessionsList');
        sessionsList.innerHTML = '';

        if (sessions.length === 0) 
        {
          sessionsList.innerHTML = '<p>No hay sesiones activas.</p>';
          modal.style.display = 'block';
          return;
        }

        sessions.forEach(session => {
          const sessionDiv = document.createElement('div');
          sessionDiv.className = 'session-item glass-card';
          sessionDiv.style.cssText = 'padding: 15px; margin-bottom: 10px; border-radius: 10px;';
          
          const ultimaActualizacion = new Date(session.ultima_actualizacion);
          const horasSinActualizar = (Date.now() - ultimaActualizacion.getTime()) / (1000 * 60 * 60);
          const isStuck = horasSinActualizar > 2;
          
          sessionDiv.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <div>
                <strong>${session.usuario_nombre || session.nombre || 'Usuario'}</strong>
                <br>
                <small>Orden: ${session.orden_nombre}</small>
                <br>
                <small>Última actualización: ${ultimaActualizacion.toLocaleString()}</small>
                <br>
                <small style="color: ${isStuck ? '#ef4444' : '#10b981'};">
                  ${isStuck ? `⚠️ Huérfana (${horasSinActualizar.toFixed(1)}h sin actualizar)` : '✓ Activa'}
                </small>
              </div>
              <button class="btn-danger" onclick="closeSession(${session.usuario_id}, '${session.usuario_nombre}')" style="padding: 8px 16px;">
                Cerrar Sesión
              </button>
            </div>
          `;
          sessionsList.appendChild(sessionDiv);
        });

        // Botón para cerrar todas las sesiones huérfanas
        document.getElementById('closeAllStuckBtn').onclick = async () => {
          const confirmed = await showConfirmModal('Are you sure you want to close all active sessions that have been inactive for more than 2 hours?', 'Confirm Action');
          if (!confirmed) 
          {
            return;
          }

          try 
          {
            const response = await fetch('/api/sesiones-activas/cerrar-huérfanas?horas=2', {
              method: 'DELETE',
              headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
              }
            });

            const data = await response.json();
            
            if (response.ok && data.success) 
            {
              await showAlertModal(`${data.deleted} orphaned active sessions were closed successfully.`, 'Success');
              modal.style.display = 'none';
              // Recargar la lista de usuarios activos
              if (currentView === 'users') 
              {
                loadActiveUsers();
              }
            } else 
            {
              await showAlertModal('Error closing sessions: ' + (data.error || 'Unknown error'), 'Error');
            }
          } catch (error) 
          {
            console.error('Error al cerrar sesiones:', error);
            await showAlertModal('Error closing active sessions. Please try again.', 'Error');
          }
        };

        // Función global para cerrar sesión individual
        window.closeSession = async function(usuarioId, usuarioNombre) {
          if (!confirm(`¿Estás seguro de que quieres cerrar la sesión activa de ${usuarioNombre}?`)) 
          {
            return;
          }

          try 
          {
            const response = await fetch(`/api/sesiones-activas/${usuarioId}`, {
              method: 'DELETE',
              headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
              }
            });

            const data = await response.json();
            
            if (response.ok && data.success) 
            {
              await showAlertModal(`Session for ${usuarioNombre} closed successfully.`, 'Success');
              // Recargar modal
              const listResponse = await fetch('/api/sesiones-activas', {
                headers: {
                  'Authorization': `Bearer ${token}`,
                  'Content-Type': 'application/json'
                }
              });
              const listData = await listResponse.json();
              showSessionsModal(listData.sessions || [], token);
              // Recargar la lista de usuarios activos
              if (currentView === 'users') 
              {
                loadActiveUsers();
              }

    async function loadProjectsList(force = false) 
    {
      if (isLoadingProjects && !force) return;
      isLoadingProjects = true;
      let fetchedProjects = [];
      
      // Intentar obtener proyectos desde endpoint dedicado
      try 
      {
        const response = await fetch('/api/projects');
        if (response.ok) 
        {
          const data = await response.json();
          if (data.success && data.projects) 
          {
            fetchedProjects = data.projects
              .map(project => project.project_name || project.nombre || '')
              .filter(name => name && name.trim().length > 0);
          }
        }
      } catch (error) 
      {
        console.warn('API /api/projects no disponible, usando fallback:', error);
      }
      
      if (fetchedProjects.length === 0) 
      {
        try 
        {
          const ordersResponse = await fetch('/api/orders');
          if (ordersResponse.ok) 
          {
            const ordersData = await ordersResponse.json();
            const orders = ordersData.success && ordersData.orders ? ordersData.orders : [];
            fetchedProjects = orders
              .map(order => order.project_name || '')
              .filter(name => name && name.trim().length > 0);
          }
        } catch (error) 
        {
          console.error('Error al cargar proyectos desde órdenes:', error);
        }
      }
      
      projectsList = [...new Set(fetchedProjects.map(name => name.trim()))]
        .filter(Boolean)
        .sort((a, b) => a.localeCompare(b));
      
      populateProjectOptions();
      isLoadingProjects = false;
    }

    function populateProjectOptions(selectedName = '') 
    {
      const projectSelect = document.getElementById('orderProjectSelect');
      if (!projectSelect) return;
      
      projectSelect.innerHTML = '';
      const placeholderOption = document.createElement('option');
      placeholderOption.value = '';
      placeholderOption.textContent = projectsList.length > 0 ? 'Select a project' : 'No projects available';
      projectSelect.appendChild(placeholderOption);
      
      projectsList.forEach(projectName => {
        const option = document.createElement('option');
        option.value = projectName;
        option.textContent = projectName;
        projectSelect.appendChild(option);
      });
      
      const createOption = document.createElement('option');
      createOption.value = '__new__';
      createOption.textContent = '+ Add new project';
      projectSelect.appendChild(createOption);
      
      if (selectedName) {
        const exists = projectsList.includes(selectedName);
        if (!exists) {
          const dynamicOption = document.createElement('option');
          dynamicOption.value = selectedName;
          dynamicOption.textContent = selectedName;
          projectSelect.insertBefore(dynamicOption, createOption);
        }
        projectSelect.value = selectedName;
      } else {
        projectSelect.value = '';
      }
      
      toggleNewProjectInput(projectSelect.value === '__new__');
    }

    function toggleNewProjectInput(show) {
      const newProjectGroup = document.getElementById('newProjectNameGroup');
      const newProjectInput = document.getElementById('orderProjectName');
      if (!newProjectGroup || !newProjectInput) return;
      
      newProjectGroup.style.display = show ? 'block' : 'none';
      newProjectInput.value = show ? newProjectInput.value : '';
      newProjectInput.required = show;
    }

    function handleProjectSelectChange(event) {
      const value = event.target.value;
      toggleNewProjectInput(value === '__new__');
    }

          startTime: null,
          pausedTime: 0,
          timeInOrder: 0,
          createdAt: null,
          department: employee.department,
          position: employee.position,
          fotoUrl: employee.fotoUrl || null
        });
        }
      }
      
      renderActiveUsers();
    }

    async function renderActiveUsers() {
      const list = document.getElementById('teamList');
      
      if (activeUsers.length === 0) {
        list.innerHTML = '<div class="empty-state-list glass-card"><i class="fas fa-users"></i><p>No employees in the Design department</p></div>';
        return;
      }
      
      // Calcular puntuación y ordenar usuarios en segundo plano (no bloquea el renderizado inicial)
      // Esto permite mostrar la lista inmediatamente mientras se calculan las puntuaciones
      const calculateScoresPromise = calculateAndSortUsersByScore(activeUsers).then(() => {
        // Reordenar después de calcular las puntuaciones
        reorderUsersByScore(list, activeUsers);
      });

      // Limpiar elementos que no son usuarios (órdenes, proyectos, etc.)
      // Solo mantener elementos que son filas de usuarios válidas
      const allChildren = Array.from(list.children);
      allChildren.forEach(child => {
        // Si no es una fila de usuario válida (no tiene data-username), eliminarla
        if (!child.classList.contains('team-list-item') || !child.hasAttribute('data-username')) {
          // También limpiar intervalos si existen
          const timeDisplay = child.querySelector('.time-display[data-interval-id]');
          if (timeDisplay) {
            const intervalId = timeDisplay.getAttribute('data-interval-id');
            if (intervalId) {
              clearInterval(parseInt(intervalId));
            }
          }
          child.remove();
        }
      });

      // NO limpiar todos los intervalos aquí - solo limpiaremos los de elementos que se eliminan o actualizan
      // Esto permite que los contadores sigan funcionando independientemente

      // Crear un mapa de usuarios actuales por username para comparación rápida
      const currentUsersMap = new Map();
      activeUsers.forEach(user => {
        currentUsersMap.set(user.username, user);
      });

      // Obtener elementos existentes en el DOM (solo filas de usuarios válidas)
      const existingRows = Array.from(list.querySelectorAll('.team-list-item[data-username]'));
      const existingUsersMap = new Map();
      existingRows.forEach(row => {
        const username = row.getAttribute('data-username');
        if (username) {
          existingUsersMap.set(username, row);
        }
      });

      // Identificar usuarios a agregar, actualizar y eliminar
      const usersToAdd = [];
      const usersToUpdate = [];
      const usersToRemove = [];

      // Usuarios nuevos o que necesitan actualización
      activeUsers.forEach(user => {
        const existingRow = existingUsersMap.get(user.username);
        if (!existingRow) {
          usersToAdd.push(user);
        } else {
          // Verificar si necesita actualización (comparar datos clave)
          const currentOrderBadge = existingRow.querySelector('.order-number-badge');
          const currentOrder = currentOrderBadge?.textContent.trim() || '';
          const statusBadge = existingRow.querySelector('.status-badge-list');
          const currentStatusText = statusBadge?.textContent.trim() || '';
          
          // Normalizar valores para comparación
          const normalizedCurrentOrder = currentOrder.toLowerCase();
          const normalizedNewOrder = (user.orderNumber || '').toLowerCase();
          
          // Obtener el estado actual del usuario
          const displayStatus = user.activity ? user.activity : user.status;
          const statusLabels = {
            'pending': 'Pending',
            'design': 'In Design',
            'production': 'In Production',
            'review': 'In Review',
            'completed': 'Completed',
            'trabajando': 'Working',
            'pausa': 'Break',
            'comida': 'Lunch',
            'meeting': 'Meeting',
            'training': 'Training',
            '5s': '5S'
          };
          const expectedStatusText = statusLabels[displayStatus] || displayStatus;
          
          // Verificar cambios en orden (comparar normalizados)
          const orderChanged = normalizedCurrentOrder !== normalizedNewOrder;
          
          // Verificar cambios en estado
          const statusChanged = !currentStatusText.includes(expectedStatusText);
          
          // Verificar cambios en cliente también
          const currentClient = existingRow.querySelector('.client-cell span')?.textContent.trim() || '';
          const clientChanged = currentClient !== (user.client || '-');
          
          // Verificar cambios en número de parte
          // Normalizar valores para comparación precisa y evitar parpadeos
          const currentPartNumberEl = existingRow.querySelector('.part-number-cell span');
          const currentPartNumber = (currentPartNumberEl?.textContent.trim() || '-').toLowerCase();
          const newPartNumber = ((user.activePartNumber || '-').trim()).toLowerCase();
          const partNumberChanged = currentPartNumber !== newPartNumber;
          
          // Verificar cambios en orderStatus
          const currentOrderStatusBadge = existingRow.querySelector('.order-status-badge');
          const currentOrderStatusText = currentOrderStatusBadge?.textContent.trim() || '-';
          const orderStatusLabels = {
            'revision': 'Review',
            'trabajando en ella': 'Working on it',
            'en espera de aprobacion': 'Pending Approval',
            'aprobada': 'Approved',
            'cambios': 'Changes',
            'issues': 'Issues'
          };
          const expectedOrderStatusText = user.orderStatus ? (orderStatusLabels[user.orderStatus] || user.orderStatus) : '-';
          const orderStatusChanged = currentOrderStatusText !== expectedOrderStatusText;
          
          // Si SOLO cambió el orderStatus (y no otros campos), actualizar solo el badge sin tocar el status del usuario
          if (orderStatusChanged && !orderChanged && !statusChanged && !clientChanged && !partNumberChanged) {
            // Actualizar solo el badge de orderStatus sin reemplazar toda la fila
            if (currentOrderStatusBadge && user.orderStatus) {
              currentOrderStatusBadge.textContent = expectedOrderStatusText;
              const statusClass = user.orderStatus.replace(/\s+/g, '-').toLowerCase();
              currentOrderStatusBadge.className = `order-status-badge status-${statusClass}`;
            }
          } else if (orderChanged || statusChanged || clientChanged || partNumberChanged || orderStatusChanged) {
            // Si hay otros cambios además del orderStatus, actualizar toda la fila
            usersToUpdate.push({ user, row: existingRow });
          }
        }
      });

      // Usuarios que ya no están activos
      existingUsersMap.forEach((row, username) => {
        if (!currentUsersMap.has(username)) {
          usersToRemove.push(row);
        }
      });

      // Eliminar usuarios que ya no están activos
      usersToRemove.forEach(row => {
        // Limpiar intervalos antes de eliminar
        const timeDisplay = row.querySelector('.time-display[data-interval-id]');
        if (timeDisplay) {
          const intervalId = timeDisplay.getAttribute('data-interval-id');
          if (intervalId) {
            clearInterval(parseInt(intervalId));
          }
        }
        row.remove();
      });

      // Actualizar usuarios existentes que cambiaron
      usersToUpdate.forEach(({ user, row }) => {
        // Limpiar intervalos anteriores solo de este elemento específico
        // setupTimeDisplay también limpiará, pero es mejor hacerlo aquí para evitar duplicados
        const timeDisplay = row.querySelector('.time-display[data-interval-id]');
        if (timeDisplay) {
          const intervalId = timeDisplay.getAttribute('data-interval-id');
          if (intervalId) {
            try {
              clearInterval(parseInt(intervalId));
            } catch (e) {
              // Ignorar errores al limpiar
            }
          }
        }
        // Encontrar la posición real del usuario en activeUsers
        const realIndex = activeUsers.findIndex(u => u.username === user.username);
        // Reemplazar el contenido de la fila completamente para asegurar que se actualice el orden
        // updateUserRow ya llama a setupTimeDisplay, que reiniciará el contador correctamente
        updateUserRow(row, user, realIndex);
        
        // Forzar actualización del badge de orden si existe
        const orderBadge = row.querySelector('.order-number-badge');
        if (orderBadge && orderBadge.textContent.trim() !== user.orderNumber) {
          orderBadge.textContent = user.orderNumber;
        }
        
        // Forzar actualización del badge de número de parte si existe
        // Solo actualizar si el valor realmente cambió para evitar parpadeos
        const partNumberBadge = row.querySelector('.part-number-badge');
        if (partNumberBadge) {
          const currentValue = partNumberBadge.textContent.trim();
          const newValue = (user.activePartNumber || '-').trim();
          // Solo actualizar si el valor es diferente y no está vacío cuando debería tener valor
          if (currentValue !== newValue) {
            // Usar requestAnimationFrame para suavizar la actualización
            requestAnimationFrame(() => {
              partNumberBadge.textContent = newValue;
            });
          }
        }
        
        // Forzar actualización del badge de orderStatus si existe
        const orderStatusBadge = row.querySelector('.order-status-badge');
        if (orderStatusBadge && user.orderStatus) {
          const orderStatusLabels = {
            'revision': 'Review',
            'trabajando en ella': 'Working on it',
            'en espera de aprobacion': 'Pending Approval',
            'aprobada': 'Approved',
            'cambios': 'Changes',
            'issues': 'Issues'
          };
          const expectedOrderStatusText = orderStatusLabels[user.orderStatus] || user.orderStatus;
          if (orderStatusBadge.textContent.trim() !== expectedOrderStatusText) {
            orderStatusBadge.textContent = expectedOrderStatusText;
            // Actualizar también la clase CSS
            const statusClass = user.orderStatus.replace(/\s+/g, '-').toLowerCase();
            orderStatusBadge.className = `order-status-badge status-${statusClass}`;
          }
        }
      });

      // Agregar nuevos usuarios
      if (usersToAdd.length > 0) {
        const fragment = document.createDocumentFragment();
        usersToAdd.forEach((user, index) => {
          // Encontrar la posición real del usuario en activeUsers
          const realIndex = activeUsers.findIndex(u => u.username === user.username);
          const row = createUserRow(user, realIndex);
          fragment.appendChild(row);
        });
        list.appendChild(fragment);
      }

      // Reordenar todos los elementos según la puntuación y actualizar posiciones
      reorderUsersByScore(list, activeUsers);
    }

    // Función auxiliar para crear una fila de usuario
    function createUserRow(user, position = -1) {
        const row = document.createElement('div');
        row.className = 'team-list-item glass-card';
        row.setAttribute('data-username', user.username);
        // Aplicar el mismo gridTemplateColumns que el header para alineación correcta
        row.style.gridTemplateColumns = '400px 120px 150px 1fr 120px 130px 150px';
        
        // Agregar clases para los primeros 3 lugares
        row.classList.remove('first-place', 'second-place', 'third-place');
        if (position === 0) {
          row.classList.add('first-place');
        } else if (position === 1) {
          row.classList.add('second-place');
        } else if (position === 2) {
          row.classList.add('third-place');
        }
        
        populateUserRow(row, user, position);
        setupTimeDisplay(row, user);
        
        // Procesar imagen para redimensionarla a la mitad de resolución
        const img = row.querySelector('img.avatar-photo-list[data-original-src]');
        if (img && !img.hasAttribute('data-resized')) {
          img.setAttribute('data-resized', 'true');
          const originalSrc = img.getAttribute('data-original-src');
          resizeImageToHalf(originalSrc).then(resizedUrl => {
            if (img.src !== resizedUrl) {
              img.src = resizedUrl;
            }
          });
        }
        
        // Agregar event listener para abrir modal al hacer clic en la fila
        row.addEventListener('click', function(e) {
          // No abrir modal si se hace clic en botones, enlaces o badges
          if (e.target.closest('button') || e.target.closest('a') || e.target.closest('.order-number-badge') || e.target.closest('.status-badge-list')) {
            return;
          }
          openUserModal(user, position);
        });
        
        // Agregar cursor pointer para indicar que es clickeable
        row.style.cursor = 'pointer';
        
        return row;
    }

          if (e.target.closest('button') || e.target.closest('a') || e.target.closest('.order-number-badge') || e.target.closest('.status-badge-list')) {
            return;

          openUserModal(user, position);

    }

    // Función auxiliar para configurar el display de tiempo
    // Esta función es robusta e independiente - el contador siempre funcionará
    function setupTimeDisplay(row, user) {
        const timeDisplay = row.querySelector('.time-display');
        
        if (!timeDisplay) return;
        
        // Limpiar intervalo anterior si existe (solo para este elemento específico)
        const oldIntervalId = timeDisplay.getAttribute('data-interval-id');
        if (oldIntervalId) {
          try {
            clearInterval(parseInt(oldIntervalId));
          } catch (e) {
            // Ignorar errores al limpiar intervalos
          }
        }
        
        const orderNumber = user.orderNumber;
        let startTime = user.startTime;
        let pausedTime = user.pausedTime || 0;
        let estadoEmpleadoMs = user.estadoEmpleadoMs || 0;
        let lastUpdateTime = user.lastUpdateTime || Date.now();
        
        // Guardar referencia al intervalo para poder limpiarlo si es necesario
        const timeDisplayId = `time-display-${user.orderId || orderNumber || 'no-order'}`;
        timeDisplay.setAttribute('data-display-id', timeDisplayId);
        
        // Función robusta de actualización que siempre funciona
        const updateTime = () => {
          try {
            let elapsed = 0;
            
            if (startTime) {
              // Si hay startTime, usar el método del diseñador (Date.now() - startTime - pausedTime)
              let activeSession = null;
              try {
                const sessionData = localStorage.getItem('activeSession');
                if (sessionData) {
                  activeSession = JSON.parse(sessionData);
                }
              } catch (e) {
                // Continuar sin sesión activa si hay error
              }
              
              let currentPausedTime = pausedTime;
              let currentStartTime = startTime;
              
              if (activeSession && activeSession.orderNumber === orderNumber) {
                currentPausedTime = activeSession.pausedTime || pausedTime;
                currentStartTime = activeSession.startTime || startTime;
              }
              
              const currentTime = Date.now();
              elapsed = currentTime - currentStartTime - currentPausedTime;
            } else if (estadoEmpleadoMs > 0) {
              // Si no hay startTime pero hay estadoEmpleadoMs, calcular tiempo actual
              // El estado_empleado se actualiza cada 10 segundos en la BD, así que sumamos el tiempo transcurrido
              const currentTime = Date.now();
              const timeSinceLastUpdate = currentTime - lastUpdateTime;
              elapsed = estadoEmpleadoMs + timeSinceLastUpdate;
            }
            
            const formatted = formatTime(Math.max(0, elapsed));
            const timeValueEl = timeDisplay.querySelector('.time-value');
            if (timeValueEl) {
              timeValueEl.textContent = formatted;
            } else {
              // Si el elemento no existe, intentar encontrarlo de nuevo
              const newTimeValueEl = timeDisplay.querySelector('.time-value');
              if (newTimeValueEl) {
                newTimeValueEl.textContent = formatted;
              }
            }
          } catch (error) {
            // Si hay un error, continuar - el contador no debe detenerse
            console.warn('Error en updateTime (continuando):', error);
          }
        };
        
        // Actualizar inmediatamente y luego cada segundo
        // Usar try-catch para asegurar que el intervalo se cree incluso si hay errores
        try {
          updateTime();
          const intervalId = setInterval(updateTime, 1000);
          
          // Guardar el intervalo ID y orderNumber en el elemento para poder limpiarlo después

            } catch (retryError) {
              console.error('Error al reintentar crear intervalo:', retryError);
            }
          }, 100);
        }
    }

    function formatTime(milliseconds) {
      const totalSeconds = Math.floor(milliseconds / 1000);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      if (hours > 0) {
        return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
      } else if (minutes > 0) {
        return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
      } else {
        return `00:${String(seconds).padStart(2, '0')}`;
      }
    }

    function formatIntervalToTime(intervalString) {
      // Intentar parsear diferentes formatos de intervalo de PostgreSQL
      // Formato: "HH:MM:SS" o "X hours Y minutes Z seconds" o "X:Y:Z"
      if (!intervalString) return '00:00:00';
      
      // Si ya está en formato HH:MM:SS
      const timeRegex = /^(\d{2}):(\d{2}):(\d{2})$/;
      if (timeRegex.test(intervalString)) {
        return intervalString;
      }
      
      // Intentar parsear formato "X hours Y minutes Z seconds"
      const hoursMatch = intervalString.match(/(\d+)\s*hour/i);
      const minutesMatch = intervalString.match(/(\d+)\s*minute/i);
      const secondsMatch = intervalString.match(/(\d+)\s*second/i);
      
      const hours = hoursMatch ? parseInt(hoursMatch[1]) : 0;
      const minutes = minutesMatch ? parseInt(minutesMatch[1]) : 0;
      const seconds = secondsMatch ? parseInt(secondsMatch[1]) : 0;
      
      return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    /**
     * Algoritmo 1: PUNTUACIÓN BALANCEADA (Recomendado)
     * Combina múltiples factores para una evaluación completa
     * 
     * Factores:
     * - 30% Tiempo trabajado (últimos 30 días)
     * - 25% Eficiencia (tiempo trabajando vs tiempo en pausas)
     * - 20% Número de órdenes completadas
     * - 15% Estado actual (bonus si está trabajando)
     * - 10% Consistencia (número de sesiones)
     */
    async function calculateBalancedScore(user) {
      const now = new Date();
      
      // Calcular inicio de la semana (lunes a las 00:00:00)
      const dayOfWeek = now.getDay(); // 0 = domingo, 1 = lunes, ..., 6 = sábado
      const daysToMonday = dayOfWeek === 0 ? 6 : dayOfWeek - 1; // Días desde el lunes
      const weekStart = new Date(now);
      weekStart.setDate(now.getDate() - daysToMonday);
      weekStart.setHours(0, 0, 0, 0);
      
      // Fin de semana (domingo a las 23:59:59)
      const weekEnd = new Date(weekStart);
      weekEnd.setDate(weekStart.getDate() + 6);
      weekEnd.setHours(23, 59, 59, 999);

      const REQUIRED_HOURS_PER_WEEK = 45; // Meta: 45 horas semanales
      const MAX_STARS = 100000; // Máximo de estrellas
      const BASE_STARS_FOR_TARGET = 50000; // Estrellas por alcanzar la meta

      try {
        // Verificar cache primero
        const cacheKey = `sessions_${user.username}_${user.usuario || ''}`;
        const cached = sessionsCache.get(cacheKey);
        let allSessions = [];
        
        if (cached && (Date.now() - cached.timestamp) < CACHE_DURATION) {
          // Usar cache si está disponible y no ha expirado
          allSessions = cached.sessions;
        } else {
          // Obtener TODAS las sesiones del usuario (no solo de esta semana)
          // Hacer ambas búsquedas en paralelo para mayor velocidad
          const [sesionesResponse1, sesionesResponse2] = await Promise.all([
            fetch(`/api/sesiones?usuario_nombre=${encodeURIComponent(user.username)}&limit=10000`),
            user.usuario ? fetch(`/api/sesiones?usuario_nombre=${encodeURIComponent(user.usuario)}&limit=10000`) : Promise.resolve(null)
          ]);
          
          // Procesar primera respuesta (nombre completo)
          if (sesionesResponse1 && sesionesResponse1.ok) {
            const sesionesData = await sesionesResponse1.json();
            if (sesionesData.success && sesionesData.sesiones) {
              allSessions = sesionesData.sesiones;
            }
          }
          
          // Si no hay resultados y tenemos usuario, procesar segunda respuesta
          if (allSessions.length === 0 && sesionesResponse2 && sesionesResponse2.ok) {
            const sesionesData2 = await sesionesResponse2.json();
            if (sesionesData2.success && sesionesData2.sesiones) {
              allSessions = sesionesData2.sesiones;
            }
          }
          
          // Guardar en cache
          sessionsCache.set(cacheKey, {
            timestamp: Date.now(),
            sessions: allSessions
          });
        }

        // Calcular tiempo total trabajado (todas las sesiones) - misma lógica que diseno.html
        let totalSegundos = 0;
        allSessions.forEach(session => {
          // Convertir tiempo_trabajando a segundos (misma lógica que loadLifetimeHours en diseno.html)
          const tiempoTrabajando = session.tiempo_trabajando_formateado || session.tiempo_trabajando || '00:00:00';
          
          // Manejar diferentes formatos de tiempo
          let hours = 0, minutes = 0, seconds = 0;
          if (typeof tiempoTrabajando === 'string') {
            const parts = tiempoTrabajando.split(':');
            if (parts.length === 3) {
              hours = parseInt(parts[0], 10) || 0;
              minutes = parseInt(parts[1], 10) || 0;
              seconds = parseInt(parts[2], 10) || 0;
            }
          }
          
          const segundos = (hours * 3600) + (minutes * 60) + seconds;
          totalSegundos += segundos;
        });

        // Calcular horas totales trabajadas (igual que en diseno.html)
        const totalHoras = Math.floor(totalSegundos / 3600);
        const totalMinutos = Math.floor((totalSegundos % 3600) / 60);
        const totalHoursWorked = totalHoras + (totalMinutos / 60); // Horas con decimales
        
        // Debug: log removido para limpiar consola
        
        // También calcular horas de esta semana para el mensaje
        const weekSessions = allSessions.filter(s => {
          const fechaInicio = new Date(s.fecha_inicio);
          return fechaInicio >= weekStart && fechaInicio <= weekEnd;
        });
        
        let weekSegundos = 0;
        weekSessions.forEach(session => {
          const tiempoTrabajando = session.tiempo_trabajando_formateado || session.tiempo_trabajando || '00:00:00';
          const [hours, minutes, seconds] = tiempoTrabajando.split(':').map(Number);
          const segundos = (hours || 0) * 3600 + (minutes || 0) * 60 + (seconds || 0);
          weekSegundos += segundos;
        });
        const weekHoursWorked = weekSegundos / 3600;
        
        let extraMinutes = 0;
        let statusMessage = '';

        if (weekHoursWorked >= REQUIRED_HOURS_PER_WEEK) {
          extraMinutes = Math.floor((weekHoursWorked - REQUIRED_HOURS_PER_WEEK) * 60);
          statusMessage = `${Math.floor(weekHoursWorked)}h ${Math.round((weekHoursWorked % 1) * 60)}m esta semana`;
        } else {
          const remainingMinutes = Math.floor((REQUIRED_HOURS_PER_WEEK - weekHoursWorked) * 60);
          statusMessage = `Faltan ${Math.floor(remainingMinutes / 60)}h ${remainingMinutes % 60}m para la meta semanal`;
        }

        return {
          score: totalHoursWorked, // Usar horas totales trabajadas como score
          details: {
            hours: totalHoursWorked.toFixed(1),
            weekHours: weekHoursWorked.toFixed(1),
            hoursRequired: REQUIRED_HOURS_PER_WEEK,
            sessions: allSessions.length,
            weekSessions: weekSessions.length,
            extraMinutes: extraMinutes,
            statusMessage: statusMessage
          }
        };
      } catch (error) {
        console.error('Error calculando minutos trabajados para', user.username, error);
        return {
          score: 0, // 0 minutos trabajados
          details: {
            hours: 0,
            hoursRequired: REQUIRED_HOURS_PER_WEEK,
            sessions: 0,
            extraMinutes: 0,
            statusMessage: 'Error calculando minutos trabajados',
            minutes: 0
          }
        };
      }
    }

    /**
     * Algoritmo 2: PUNTUACIÓN POR PRODUCTIVIDAD
     * Enfocado en cantidad de trabajo realizado
     * 
     * Factores:
     * - 50% Tiempo trabajado
     * - 30% Número de órdenes
     * - 20% Estado actual
     */
    async function calculateProductivityScore(user) {
      const now = new Date();
      const currentMonth = now.getMonth() + 1;
      const currentYear = now.getFullYear();

      try {
        const response = await fetch(`/api/reportes/horas-por-empleado?mes=${currentMonth}&año=${currentYear}`);
        let stats = null;
        
        if (response.ok) {
          const data = await response.json();
          if (data.success && data.reporte) {
            stats = data.reporte.find(r => 
              r.empleado.toLowerCase().includes(user.username.toLowerCase()) ||
              user.username.toLowerCase().includes(r.empleado.toLowerCase())
            );
          }
        }

        let totalHours = 0;
        let totalOrders = 0;

        if (stats) {
          const timeMatch = stats.tiempo_trabajando_formateado.match(/(\d{2}):(\d{2}):(\d{2})/);
          if (timeMatch) {
            totalHours = parseInt(timeMatch[1]) + parseInt(timeMatch[2]) / 60 + parseInt(timeMatch[3]) / 3600;
          }
          totalOrders = stats.total_ordenes || 0;
        }

        const hoursScore = Math.min(100, (totalHours / 200) * 100);
        const ordersScore = Math.min(100, (totalOrders / 50) * 100);
        const statusBonus = (user.orderNumber && user.orderNumber !== '-') ? 20 : 0;

        const finalScore = (hoursScore * 0.50) + (ordersScore * 0.30) + (statusBonus * 0.20);

        return {
          score: Math.round(finalScore * 100) / 100,
          details: {
            hours: totalHours.toFixed(1),
            orders: totalOrders,
            statusBonus: statusBonus
          }
        };
      } catch (error) {
        console.error('Error calculando puntuación de productividad:', error);
        return { score: 0, details: { hours: 0, orders: 0, statusBonus: 0 } };
      }
    }

    /**
     * Algoritmo 3: PUNTUACIÓN POR EFICIENCIA
     * Enfocado en calidad del tiempo trabajado
     * 
     * Factores:
     * - 40% Ratio tiempo trabajando / tiempo total
     * - 30% Consistencia (sesiones regulares)
     * - 30% Estado actual
     */
    async function calculateEfficiencyScore(user) {
      const now = new Date();
      const thirtyDaysAgo = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);

      try {
        // Verificar cache primero
        const cacheKey = `sessions_${user.username}_${user.usuario || ''}`;
        const cached = sessionsCache.get(cacheKey);
        let recentSessions = [];
        
        if (cached && (Date.now() - cached.timestamp) < CACHE_DURATION) {
          // Usar cache si está disponible
          recentSessions = cached.sessions.filter(s => {
            const fechaInicio = new Date(s.fecha_inicio);
            return fechaInicio >= thirtyDaysAgo;
          });
        } else {
          const sesionesResponse = await fetch(`/api/sesiones?usuario_nombre=${encodeURIComponent(user.username)}&limit=100`);
          
          if (sesionesResponse.ok) {
            const sesionesData = await sesionesResponse.json();
            if (sesionesData.success && sesionesData.sesiones) {
              const allSessions = sesionesData.sesiones;
              recentSessions = allSessions.filter(s => {
                const fechaInicio = new Date(s.fecha_inicio);
                return fechaInicio >= thirtyDaysAgo;
              });
              
              // Guardar en cache
              sessionsCache.set(cacheKey, {
                timestamp: Date.now(),
                sessions: allSessions
              });
            }
          }
        }

        let totalTime = 0;
        let workingTime = 0;

        recentSessions.forEach(session => {
          const totalMatch = (session.duracion_formateada || '00:00:00').match(/(\d{2}):(\d{2}):(\d{2})/);
          const workMatch = (session.tiempo_trabajando_formateado || '00:00:00').match(/(\d{2}):(\d{2}):(\d{2})/);
          
          if (totalMatch) {
            totalTime += parseInt(totalMatch[1]) + parseInt(totalMatch[2]) / 60 + parseInt(totalMatch[3]) / 3600;
          }
          if (workMatch) {
            workingTime += parseInt(workMatch[1]) + parseInt(workMatch[2]) / 60 + parseInt(workMatch[3]) / 3600;
          }
        });

        const efficiency = totalTime > 0 ? (workingTime / totalTime) * 100 : 0;
        const consistency = Math.min(100, (recentSessions.length / 50) * 100);
        const statusBonus = (user.orderNumber && user.orderNumber !== '-') ? 30 : 0;

        const finalScore = (efficiency * 0.40) + (consistency * 0.30) + (statusBonus * 0.30);

        return {
          score: Math.round(finalScore * 100) / 100,
          details: {
            efficiency: efficiency.toFixed(1),
            consistency: consistency.toFixed(1),
            statusBonus: statusBonus
          }
        };
      } catch (error) {
        console.error('Error calculando puntuación de eficiencia:', error);
        return { score: 0, details: { efficiency: 0, consistency: 0, statusBonus: 0 } };
      }
    }

    /**
     * Función principal para calcular y ordenar usuarios por puntuación
     * Usa el algoritmo balanceado por defecto
     */
    async function calculateAndSortUsersByScore(users) {
      // Algoritmo a usar (puedes cambiarlo: 'balanced', 'productivity', 'efficiency')
      const algorithm = 'balanced'; // Por defecto: balanceado

      // Verificar cache primero
      const cacheKey = `scores_${algorithm}_${users.length}`;
      const cached = scoresCache.get(cacheKey);
      if (cached && (Date.now() - cached.timestamp) < CACHE_DURATION) {
        // Usar cache si está disponible y no ha expirado
        users.forEach((user, index) => {
          const cachedUser = cached.users.find(u => u.username === user.username);
          if (cachedUser) {
            user.score = cachedUser.score;
            user.scoreDetails = cachedUser.scoreDetails;
          }
        });
        // Ordenar por puntuación
        users.sort((a, b) => {
          if (Math.abs((a.score || 0) - (b.score || 0)) < 0.1) {
            const aWorking = (a.orderNumber && a.orderNumber !== '-') ? 1 : 0;
            const bWorking = (b.orderNumber && b.orderNumber !== '-') ? 1 : 0;
            return bWorking - aWorking;
          }
          return (b.score || 0) - (a.score || 0);
        });
        return;
      }

      // Calcular puntuación para cada usuario EN PARALELO (mucho más rápido)
      const scorePromises = users.map(async (user) => {
        let scoreData;
        
        switch (algorithm) {
          case 'productivity':
            scoreData = await calculateProductivityScore(user);
            break;
          case 'efficiency':
            scoreData = await calculateEfficiencyScore(user);
            break;
          case 'balanced':
          default:
            scoreData = await calculateBalancedScore(user);
            break;
        }
        
        return { user, scoreData };
      });

      // Esperar a que todas las puntuaciones se calculen en paralelo
      const results = await Promise.all(scorePromises);
      
      // Asignar puntuaciones
      results.forEach(({ user, scoreData }) => {
        user.score = scoreData.score;
        user.scoreDetails = scoreData.details;
      });

      // Guardar en cache
      scoresCache.set(cacheKey, {
        timestamp: Date.now(),
        users: users.map(u => ({
          username: u.username,
          score: u.score,
          scoreDetails: u.scoreDetails
        }))
      });

      // Ordenar por puntuación (mayor a menor)
      users.sort((a, b) => {
        // Si tienen la misma puntuación, priorizar a los que están trabajando
        if (Math.abs((a.score || 0) - (b.score || 0)) < 0.1) {
          const aWorking = (a.orderNumber && a.orderNumber !== '-') ? 1 : 0;
          const bWorking = (b.orderNumber && b.orderNumber !== '-') ? 1 : 0;
          return bWorking - aWorking;
        }
        return (b.score || 0) - (a.score || 0);
      });

      // Log removido para limpiar consola
    }

    // Función auxiliar para convertir formato INTERVAL (HH:MM:SS) a milisegundos
    function parseIntervalToMs(interval) {
      if (!interval) return 0;
      
      // Si ya es un número, asumir que son milisegundos
      if (typeof interval === 'number') return interval;
      
      // Si es string con formato HH:MM:SS
      if (typeof interval === 'string') {
        // Limpiar espacios y verificar formato
        const cleaned = interval.trim();
        
        // Formato HH:MM:SS
        const parts = cleaned.split(':');
        if (parts.length === 3) {
          const hours = parseInt(parts[0], 10) || 0;
          const minutes = parseInt(parts[1], 10) || 0;
          const seconds = parseInt(parts[2], 10) || 0;
          return (hours * 3600 + minutes * 60 + seconds) * 1000;
        }
        
        // Si no tiene formato correcto, intentar parsear como objeto de PostgreSQL
        if (cleaned.includes('hour') || cleaned.includes('minute') || cleaned.includes('second')) {
          const hoursMatch = cleaned.match(/(\d+)\s*hour/i);
          const minutesMatch = cleaned.match(/(\d+)\s*minute/i);
          const secondsMatch = cleaned.match(/(\d+)\s*second/i);
          
          const hours = hoursMatch ? parseInt(hoursMatch[1], 10) : 0;
          const minutes = minutesMatch ? parseInt(minutesMatch[1], 10) : 0;
          const seconds = secondsMatch ? parseInt(secondsMatch[1], 10) : 0;
          return (hours * 3600 + minutes * 60 + seconds) * 1000;
        }
      }
      
      // Si es un objeto (formato de PostgreSQL)
      if (typeof interval === 'object' && interval !== null) {
        if (interval.totalSeconds !== undefined) {
          return interval.totalSeconds * 1000;
        }
        if (interval.hours !== undefined || interval.minutes !== undefined || interval.seconds !== undefined) {
          const hours = interval.hours || 0;
          const minutes = interval.minutes || 0;
          const seconds = interval.seconds || 0;
          return (hours * 3600 + minutes * 60 + seconds) * 1000;
        }
      }
      
      return 0;
    }

    // Función para configurar actualización de tiempo en tiempo real para una orden
    async function setupOrderTimeUpdate(orderRow, order, orderContainer) {
      const timeBadge = orderRow.querySelector('.time-badge');
      if (!timeBadge) return;
      
      // Obtener tiempo base de la orden en milisegundos
      const baseTimeMs = timeToMs(order.tiempo_total_trabajado);
      const hourlyRate = parseFloat(order.hourly_rate || order.tarifa_hora || 0);
      
      // Flag para evitar múltiples llamadas fallidas (401)
      let hasAuthError = false;
      
      // Función para actualizar el tiempo
      const updateOrderTime = async () => {
        try {
          // Obtener sesiones activas para esta orden
          let additionalTimeMs = 0;
          
          // Solo intentar obtener sesiones activas si no ha habido error de autorización
          if (!hasAuthError) {
            try {
              // Verificar si hay token antes de hacer la llamada
              const token = localStorage.getItem('sessionToken');
              if (!token) {
                // No hay token, no intentar más llamadas
                hasAuthError = true;
              } else {
                const sessionsResponse = await fetch('/api/sesiones-activas', {
                  headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                  }
                });
                
                if (sessionsResponse.ok) {
                  const sessionsData = await sessionsResponse.json();
                  const activeSessions = sessionsData.success && sessionsData.sessions ? sessionsData.sessions : [];
                  
                  // Buscar sesiones activas para esta orden
                  activeSessions.forEach(session => {
                    if (session.orden_id === order.id || session.orden_nombre === order.nombre) {
                      // Si hay tiempo_trabajando acumulado, usarlo
                      if (session.tiempo_trabajando) {
                        const sessionTimeMs = timeToMs(session.tiempo_trabajando);
                        additionalTimeMs += sessionTimeMs;
                      }
                      
                      // Calcular tiempo adicional desde la última actualización
                      if (session.ultima_actualizacion) {
                        const lastUpdate = new Date(session.ultima_actualizacion).getTime();
                        const now = Date.now();
                        const timeSinceUpdate = now - lastUpdate;
                        
                        // Solo agregar tiempo si la sesión está activa (última actualización reciente, menos de 1 minuto)
                        if (timeSinceUpdate < 60000) {
                          additionalTimeMs += timeSinceUpdate;
                        }
                      } else if (session.fecha_inicio) {
                        // Fallback: calcular desde fecha_inicio si no hay ultima_actualizacion
                        const sessionStart = new Date(session.fecha_inicio).getTime();
                        const now = Date.now();
                        const elapsed = now - sessionStart;
                        
                        // Restar tiempo de pausas si existe
                        let pausedTime = 0;
                        if (session.tiempo_pausa) {
                          pausedTime = timeToMs(session.tiempo_pausa);
                        }
                        
                        additionalTimeMs += Math.max(0, elapsed - pausedTime);
                      }
                    }
                  });
                } else if (sessionsResponse.status === 401) {
                  // Error de autorización, no intentar más llamadas
                  hasAuthError = true;
                }
              }
            } catch (fetchError) {
              // Si falla la petición, verificar si es un error 401
              if (fetchError.status === 401 || (fetchError.message && fetchError.message.includes('401'))) {
                hasAuthError = true;
              }
              // Continuar con tiempo base sin mostrar error en consola
            }
          }
          
          // Calcular tiempo total
          const totalTimeMs = baseTimeMs + additionalTimeMs;
          const formatted = formatTime(totalTimeMs);
          
          // Actualizar el tiempo en el DOM
          const timeSpan = timeBadge.querySelector('span');
          if (timeSpan) {
            timeSpan.textContent = formatted;
          } else {
            timeBadge.innerHTML = `<i class="fas fa-clock"></i> ${formatted}`;
          }
          
        } catch (error) {
          console.error('Error al actualizar tiempo de orden:', error);
        }
      };
      
      // Actualizar inmediatamente y luego cada segundo
      updateOrderTime();
      const intervalId = setInterval(updateOrderTime, 1000);
      
      // Guardar el intervalo ID en el contenedor para poder limpiarlo después
      orderContainer.setAttribute('data-time-interval-id', intervalId);
    }

    // Función auxiliar para convertir tiempo a horas decimales
    function timeToHours(timeValue) {
      if (!timeValue) return 0;
      
      let totalSeconds = 0;
      
      if (typeof timeValue === 'string') {
        const timeRegex = /^(\d{2}):(\d{2}):(\d{2})$/;
        if (timeRegex.test(timeValue)) {
          const [hours, minutes, seconds] = timeValue.split(':').map(Number);
          totalSeconds = hours * 3600 + minutes * 60 + seconds;
        } else {
          totalSeconds = parseIntervalToMs(timeValue) / 1000;
        }
      } else if (typeof timeValue === 'object') {
        if (timeValue.totalSeconds !== undefined) {
          totalSeconds = Math.floor(timeValue.totalSeconds || 0);
        } else {
          const hours = Math.floor(timeValue.hours || 0);
          const minutes = Math.floor(timeValue.minutes || 0);
          const seconds = Math.floor(timeValue.seconds || 0);
          totalSeconds = hours * 3600 + minutes * 60 + seconds;
        }
      }
      
      return totalSeconds / 3600; // Convertir a horas decimales
    }

    // Función para calcular precio basado en horas y tarifa
    function calculatePrice(hours, hourlyRateUSD = 0) {
      if (!hourlyRateUSD || hours === 0) {
        return { usd: 0, mxn: 0 };
      }
      
      const usd = hours * hourlyRateUSD;
      // Tasa de cambio aproximada USD a MXN (puedes actualizarla)
      const exchangeRate = 17.0; // 1 USD = 17 MXN aproximadamente
      const mxn = usd * exchangeRate;
      
      return {
        usd: usd.toFixed(2),
        mxn: mxn.toFixed(2)
      };
    }

    // Función para obtener diseñadores que han trabajado en una orden
    async function getDesignersForOrder(orderName) {
      try {
        const response = await fetch(`/api/sesiones?orden_nombre=${encodeURIComponent(orderName)}&limit=100`);
        if (!response.ok) {
          throw new Error('Error al cargar diseñadores');
        }
        
        const data = await response.json();
        if (data.success && data.sesiones) {
          // Obtener diseñadores únicos
          const designersMap = new Map();
          data.sesiones.forEach(sesion => {
            if (sesion.usuario_nombre) {
              if (!designersMap.has(sesion.usuario_nombre)) {
                designersMap.set(sesion.usuario_nombre, {
                  nombre: sesion.usuario_nombre,
                  tiempoTotal: sesion.duracion_total || sesion.tiempo_trabajando || '00:00:00',
                  sesiones: 1
                });
              } else {
                const designer = designersMap.get(sesion.usuario_nombre);
                designer.sesiones += 1;
                // Sumar tiempo (simplificado, podrías mejorar esto)
              }
            }
          });
          return Array.from(designersMap.values());
        }
        return [];
      } catch (error) {
        console.error('Error al obtener diseñadores:', error);
        return [];
      }
    }

    async function addPartNumberToOrder(orderId, partNumber, uom, units, notes, container) {
      try {
        if (!orderId || isNaN(orderId)) {
          showNotification('Error: ID de orden no válido', 'error');
          return;
        }
        
        if (!partNumber || partNumber.trim() === '') {
          showNotification('Error: Número de parte no válido', 'error');
          return;
        }
        
        const requestBody = {
          part_number: partNumber.trim()
        };
        
        // Agregar UOM si se proporcionó
        if (uom && uom.trim() !== '') {
          requestBody.uom = uom.trim();
        }
        
        // Agregar units si se proporcionó
        if (units && units.trim() !== '') {
          requestBody.units = units.trim();
        }
        
        // Agregar notes si se proporcionó
        if (notes && notes.trim() !== '') {
          requestBody.notes = notes.trim();
        }
        
        const response = await fetch(`/api/orders/${orderId}/part-numbers`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(requestBody)
        });
        
        if (!response.ok) {
          const errorText = await response.text();
          console.error('Error del servidor:', errorText);
          showNotification('Error del servidor al agregar número de parte', 'error');
          return;
        }
        
        const data = await response.json();
        
        if (data.success) {
          showNotification('Part number added successfully', 'success');
          closePartNumberModal();
          // Recargar números de parte
          if (container) {
            await loadPartNumbersForOrder(orderId, container);
          } else {
            console.warn('Contenedor no disponible para recargar números de parte');
          }
        } else {
          showNotification(data.error || 'Error adding part number', 'error');
        }
      } catch (error) {
        console.error('Error al agregar número de parte:', error);
        showNotification('Error adding part number: ' + error.message, 'error');
      }
    }

    // Función auxiliar para convertir tiempo a milisegundos
    function timeToMs(timeValue) {
      if (!timeValue) return 0;
      
      if (typeof timeValue === 'string') {
        const timeRegex = /^(\d{2}):(\d{2}):(\d{2})$/;
        if (timeRegex.test(timeValue)) {
          const [hours, minutes, seconds] = timeValue.split(':').map(Number);
          return (hours * 3600 + minutes * 60 + seconds) * 1000;
        }
        return parseIntervalToMs(timeValue);
      } else if (typeof timeValue === 'object') {
        if (timeValue.totalSeconds !== undefined) {
          return Math.floor(timeValue.totalSeconds || 0) * 1000;
        }
        const hours = Math.floor(timeValue.hours || 0);
        const minutes = Math.floor(timeValue.minutes || 0);
        const seconds = Math.floor(timeValue.seconds || 0);
        return (hours * 3600 + minutes * 60 + seconds) * 1000;
      }
      return 0;
    }
