      if (orderHourlyRate && orderHourlyRate.closest('.form-group')) {
        orderHourlyRate.closest('.form-group').style.display = 'block';
        orderHourlyRate.required = true; // Restaurar required cuando está visible
      }
      
      document.getElementById('orderClient').closest('.form-group').style.display = 'block';
      
      const orderProjectSelect = document.getElementById('orderProjectSelect');
      if (orderProjectSelect && orderProjectSelect.closest('.form-group')) {
        orderProjectSelect.closest('.form-group').style.display = 'block';
        orderProjectSelect.required = true; // Restaurar required cuando está visible
      }
      
      document.getElementById('newProjectNameGroup').style.display = 'none';
      
      // Quitar required del Project Name input cuando no está en modo proyecto
      const projectNameInput = document.getElementById('orderProjectName');
      if (projectNameInput) {
        projectNameInput.required = false;
      }
      
      // Restaurar el label del Project Name
      const projectNameLabel = document.querySelector('#newProjectNameGroup label');
      if (projectNameLabel) {
        projectNameLabel.textContent = 'New Project Name *';
      }
      
      // Cambiar el texto del botón de guardar
      const saveBtn = form.querySelector('button[type="submit"]');
      if (saveBtn) {
        saveBtn.textContent = 'Save Order';
      }
      
      // Quitar modo proyecto
      form.removeAttribute('data-mode');
      
      // Validar y limpiar el orderId
      let validOrderId = null;
      if (orderId) 
      {
        if (typeof orderId === 'string' || typeof orderId === 'number') 
        {
          validOrderId = String(orderId);
        } else 
        {
          console.error('ID de orden inválido en openOrderModal:', orderId, typeof orderId);
          validOrderId = null;
        }
      }
      
      editingOrderId = validOrderId;
      form.reset();
      document.getElementById('orderId').value = validOrderId || '';
      const projectSelect = document.getElementById('orderProjectSelect');
      if (projectSelect) {
        populateProjectOptions();
        projectSelect.value = '';
      }
      toggleNewProjectInput(false);
      
      if (validOrderId) {
        document.getElementById('modalOrderTitle').textContent = 'Edit Order';
        // Cargar datos de la orden para editar
        loadOrderForEdit(validOrderId);
      } else {
        document.getElementById('modalOrderTitle').textContent = 'New Production Order';
        editingOrderId = null;
      }

      modal.style.display = 'flex';
    }

    async function loadOrderForEdit(orderId) 
    {
      try 
      {
        if (!orderId || (typeof orderId !== 'string' && typeof orderId !== 'number')) 
        {
          console.error('ID de orden inválido para cargar:', orderId);
          return;
        }
        
        const id = String(orderId);
        const response = await fetch(`/api/orders/${id}`);
        if (response.ok) 
        {
          const data = await response.json();
          if (data.success && data.order) 
          {
            const order = data.order;
            document.getElementById('orderClient').value = order.cliente || '';
            document.getElementById('orderNumber').value = order.nombre || '';
            document.getElementById('orderCustomerJob').value = order.customer_job || '';
            populateProjectOptions(order.project_name || '');
            toggleNewProjectInput(false);
            document.getElementById('orderHourlyRate').value = order.hourly_rate || order.tarifa_hora || '';
          }
        }
      } catch (error) 
      {
        console.error('Error al cargar orden para editar:', error);
      }
    }

    function closeOrderModal() 
    {
      document.getElementById('orderModal').style.display = 'none';
      editingOrderId = null;
    }

    async function saveOrder(e) 
    {
      e.preventDefault();
      
      const form = document.getElementById('orderForm');
      const isProjectMode = form.getAttribute('data-mode') === 'project';
      
      if (isProjectMode) 
      {
        const cliente = document.getElementById('orderClient').value.trim();
        const projectName = document.getElementById('orderProjectName').value.trim();

        if (!cliente || !projectName) 
        {
          showNotification('Please complete all required fields (Client and Project Name)', 'error');
          return;
        }
        
        const orderData = {
          cliente: cliente,
          nombre: `PROJECT-${Date.now()}`,
          customer_job: 'PROJECT',
          project_name: projectName,
          hourly_rate: 0,
          estado: 'pending'
        };
        
        try 
        {
          const response = await fetch('/api/orders', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(orderData)
          });
          
          const data = await response.json();
          if (data.success) {
            showNotification('Project created successfully', 'success');
            closeOrderModal();
            // Recargar proyectos y órdenes
            loadProjectsList(true);
            if (currentView === 'orders') 
            {
              renderOrders();
            }
          } else 
          {
            showNotification(data.error || 'Error creating project', 'error');
          }
        } catch (error) 
        {
          console.error('Error creating project:', error);
          showNotification('Error creating project', 'error');
        }
        return;
      }
      
      // Modo orden normal
      const cliente = document.getElementById('orderClient').value.trim();
      const nombre = document.getElementById('orderNumber').value.trim();
      const customerJob = document.getElementById('orderCustomerJob').value.trim();
      const projectSelectValue = document.getElementById('orderProjectSelect').value;
      const newProjectInput = document.getElementById('orderProjectName');
      let projectName = projectSelectValue === '__new__'
        ? (newProjectInput ? newProjectInput.value.trim() : '')
        : projectSelectValue.trim();
      const hourlyRate = parseFloat(document.getElementById('orderHourlyRate').value.trim()) || 0;

      if (!cliente || !nombre || !customerJob || !projectName || !hourlyRate || hourlyRate <= 0) 
      {
        showNotification('Please complete all required fields (Client, Order Number, Customer Job, Project Name and Hourly Rate)', 'error');
        return;
      }

      const orderData = {
        cliente: cliente,
        nombre: nombre,
        customer_job: customerJob,
        project_name: projectName,
        hourly_rate: hourlyRate
      };

      try 
      {
        let validOrderId = null;
        if (editingOrderId) 
        {
          if (typeof editingOrderId === 'string' || typeof editingOrderId === 'number') 
          {
            validOrderId = String(editingOrderId);
          } else 
          {
            console.error('ID de orden inválido en saveOrder:', editingOrderId, typeof editingOrderId);
            showNotification('Error: Invalid order ID. Please try again.', 'error');
            return;
          }
        }
        
        const url = validOrderId 
          ? `/api/orders/${validOrderId}` 
          : '/api/orders';
        
        const method = validOrderId ? 'PUT' : 'POST';
         
        const response = await fetch(url, {
          method: method,
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(orderData)
        });

        const data = await response.json();

        if (response.ok && data.success) 
        {
          if (projectName && !projectsList.includes(projectName)) 
          {
            projectsList.push(projectName);
            projectsList = [...new Set(projectsList)].sort((a, b) => a.localeCompare(b));
            populateProjectOptions(projectName);
          }
          showNotification(validOrderId ? 'Order updated successfully' : 'Order created successfully', 'success');
          closeOrderModal();
          
          // Actualizar la vista actual
          if (currentView === 'users') 
          {
            loadActiveUsers();
          } else if (currentView === 'orders') 
          {
            renderOrders();
          }
        } else 
        {
          showNotification(data.error || data.message || 'Error saving order', 'error');
        }
      } catch (error) 
      {
        console.error('Error al guardar orden:', error);
        showNotification('Error saving order. Please try again.', 'error');
      }
    }


    async function changeOrderStatus(orderId, nuevoEstado, selectElement) 
    {
      try 
      {
        const response = await fetch(`/api/orders/${orderId}/estado`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            nuevoEstado: nuevoEstado
          })
        });

        const data = await response.json();

        if (response.ok && data.success) 
        {
          selectElement.setAttribute('data-current-state', nuevoEstado);
          if (currentView === 'users') 
          {
            // Obtener el nombre de la orden desde la API para identificar las filas correctas
            try 
            {
              const orderResponse = await fetch(`/api/orders/${orderId}`);
              if (orderResponse.ok) 
              {
                const orderData = await orderResponse.json();
                if (orderData.success && orderData.order) 
                {
                  const orderName = orderData.order.nombre;
                  const list = document.getElementById('teamList');
                  const orderStatusLabels = {'revision': 'Review', 'trabajando en ella': 'Working on it', 'en espera de aprobacion': 'Pending Approval', 'aprobada': 'Approved', 'cambios': 'Changes', 'issues': 'Issues'};
                  const statusClass = nuevoEstado.replace(/\s+/g, '-').toLowerCase();
                  const statusText = orderStatusLabels[nuevoEstado] || nuevoEstado;
                  
                  // Buscar todas las filas de usuarios que tienen esta orden y actualizar su orderStatus
                  const userRows = list.querySelectorAll('.team-list-item[data-username]');
                  userRows.forEach(row => {
                    const orderBadge = row.querySelector('.order-number-badge');
                    if (orderBadge && orderBadge.textContent.trim() === orderName) 
                    {
                      const orderStatusBadge = row.querySelector('.order-status-badge');
                      if (orderStatusBadge) 
                      {
                        // Actualizar el badge de orderStatus
                        orderStatusBadge.textContent = statusText;
                        orderStatusBadge.className = `order-status-badge status-${statusClass}`;
                      }
                    }
                  });
                }
              }
            } catch (error) 
            {
              console.warn('Error al obtener nombre de orden para actualización optimista:', error);
            }
            
            // También recargar desde la BD para asegurar que todo esté sincronizado
            // Usar un pequeño delay para permitir que la BD se actualice
            setTimeout(() => {
              loadActiveUsers();
            }, 300);
          } else {
            // Recargar las órdenes para mostrar los tiempos actualizados
            renderOrders();
          }
        } else 
        {
          // Revertir el cambio en el select
          const estadoAnterior = selectElement.getAttribute('data-current-state');
          selectElement.value = estadoAnterior;
          
          showAlertModal(data.error || data.message || 'Error changing order status', 'Error');
        }
      } catch (error) 
      {
        console.error('Error al cambiar estado de orden:', error);

        const estadoAnterior = selectElement.getAttribute('data-current-state');
        selectElement.value = estadoAnterior;
        showAlertModal('Error changing order status. Please try again.', 'Error');
      }
    }

    function editOrder(orderId) {
      // Validar que orderId sea válido
      if (!orderId) 
      {
        console.error('ID de orden no proporcionado');
        return;
      }
      
      // Asegurarse de que orderId sea un string o número válido
      if (typeof orderId !== 'string' && typeof orderId !== 'number') 
      {
        console.error('ID de orden inválido:', orderId, typeof orderId);
        return;
      }
      
      // Convertir a string
      const id = String(orderId);
      openOrderModal(id);
    }

    function deleteOrder(orderId) {
      // Validar que orderId sea válido
      if (!orderId) 
      {
        console.error('ID de orden no proporcionado');
        return;
      }
      
      // Asegurarse de que orderId sea un string o número válido
      if (typeof orderId !== 'string' && typeof orderId !== 'number') {
        console.error('ID de orden inválido:', orderId, typeof orderId);
        return;
      }
      
      // Convertir a string
      const id = String(orderId);
      
      showConfirmModal('Are you sure you want to delete this order?', 'Confirm Delete')
        .then(confirmed => {
          if (!confirmed) return;

          fetch(`/api/orders/${id}`, {
            method: 'DELETE'
          })
          .then(response => response.json())
          .then(async data => {
            if (data.success) 
            {
              await showAlertModal('Order deleted successfully', 'Success');
              renderOrders();
            } else 
            {
              await showAlertModal(data.error || data.message || 'Error deleting order', 'Error');
            }
          })
          .catch(async error => {
            console.error('Error al eliminar orden:', error);
            await showAlertModal('Error deleting order. Please try again.', 'Error');
          });
        });
    }

    // Función para mostrar notificaciones junto con la animación
    function showNotification(message, type = 'success') {
      const notification = document.createElement('div');
      notification.className = `notification notification-${type}`;
      
      const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
      notification.innerHTML = `
        <div class="notification-content">
          <i class="fas ${icon}"></i>
          <span>${message}</span>
        </div>
      `;
      document.body.appendChild(notification);
      setTimeout(() => {
        notification.classList.add('show');
      }, 10);
      setTimeout(() => {
        notification.classList.remove('show');
        setTimeout(() => {
          notification.remove();
        }, 300);
      }, 3000);
    }

    // Función para mostrar modal de alerta personalizado
    function showAlertModal(message, title = 'Information') {
      return new Promise((resolve) => {
        // Crear modal
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.display = 'flex';
        modal.innerHTML = `
          <div class="modal-content glass-card" style="max-width: 500px; text-align: center;">
            <div class="modal-header" style="justify-content: center; margin-bottom: 20px;">
              <h3 style="margin: 0;">${title}</h3>
            </div>
            <div class="modal-body" style="margin-bottom: 25px;">
              <p style="font-size: 16px; color: var(--text-primary); line-height: 1.6; margin: 0;">${message}</p>
            </div>
            <div class="modal-actions" style="justify-content: center;">
              <button class="btn-primary" id="alertModalOk" style="padding: 12px 32px; min-width: 120px; border: none; border-radius: 30px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.3s ease; background: linear-gradient(to bottom right, #273f26, #50daa1); color: white; box-shadow: var(--shadow-md);">Close</button>
            </div>
          </div>
        `;
        document.body.appendChild(modal);

        // Event listeners
        const okBtn = document.getElementById('alertModalOk');
        
        // Agregar efectos hover
        okBtn.addEventListener('mouseenter', function() {
          this.style.transform = 'translateY(-2px)';
          this.style.boxShadow = 'var(--shadow-lg)';
        });
        okBtn.addEventListener('mouseleave', function() {
          this.style.transform = 'translateY(0)';
          this.style.boxShadow = 'var(--shadow-md)';
        });
        
        const closeModal = () => {
          modal.style.display = 'none';
          setTimeout(() => modal.remove(), 300);
          resolve();
        };

        okBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
          if (e.target === modal) closeModal();
        });
      });
    }

    // Función para mostrar modal de confirmación personalizado
    function showConfirmModal(message, title = 'Confirm') 
    {
      return new Promise((resolve) => {
        // Crear modal
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.display = 'flex';
        modal.innerHTML = `
          <div class="modal-content glass-card" style="max-width: 500px; text-align: center;">
            <div class="modal-header" style="justify-content: center; margin-bottom: 20px;">
              <h3 style="margin: 0;">${title}</h3>
            </div>
            <div class="modal-body" style="margin-bottom: 25px;">
              <p style="font-size: 16px; color: var(--text-primary); line-height: 1.6; margin: 0;">${message}</p>
            </div>
            <div class="modal-actions" style="justify-content: center; gap: 15px;">
              <button class="btn-secondary" id="confirmModalCancel" style="padding: 12px 32px; min-width: 120px; border: none; border-radius: 30px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.3s ease; background: rgba(200, 47, 47, 0.319); color: var(--text-primary);">Cancel</button>
              <button class="btn-primary" id="confirmModalOk" style="padding: 12px 32px; min-width: 120px; border: none; border-radius: 30px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.3s ease; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color: white; box-shadow: var(--shadow-md);">Confirm</button>
            </div>
          </div>
        `;
        document.body.appendChild(modal);

        // Event listeners
        const okBtn = document.getElementById('confirmModalOk');
        const cancelBtn = document.getElementById('confirmModalCancel');
        
        // Agregar efectos hover al botón de confirmar
        okBtn.addEventListener('mouseenter', function() {
          this.style.transform = 'translateY(-2px)';
          this.style.boxShadow = 'var(--shadow-lg)';
        });
        okBtn.addEventListener('mouseleave', function() {
          this.style.transform = 'translateY(0)';
          this.style.boxShadow = 'var(--shadow-md)';
        });
        
        // Agregar efectos hover al botón de cancelar
        cancelBtn.addEventListener('mouseenter', function() {
          this.style.background = 'rgba(255, 255, 255, 0.3)';
        });
        cancelBtn.addEventListener('mouseleave', function() {
          this.style.background = 'rgba(200, 47, 47, 0.319)';
        });
        
        const closeModal = (result) => {
          modal.style.display = 'none';
          setTimeout(() => modal.remove(), 300);
          resolve(result);
        };

        okBtn.addEventListener('click', () => closeModal(true));
        cancelBtn.addEventListener('click', () => closeModal(false));

          if (e.target === modal) closeModal(false);
        });
      });

    // Función para expandir/colapsar usuarios de un número de parte
    async function togglePartNumberUsers(partNumber, orderId, headerElement) 
    {
      const containerId = `partNumberUsers-${partNumber}`;
      const container = document.getElementById(containerId);
      const expandBtn = headerElement.querySelector('.part-number-expand-btn');
      const icon = expandBtn.querySelector('i');
      
      if (!container) return;
      
      // Si está oculto, expandir y cargar usuarios
      if (container.style.display === 'none') 
      {
        container.style.display = 'block';
        icon.classList.remove('fa-chevron-down');
        icon.classList.add('fa-chevron-up');
        
        // Cargar usuarios si no se han cargado antes
        if (container.querySelector('.part-number-users-loading')) 
        {
          await loadPartNumberUsers(partNumber, orderId, container);
        }
      } else {
        // Colapsar
        container.style.display = 'none';
        icon.classList.remove('fa-chevron-up');
        icon.classList.add('fa-chevron-down');
      }
    }

      } catch (error) {
        console.error('Error loading part number users:', error);
        container.innerHTML = '<div class="part-number-users-error">Error loading users</div>';
      }
    }

    // Función para actualizar el tiempo de las órdenes en tiempo real
    let orderTimeUpdateInterval = null;
    let activeSessionsCache = null;
    let lastActiveSessionsUpdate = 0;
    let lastOrdersUpdate = 0; // Timestamp del último update de órdenes desde el servidor
    let ordersCache = null; // Cache de órdenes con tiempos actualizados
    let hasAuthError = false; // Flag para evitar múltiples llamadas fallidas (401)

    async function updateOrdersFromServer() 
    {
      try 
      {
        const response = await fetch('/api/orders');
        if (response.ok) 
        {
          const data = await response.json();
          if (data.success && data.orders) 
          {
            ordersCache = data.orders;
            lastOrdersUpdate = Date.now();

            const estadoLabels = {'revision': 'Review', 'trabajando en ella': 'Working on it', 'en espera de aprobacion': 'Pending approval', 'aprobada': 'Approved', 'cambios': 'Changes', 'issues': 'Issues'};
            
            // Actualizar los atributos data-base-time de los badges y los estados
            const timeBadges = document.querySelectorAll('.time-badge[data-order-id]');
            timeBadges.forEach(badge => {
              const orderId = parseInt(badge.getAttribute('data-order-id'));
              const order = ordersCache.find(o => o.id === orderId);
              if (order) 
              {
                // Actualizar tiempo base
                if (order.tiempo_real_segundos !== undefined) {
                  badge.setAttribute('data-base-time', order.tiempo_real_segundos.toString());
                  badge.setAttribute('data-load-time', Date.now().toString());
                }
                
                // Actualizar estado de la orden
                const orderRow = badge.closest('.order-header');
                if (orderRow) 
                {
                  const statusCell = orderRow.querySelector('.list-item-cell[data-label="Status:"]');
                  if (statusCell) 
                  {
                    const estadoActual = order.estado || 'trabajando en ella';
                    const estadoLabel = estadoLabels[estadoActual] || estadoActual;
                    const estadoClass = estadoActual.replace(/\s+/g, '-').toLowerCase();
                    
                    // Actualizar el badge de estado
                    statusCell.innerHTML = `<span class="order-status-badge status-${estadoClass}">${estadoLabel}</span>`;
                  }
                }
              }
            });
          }
        }
      } catch (error) 
      {
        console.error('Error al actualizar órdenes desde el servidor:', error);
      }
    }

    async function updateOrderTimes() {
      try 
      {
        // Actualizar órdenes desde el servidor cada 10 segundos para obtener tiempos actualizados
        const now = Date.now();
        if (!lastOrdersUpdate || (now - lastOrdersUpdate) > 10000) 
        {
          await updateOrdersFromServer();
        }
        
        // Obtener sesión activa del localStorage (igual que leaderboard)
        let activeSession = null;
        try 
        {
          const sessionData = localStorage.getItem('activeSession');
          if (sessionData) 
          {
            activeSession = JSON.parse(sessionData);
          }
        } catch (e) 
        {
          // Continuar sin sesión activa si hay error
        }
        if (!hasAuthError && (!activeSessionsCache || (now - lastActiveSessionsUpdate) > 5000)) 
        {
          try 
          {
            const token = localStorage.getItem('sessionToken');
            if (!token) {
              // No hay token, no intentar más llamadas
              hasAuthError = true;
            } else 
            {
              const sessionsResponse = await fetch('/api/sesiones-activas', {
                headers: {
                  'Authorization': `Bearer ${token}`,
                  'Content-Type': 'application/json'
                }
              });
              
              if (sessionsResponse.ok) 
              {
                const sessionsData = await sessionsResponse.json();
                if (sessionsData.success && sessionsData.sessions) 
                {
                  activeSessionsCache = sessionsData.sessions;
                  lastActiveSessionsUpdate = now;
                  hasAuthError = false; // Resetear flag si funciona
                }
              } else if (sessionsResponse.status === 401) 
              {
                hasAuthError = true;
              }
            }
          } catch (error) 
          {
            if (error.status === 401 || (error.message && error.message.includes('401'))) 
            {
              hasAuthError = true;
            }
          }
        }

        const timeBadges = document.querySelectorAll('.time-badge[data-order-id]');
        timeBadges.forEach(badge => {
          const orderId = parseInt(badge.getAttribute('data-order-id'));
          const orderName = badge.closest('.order-header')?.querySelector('.order-number-badge')?.textContent?.trim();
          const baseTimeSeconds = parseFloat(badge.getAttribute('data-base-time')) || 0;
          
          const totalSecondsSaved = Math.floor(baseTimeSeconds);
          const hoursSaved = Math.floor(totalSecondsSaved / 3600);
          const minutesSaved = Math.floor((totalSecondsSaved % 3600) / 60);
          const secondsSaved = totalSecondsSaved % 60;
          const formattedSaved = `${String(hoursSaved).padStart(2, '0')}:${String(minutesSaved).padStart(2, '0')}:${String(secondsSaved).padStart(2, '0')}`;
          
          const timeValue = badge.querySelector('.time-value');
          if (timeValue) 
          {
            timeValue.textContent = formattedSaved;
          }
 
          const container = badge.closest('.time-badge-container');
          const currentSessionBadge = container ? container.querySelector('.time-badge-current-session[data-order-id="' + orderId + '"]') : null;
          let currentSessionTime = 0;
          let showCurrentSession = false;
          
          // PRIORIDAD 1: Si hay sesión activa del localStorage para esta orden, calcular tiempo de sesión actual
          if (activeSession && activeSession.orderNumber && activeSession.startTime) 
          {
            // Comparar tanto por nombre como por ID de orden
            const sessionOrderName = activeSession.orderNumber;
            const sessionOrderId = activeSession.orderId || activeSession.currentOrderId;
            
            // Obtener el nombre de la orden desde el badge o el orderRow
            const orderRow = badge.closest('.order-header');
            const orderNameFromBadge = orderRow?.querySelector('.order-number-badge')?.textContent?.trim();
            const finalOrderName = orderName || orderNameFromBadge || '';
            
            // Verificar si la sesión corresponde a esta orden (comparar por nombre o ID)
            const matchesOrder = (sessionOrderName && (sessionOrderName === finalOrderName || sessionOrderName === order.nombre ||sessionOrderName.toString() === finalOrderName.toString())) || (sessionOrderId && (sessionOrderId === orderId || sessionOrderId.toString() === orderId.toString()));
            
            if (matchesOrder) 
            {
              const currentTime = Date.now();
              const sessionStart = activeSession.startTime;
              const pausedTime = activeSession.pausedTime || 0;
              currentSessionTime = (currentTime - sessionStart - pausedTime) / 1000; // en segundos
              showCurrentSession = true;
            }
          }
          
          // PRIORIDAD 2: Si no hay sesión en localStorage, buscar en sesiones activas del servidor
          if (!showCurrentSession && activeSessionsCache) {
            // PRIORIDAD 2: Buscar sesiones activas del servidor para esta orden
            activeSessionsCache.forEach(session => 
            {
              if ((session.orden_id === orderId || session.orden_nombre === orderName) && session.fecha_inicio) {
                const sessionStart = new Date(session.fecha_inicio).getTime();
                const sessionElapsed = (Date.now() - sessionStart) / 1000; // en segundos

                if (!session.fecha_fin || (Date.now() - new Date(session.fecha_fin).getTime()) < 60000) 
                {
                  let pausedTime = 0;
                  if (session.tiempo_pausa) 
                  {
                    const pauseMatch = session.tiempo_pausa.match(/(\d+):(\d+):(\d+)/);
                    if (pauseMatch) 
                    {
                      pausedTime = parseInt(pauseMatch[1]) * 3600 + parseInt(pauseMatch[2]) * 60 + parseInt(pauseMatch[3]);
                    }
                  }
                  
                  currentSessionTime += Math.max(0, sessionElapsed - pausedTime);
                  showCurrentSession = true;
                }
              }
            });
          }
          
          // Actualizar el tiempo de la sesión actual (abajo)
          if (currentSessionBadge) 
          {
            if (showCurrentSession && currentSessionTime > 0) 
            {
              const totalSecondsCurrent = Math.floor(currentSessionTime);
              const hoursCurrent = Math.floor(totalSecondsCurrent / 3600);
              const minutesCurrent = Math.floor((totalSecondsCurrent % 3600) / 60);
              const secondsCurrent = totalSecondsCurrent % 60;
              const formattedCurrent = `${String(hoursCurrent).padStart(2, '0')}:${String(minutesCurrent).padStart(2, '0')}:${String(secondsCurrent).padStart(2, '0')}`;
              
              const timeValueCurrent = currentSessionBadge.querySelector('.time-value-current');
              if (timeValueCurrent) 
              {
                timeValueCurrent.textContent = formattedCurrent;
              }
              currentSessionBadge.style.display = 'inline-flex';
            } else 
            {
              currentSessionBadge.style.display = 'none';
            }
          } else 
          {
            // Si no se encuentra el badge, intentar crearlo
            if (showCurrentSession && currentSessionTime > 0 && container) 
            {
              const newBadge = document.createElement('span');
              newBadge.className = 'time-badge-current-session';
              newBadge.setAttribute('data-order-id', orderId);
              newBadge.setAttribute('data-order-name', orderName || '');
              newBadge.innerHTML = '<i class="fas fa-clock"></i> <span class="time-value-current">00:00:00</span>';
              
              const totalSecondsCurrent = Math.floor(currentSessionTime);
              const hoursCurrent = Math.floor(totalSecondsCurrent / 3600);
              const minutesCurrent = Math.floor((totalSecondsCurrent % 3600) / 60);
              const secondsCurrent = totalSecondsCurrent % 60;
              const formattedCurrent = `${String(hoursCurrent).padStart(2, '0')}:${String(minutesCurrent).padStart(2, '0')}:${String(secondsCurrent).padStart(2, '0')}`;
              
              const timeValueCurrent = newBadge.querySelector('.time-value-current');
              if (timeValueCurrent) 
              {
                timeValueCurrent.textContent = formattedCurrent;
              }
              newBadge.style.display = 'inline-flex';
              container.appendChild(newBadge);
            }
          }
        });
      } catch (error) 
      {
        console.error('Error updating order times:', error);
      }
    }

    // Función para actualizar los números de parte activos de los usuarios cada 10 segundos
    let lastPartNumbersUpdate = 0;
    async function updateUserPartNumbers() 
    {
      try 
      {
        const now = Date.now();
        // Actualizar cada 10 segundos
        if (!lastPartNumbersUpdate || (now - lastPartNumbersUpdate) > 10000) 
        {
          lastPartNumbersUpdate = now;
          let activeSession = null;
          try 
          {
            const sessionData = localStorage.getItem('activeSession');
            if (sessionData) 
            {
              activeSession = JSON.parse(sessionData);
            }
          } catch (e) 
          {
            // Continuar sin sesión activa si hay error
          }
          
          // Obtener sesiones activas del servidor (para otros usuarios)
          let activeSessions = [];
          if (!hasAuthError) {
            try 
            {
              const token = localStorage.getItem('sessionToken');
              if (token) 
              {
                const sessionsResponse = await fetch('/api/sesiones-activas', {
                  headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                  }
                });
                
                if (sessionsResponse.ok) 
                {
                  const sessionsData = await sessionsResponse.json();
                  if (sessionsData.success && sessionsData.sessions) 
                  {
                    activeSessions = sessionsData.sessions;
                  }
                } else if (sessionsResponse.status === 401) 
                {
                  hasAuthError = true;
                }
              }
            } catch (error) 
            {
              // Silenciar errores
            }
          }
          
          // Actualizar números de parte en las filas de usuarios
          const userRows = document.querySelectorAll('.team-list-item[data-username]');
          const currentUsername = localStorage.getItem('username') || '';
          
          userRows.forEach(row => {
            const username = row.getAttribute('data-username');
            const partNumberBadge = row.querySelector('.part-number-badge');
            if (!partNumberBadge) return;
            
            let newPartNumber = null;
            
            // PRIORIDAD 1: Si es el usuario actual, usar localStorage
            if (activeSession && activeSession.partNumber) 
            {
              const usernameLower = currentUsername.toLowerCase().trim();
              const rowUsernameLower = username.toLowerCase().trim();
              
              if (usernameLower === rowUsernameLower || 
                  rowUsernameLower.includes(usernameLower) ||
                  usernameLower.includes(rowUsernameLower.split(' ')[0])) {
                newPartNumber = activeSession.partNumber;
              }
            }
            
            // PRIORIDAD 2: Buscar en sesiones activas del servidor
            if (!newPartNumber && activeSessions.length > 0) {
              const userSession = activeSessions.find(s => {
                const sessionUsername = (s.usuario_nombre || s.nombre || '').toLowerCase().trim();
                const sessionUsuario = (s.usuario || '').toLowerCase().trim();
                const rowUsernameLower = username.toLowerCase().trim();
                
                return (sessionUsername === rowUsernameLower || sessionUsuario === rowUsernameLower || sessionUsername.includes(rowUsernameLower.split(' ')[0]) || rowUsernameLower.includes(sessionUsername.split(' ')[0]));
              });
              
              if (userSession && userSession.part_number) 
              {
                newPartNumber = userSession.part_number;
              }
            }
            if (newPartNumber) 
            {
              partNumberBadge.textContent = newPartNumber;
            } else if (partNumberBadge.textContent.trim() !== '-') {
              partNumberBadge.textContent = '-';
            }
          });
        }
      } catch (error) 
      {
        console.error('Error al actualizar números de parte:', error);
      }
    }

    function startOrderTimeUpdates() 
    {
      if (orderTimeUpdateInterval) {
        clearInterval(orderTimeUpdateInterval);
      }

      orderTimeUpdateInterval = setInterval(() => {
        updateOrderTimes();
        updateUserPartNumbers();
      }, 1000);
      updateOrderTimes();
      updateUserPartNumbers();
    }

    function stopOrderTimeUpdates() 
    {
      if (orderTimeUpdateInterval) 
      {
        clearInterval(orderTimeUpdateInterval);
        orderTimeUpdateInterval = null;
      }
    }

    const originalRenderOrdersList = window.renderOrdersList;
    if (originalRenderOrdersList) 
    {
      window.renderOrdersList = function(...args) {
        const result = originalRenderOrdersList.apply(this, args);
        setTimeout(() => {
          startOrderTimeUpdates();
        }, 100);
        return result;
      };
    }
  </script>
</body>
