<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="styles/denuncias_anonimas.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denuncias Anónimas</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Denuncias Anónimas</h1>
            <p>Recursos Humanos</p>
        </div>    
        <div class="form-container">
            <form id="solicitudForm">  
                     
                <div class="form-group">
                    <label for="issue">Descripción de la Denuncia <span class="required">*</span></label>
                    <textarea id="issue" name="issue" required placeholder="Describe detalladamente tu denuncia..."></textarea>
                </div>
                
                <div class="form-group">
                    <label for="image">Imagen (opcional)</label>
                    <input type="file" id="image" name="image" accept="image/*">
                </div>
                
                <button type="submit" class="submit-btn">
                    Enviar Denuncia
                </button>
            </form>
            
            <div id="successMessage" class="success-message">
                Tu denuncia ha sido enviada exitosamente. Te contactaremos pronto.
            </div>
            
            <div id="errorMessage" class="error-message">
                Hubo un error al enviar tu denuncia. Por favor, inténtalo de nuevo.
            </div>
        </div>
    </div>
    <!-- Modal de éxito con animación -->
    <div id="successModal" class="success-modal">
        <div class="modal-content">
            <div class="success-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22,4 12,14.01 9,11.01"></polyline>
                </svg>
            </div>
            <h2>¡Denuncia Enviada!</h2>
            <p>Tu denuncia ha sido recibida exitosamente.</p>
            <button id="nuevaSolicitudBtn" class="nueva-solicitud-btn">Nueva denuncia</button>
        </div>
    </div>
    <script>
        function capitalizeWords(str) 
        {
            return str.replace(/\b\w/g, function(char) 
            {
                return char.toUpperCase();
            });
        }
        // Función para mostrar el modal de éxito
        function showSuccessModal() 
        {
            const modal = document.getElementById('successModal');
            modal.style.display = 'flex';
            setTimeout(() => 
            {
                modal.classList.add('show');
            }, 10);
        }
        function hideSuccessModal() 
        {
            const modal = document.getElementById('successModal');
            modal.classList.remove('show');
            setTimeout(() => 
            {
                modal.style.display = 'none';
            }, 300);
        }

        // Evento para el botón de nueva denuncia
        document.getElementById('nuevaSolicitudBtn').addEventListener('click', function() 
        {
            hideSuccessModal();
            document.getElementById('solicitudForm').reset();
            hideMessages();
        });

        document.getElementById('solicitudForm').addEventListener('submit', async function(e) 
        {
            e.preventDefault();
            console.log('Formulario enviado, iniciando validación...');
            
            // Validar campos obligatorios
            const issue = document.getElementById('issue').value.trim();
            const imageFile = document.getElementById('image').files[0];
            
            console.log('Datos del formulario:', 
            {
                issue: issue,
                image: imageFile
            });

            // Mostrar indicador de carga
            const submitBtn = document.querySelector('.submit-btn');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Enviando...';
            submitBtn.disabled = true;
            
            try 
            {
                const formData = new FormData();
                formData.append('issue', issue);
                if (imageFile) {
                    formData.append('image', imageFile);
                }
                
                console.log('Datos a enviar:', {
                    issue: issue,
                    image: imageFile ? imageFile.name : 'Sin imagen'
                });
                console.log('URL de la API:', '/api/denuncias-anonimas');
                
                // Enviar datos al servidor
                const response = await fetch('/api/denuncias-anonimas', {
                    method: 'POST',
                    body: formData
                });
                
                console.log('Respuesta del servidor recibida:', {
                    status: response.status,
                    statusText: response.statusText,
                    ok: response.ok
                });
                
                if (response.ok) 
                {
                    const result = await response.json();
                    console.log('Denuncia enviada exitosamente:', result);
                    showSuccessModal();
                    document.getElementById('solicitudForm').reset();
                } else 
                {
                    const errorData = await response.json();
                    console.error('Error del servidor:', errorData);
                    throw new Error(errorData.error || 'Error al enviar la denuncia');
                }
            } catch (error) 
            {
                console.error('Error al enviar denuncia:', error);
                console.error('Stack trace:', error.stack);
                showMessage('error', 'Error al enviar la denuncia: ' + error.message);
            } finally {
                // Restaurar botón
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });
        
        function showMessage(type, message) {
            hideMessages();
            
            if (type === 'success') 
            {
                document.getElementById('successMessage').style.display = 'block';
                document.getElementById('successMessage').textContent = message;
            } else 
            {
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('errorMessage').textContent = message;
            }
        }
        function hideMessages() 
        {
            document.getElementById('successMessage').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
        }
        
        const inputs = document.querySelectorAll('input, textarea');
        inputs.forEach(input => 
        {
            input.addEventListener('blur', function() 
            {
                if (this.hasAttribute('required') && !this.value.trim()) {
                    this.parentElement.classList.add('error');
                    if (!this.parentElement.querySelector('.error-text')) 
                    {
                        const errorText = document.createElement('div');
                        errorText.className = 'error-text';
                        errorText.textContent = 'Este campo es requerido';
                        this.parentElement.appendChild(errorText);
                    }
                } else 
                {
                    this.parentElement.classList.remove('error');
                    const errorText = this.parentElement.querySelector('.error-text');
                    if (errorText) 
                    {
                        errorText.remove();
                    }
                }
            });
            input.addEventListener('input', function() 
            {
                if (this.value.trim()) 
                {
                    this.parentElement.classList.remove('error');
                    const errorText = this.parentElement.querySelector('.error-text');
                    if (errorText) 
                    {
                        errorText.remove();
                    }
                }
            });
        });
    </script>
</body>
</html>
