document.addEventListener('DOMContentLoaded', function() {

    anuncios: 'anuncios.html',

  };

  const currentPage = window.location.pathname.split('/').pop() || 'inventario.html';

  document.querySelectorAll('.tab-switch-button[data-tab]').forEach(button => {
    button.addEventListener('click', function() {
      const targetPage = tabRoutes[this.dataset.tab];
      if (!targetPage || targetPage === currentPage) {
        return;
      }
      window.location.href = targetPage;
    });
  });
});

  <script>
    document.addEventListener('DOMContentLoaded', function() 
    {
      setTimeout(() => {
        document.querySelectorAll('.menu-item.has-submenu').forEach(menuItem => {
          const submenu = menuItem.querySelector('.submenu');
          const arrow = menuItem.querySelector('.submenu-arrow');       
          menuItem.addEventListener('click', function(e) 
          {

            if (e.target.closest('.submenu')) return;
            e.preventDefault();
            e.stopPropagation();
            document.querySelectorAll('.menu-item.has-submenu .submenu.active').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-item.has-submenu .submenu-arrow').forEach(a => a.style.transform = 'rotate(0deg)');

            if (submenu) 
            {
              submenu.classList.toggle('active');
              if (submenu.classList.contains('active')) 
              {
                arrow.style.transform = 'rotate(180deg)';
              } else 
              {
                arrow.style.transform = 'rotate(0deg)';
              }
            }
          });
        });
        

        document.addEventListener('click', function(e) 
        {
          if (!e.target.closest('.menu-item.has-submenu')) 
          {
            document.querySelectorAll('.menu-item.has-submenu .submenu.active').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-item.has-submenu .submenu-arrow').forEach(a => a.style.transform = 'rotate(0deg)');
          }
        });
      }, 1500); // Aumentar el tiempo de espera
    });

    function moverHighlight() 
    {
      const topbar = document.querySelector('.topbar');
      const highlight = topbar.querySelector('.glass-highlight');
      const btnSel = topbar.querySelector('.menu-item.selected');
      
      if (!btnSel) return;
      
      const rectTopbar = topbar.getBoundingClientRect();
      const rectBtn = btnSel.getBoundingClientRect();
      const left = rectBtn.left - rectTopbar.left; 
      highlight.style.left = left + 'px';
      highlight.style.width = rectBtn.width + 'px';
    }

    function addChromaticEffect(element) 
    {
      element.classList.add('clicked');
      setTimeout(() => {
        element.classList.remove('clicked');
      }, 600);
    }

    document.addEventListener('DOMContentLoaded', function() 
    {
      setTimeout(() => {
        document.querySelectorAll('.menu-item').forEach(button => {
          button.addEventListener('click', function() {
            document.querySelectorAll('.menu-item.selected').forEach(b => b.classList.remove('selected'));
            this.classList.add('selected');
            addChromaticEffect(this);
            moverHighlight(); // Mueve el highlight visualmente
          });
        });
      }, 1500);
    });

    document.addEventListener('DOMContentLoaded', function() 
    {
      const userIcon = document.getElementById('userIcon');
      if (userIcon) 
      {
        userIcon.addEventListener('click', function() 
        {
          addChromaticEffect(this);
          window.location.href = 'usuario.html';
        });
      }
    });

    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(() => {
        moverHighlight();
      }, 1600);
    });
    
    window.addEventListener('resize', moverHighlight);
  </script>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script>
    (function(){
      const API_BASE_URL = window.location.origin;
      function showStatus(msg, kind){
        const el = document.getElementById('descargaStatus');
        if(!el) return; el.textContent = msg||''; el.style.color = kind==='error'?'#f88':'#aaa';
      }
      function formatSpanishLong(d){
        try{
          const s = d.toLocaleDateString('es-MX', { year:'numeric', month:'long', day:'numeric' });
          return s.replace(/ de (\d{4})$/, ' del $1');
        }catch(_){ return ''; }
      }
      function setDefaultRange(){
        const today = new Date();
        today.setHours(0,0,0,0);
        const dow = today.getDay(); // 0=Dom,1=Lun,...
        const thisMonday = new Date(today);
        const diffToMonday = dow === 0 ? -6 : 1 - dow; // mover a lunes de esta semana
        thisMonday.setDate(today.getDate() + diffToMonday);
        const lastMonday = new Date(thisMonday);
        lastMonday.setDate(thisMonday.getDate() - 7);
        const lastSaturday = new Date(lastMonday);
        lastSaturday.setDate(lastMonday.getDate() + 5);
        const iniISO = lastMonday.toISOString().split('T')[0];
        const finISO = lastSaturday.toISOString().split('T')[0];
        const iniLbl = formatSpanishLong(lastMonday);
        const finLbl = formatSpanishLong(lastSaturday);
        const iniHidden = document.getElementById('fechaInicioComidas');
        const finHidden = document.getElementById('fechaFinComidas');
        const iniLabel = document.getElementById('fechaInicioLabel');
        const finLabel = document.getElementById('fechaFinLabel');
        if(iniHidden) iniHidden.value = iniISO;
        if(finHidden) finHidden.value = finISO;
        if(iniLabel) iniLabel.placeholder = iniLbl;
        if(finLabel) finLabel.placeholder = finLbl;
      }
      function wireDatePickers(){
        const iniLabel = document.getElementById('fechaInicioLabel');
        const finLabel = document.getElementById('fechaFinLabel');
        const iniHidden = document.getElementById('fechaInicioComidas');
        const finHidden = document.getElementById('fechaFinComidas');
        function openPicker(input){
          try{
            if(input.showPicker){
              input.focus();
              input.showPicker();
              return;
            }
          }catch(_){ }
          // Fallback: focus to trigger the native picker
          input.style.opacity = 0.01;
          input.style.pointerEvents = 'auto';
          input.focus();
          setTimeout(()=>{
            input.style.opacity = 0;
            input.style.pointerEvents = 'none';
          }, 400);
        }
        if(iniLabel && iniHidden){
          iniLabel.addEventListener('click', ()=> openPicker(iniHidden));
          iniHidden.addEventListener('change', ()=>{
            const d = new Date(iniHidden.value);
            iniLabel.value = formatSpanishLong(d);
          });
        }
        if(finLabel && finHidden){
          finLabel.addEventListener('click', ()=> openPicker(finHidden));
          finHidden.addEventListener('change', ()=>{
            const d = new Date(finHidden.value);
            finLabel.value = formatSpanishLong(d);
          });
        }
      }
      async function fetchJSON(url){
        const r = await fetch(url);
        if(!r.ok) throw new Error('Error al consultar: '+url);
        return await r.json();
      }
      async function getEmpleados(){
        return await fetchJSON('/api/empleados');
      }
      async function getComidasEmpleadoRango(empId, inicio, fin){
        const url = `${API_BASE_URL}/api/comidas/empleado/${empId}?inicio=${encodeURIComponent(inicio)}&fin=${encodeURIComponent(fin)}`;
        try{ return await fetchJSON(url); }catch(_){ return []; }
      }
      function toISODate(d){ return new Date(d).toISOString().split('T')[0]; }
      function validarFechas(inicio, fin){
        if(!inicio||!fin) return 'Selecciona ambas fechas';
        const di = new Date(inicio), df = new Date(fin);
        if(isNaN(di)||isNaN(df)) return 'Fechas inválidas';
        if(di>df) return 'Inicio debe ser antes de fin';
        return null;
      }
      async function descargarExcelComidas(){
        try{
          const inicio = document.getElementById('fechaInicioComidas').value;
          const fin = document.getElementById('fechaFinComidas').value;
          const err = validarFechas(inicio, fin);
          if(err){ showStatus(err, 'error'); return; }
          showStatus('Generando archivo…');
          const empleados = await getEmpleados();
          
          // Crear un array para guardar empleados con sus totales
          const empleadosTotales = [];
          
          for(const emp of empleados){
            const lista = await getComidasEmpleadoRango(emp.id, inicio, fin);
            if(!Array.isArray(lista)) continue;
            let subtotal = 0;
            for(const c of lista){
              const cantidad = parseInt(c.cantidad,10)||0;
              subtotal += cantidad;
            }
            // Solo agregar si hay comidas
            if(subtotal > 0){
              empleadosTotales.push({
                id: emp.id || '',
                nombre: emp.nombre_completo || '',
                cantidad: subtotal
              });
            }
          }
          
          // Crear las filas del Excel
          const header = ['Número de Empleado', 'Nombre', 'Cantidad'];
          const rows = [header];
          let total = 0;
          
          // Agregar cada empleado con sus columnas separadas
          for(const emp of empleadosTotales){
            rows.push([emp.id, emp.nombre, emp.cantidad]);
            total += emp.cantidad;
          }
          
          rows.push(['', 'TOTAL', total]);
          const ws = XLSX.utils.aoa_to_sheet(rows);
          const wb = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb, ws, 'Comidas');
          const filename = `comidas_${toISODate(inicio)}_${toISODate(fin)}.xlsx`;
          XLSX.writeFile(wb, filename);
          showStatus(`Descargado: ${filename}`);
        }catch(e){
          console.error(e);
          showStatus('No se pudo generar el Excel', 'error');
        }
      }
      document.addEventListener('DOMContentLoaded', ()=>{
        setDefaultRange();
        wireDatePickers();
        const btn = document.getElementById('btnDescargarExcelComidas');
        if(btn){ btn.addEventListener('click', descargarExcelComidas); }        
        // Advertencia al limpiar navegador (cuando se intenta recargar o cambiar página)
        // Listener eliminado: no mostrar confirmación al salir.
      });
    })();
  </script>
