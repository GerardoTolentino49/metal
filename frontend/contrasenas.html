    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(() => {
        document.querySelectorAll('.menu-item.has-submenu').forEach(menuItem => {
          const submenu = menuItem.querySelector('.submenu');
          const arrow = menuItem.querySelector('.submenu-arrow');

          menuItem.addEventListener('click', function(e) {
            if (e.target.closest('.submenu')) return;
            e.preventDefault();
            e.stopPropagation();

            document.querySelectorAll('.menu-item.has-submenu .submenu.active').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-item.has-submenu .submenu-arrow').forEach(a => a.style.transform = 'rotate(0deg)');

            if (submenu) {
              submenu.classList.toggle('active');
              if (submenu.classList.contains('active')) {
                arrow.style.transform = 'rotate(180deg)';
              } else {
                arrow.style.transform = 'rotate(0deg)';
              }
            }
          });
        });

        document.addEventListener('click', function(e) {
          if (!e.target.closest('.menu-item.has-submenu') && !e.target.closest('.submenu')) {
            document.querySelectorAll('.menu-item.has-submenu .submenu.active').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-item.has-submenu .submenu-arrow').forEach(a => a.style.transform = 'rotate(0deg)');
          }
        });
      }, 1500);
    });

  <script>
    // Control de submenús desplegables para la barra superior
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(() => {
        // Control de submenús
        document.querySelectorAll('.menu-item.has-submenu').forEach(menuItem => {
          const submenu = menuItem.querySelector('.submenu');
          const arrow = menuItem.querySelector('.submenu-arrow');

          menuItem.addEventListener('click', function(e) {
            // Solo si el clic es en el propio botón, no en el submenú
            if (e.target.closest('.submenu')) return;
            e.preventDefault();
            e.stopPropagation();

            // Oculta todos los submenús primero
            document.querySelectorAll('.menu-item.has-submenu .submenu.active').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-item.has-submenu .submenu-arrow').forEach(a => a.style.transform = 'rotate(0deg)');

            // Alterna el submenú del botón clickeado
            if (submenu) {
              submenu.classList.toggle('active');
              if (submenu.classList.contains('active')) {
                arrow.style.transform = 'rotate(180deg)';
              } else {
                arrow.style.transform = 'rotate(0deg)';
              }
            }
          });
        });

        // Ocultar submenús al hacer clic fuera
        document.addEventListener('click', function(e) {
          if (!e.target.closest('.menu-item.has-submenu') && !e.target.closest('.submenu')) {
            document.querySelectorAll('.menu-item.has-submenu .submenu.active').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-item.has-submenu .submenu-arrow').forEach(a => a.style.transform = 'rotate(0deg)');
          }
        });

        // Highlight y efecto cromático
        function moverHighlight() {
          const topbar = document.querySelector('.topbar');
          const highlight = topbar.querySelector('.glass-highlight');
          const btnSel = topbar.querySelector('.menu-item.selected');
          if (!btnSel) return;
          const rectTopbar = topbar.getBoundingClientRect();
          const rectBtn = btnSel.getBoundingClientRect();
          const left = rectBtn.left - rectTopbar.left;
          highlight.style.left = left + 'px';
          highlight.style.width = rectBtn.width + 'px';
        }

        function addChromaticEffect(element) {
          element.classList.add('clicked');
          setTimeout(() => {
            element.classList.remove('clicked');
          }, 600);
        }

        document.querySelectorAll('.menu-item').forEach(button => {
          button.addEventListener('click', function() {
            document.querySelectorAll('.menu-item.selected').forEach(b => b.classList.remove('selected'));
            this.classList.add('selected');
            addChromaticEffect(this);
            moverHighlight();
          });
        });

        const userIcon = document.getElementById('userIcon'); //Efecto cromático al icono de usuario
        if (userIcon) 
        {
          userIcon.addEventListener('click', function() {
            addChromaticEffect(this);
          });
        }

        setTimeout(() => {
          moverHighlight();
        }, 100);
        window.addEventListener('resize', moverHighlight);
      }, 1500);
    });

    document.querySelectorAll('.lisa-btn-cromatica').forEach(btn => {
      btn.addEventListener('click', function() {
        btn.classList.remove('clicked');
        void btn.offsetWidth; // Reflow para reiniciar animación
        btn.classList.add('clicked');
      });
    });
  </script>
  <script>
    function getContrastYIQ(hexcolor) { //Contraste automático para el texto del topbar
      hexcolor = hexcolor.replace('#', '');
      if (hexcolor.length === 3) {
        hexcolor = hexcolor[0]+hexcolor[0]+hexcolor[1]+hexcolor[1]+hexcolor[2]+hexcolor[2];
      }
      var r = parseInt(hexcolor.substr(0,2),16);
      var g = parseInt(hexcolor.substr(2,2),16);
      var b = parseInt(hexcolor.substr(4,2),16);
      var yiq = ((r*299)+(g*587)+(b*114))/1000;
      return (yiq >= 128) ? 'dark' : 'light';
    }

    function updateTopbarContrast() 
    {
      // Detecta el color de fondo real de la topbar
      const topbar = document.querySelector('.topbar');
      if (!topbar) return;
      let bg = window.getComputedStyle(topbar).backgroundColor;
      // Convierte a hex
      function rgb2hex(rgb) {
        if (!rgb) return '#fff';
        let result = rgb.match(/rgba?\((\d+), (\d+), (\d+)/);
        if (!result) return '#fff';
        return '#' +
          (parseInt(result[1]).toString(16).padStart(2, '0')) +
          (parseInt(result[2]).toString(16).padStart(2, '0')) +
          (parseInt(result[3]).toString(16).padStart(2, '0'));
      }
      let hex = rgb2hex(bg);
      let contrast = getContrastYIQ(hex);
      // Aplica el data-contrast a los elementos del menú
      document.querySelectorAll('.menu-item, .submenu-item, .topbar-header h1, .lisa-btn-cromatica').forEach(el => {
        el.setAttribute('data-contrast', contrast);
      });
    }
    // Ejecuta al cargar y al cambiar el tema
    document.addEventListener('DOMContentLoaded', updateTopbarContrast);
    window.addEventListener('resize', updateTopbarContrast);
    // Si tienes un switch de tema, llama a updateTopbarContrast() después de cambiar el tema
  </script>

  <script>
    // Control de submenús desplegables
    document.addEventListener('DOMContentLoaded', function() 
    {
      document.body.classList.add('sidebar-ready');
      
      const menuButtons = [
        { btn: 'itMenuBtn', submenu: 'itSubmenu' },
        { btn: 'rhMenuBtn', submenu: 'rhSubmenu' },
        { btn: 'designMenuBtn', submenu: 'designSubmenu' },
        { btn: 'warehouseMenuBtn', submenu: 'warehouseSubmenu' },
        { btn: 'maintenanceMenuBtn', submenu: 'maintenanceSubmenu' },
        { btn: 'adminMenuBtn', submenu: 'adminSubmenu' }
      ];

      menuButtons.forEach(({ btn, submenu }) => 
      {
        const button = document.getElementById(btn);
        const submenuElement = document.getElementById(submenu);
        
        if (button && submenuElement) 
        {
          let isOpen = false;
          let timeoutId = null;
          
          // Función para mostrar el submenú
          function showSubmenu() 
          {
            submenuElement.style.display = 'block';
            button.querySelector('.submenu-arrow').style.transform = 'rotate(180deg)';
            // Agregar clase para animación después de un pequeño delay
            setTimeout(() => 
            {
              submenuElement.classList.add('show');
            }, 10);
          }
          
          // Función para ocultar el submenú
          function hideSubmenu() 
          {
            submenuElement.classList.remove('show');
            setTimeout(() => 
            {
              if (!isOpen) 
              {
                submenuElement.style.display = 'none';
                button.querySelector('.submenu-arrow').style.transform = 'rotate(0deg)';
              }
            }, 300);
          }
          
          // Mostrar al hacer hover en el botón
          button.addEventListener('mouseenter', function() 
          {
            if (!isOpen) 
            {
              clearTimeout(timeoutId);
              showSubmenu();
            }
          });

          button.addEventListener('mouseleave', function(e) 
          {
            if (!isOpen) 
            {
              timeoutId = setTimeout(() => 
              {
                hideSubmenu();
              }, 100);
            }
          });
          
          // Mantener abierto cuando el mouse entra al submenú
          submenuElement.addEventListener('mouseenter', function() 
          {
            clearTimeout(timeoutId);
          });
          
          // Ocultar cuando el mouse sale del submenú
          submenuElement.addEventListener('mouseleave', function() 
          {
            if (!isOpen) 
            {
              hideSubmenu();
            }
          });
          button.addEventListener('click', function(e) 
          {
      e.preventDefault();
            e.stopPropagation();
            isOpen = !isOpen;
      
            if (isOpen) 
            {
              showSubmenu();
            } else 
            {
              hideSubmenu();
            }
          });

          document.addEventListener('click', function(e) 
          {
            if (!button.contains(e.target) && !submenuElement.contains(e.target)) 
            {
              isOpen = false;
              hideSubmenu();
            }
          });
        }
      });
    });
  </script>

  <script>
    let usuarioActualId = null;
    let tarjetasDisponiblesActuales = {};
    let todasLasTarjetas = [];

    // Cargar usuarios y mostrar tabla
    let usuariosLista = [];
    let filteredUsuarios = [];
    let currentPage = 1;
    const pageSize = 10;

    async function cargarUsuarios() {
      try {
        const response = await fetch('/api/usuarios');
        if (!response.ok) throw new Error('Error al cargar usuarios');
        const usuarios = await response.json();
        usuariosLista = Array.isArray(usuarios) ? usuarios : [];
        filteredUsuarios = usuariosLista.slice();
        currentPage = 1;
        renderPage(currentPage);
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('usersTableBody').innerHTML = '<tr><td colspan="4" style="text-align:center; color:red;">Error al cargar usuarios</td></tr>';
      }
    }

    function escapeQuotes(str) {
      return String(str || '').replace(/'/g, "\\'");
    }

    async function renderPage(page) {
      const tbody = document.getElementById('usersTableBody');
      tbody.innerHTML = '';
      const start = (page - 1) * pageSize;
      const pageItems = filteredUsuarios.slice(start, start + pageSize);

      for (const usuario of pageItems) {
        const estado = usuario.activo ? 'Activo' : 'Inactivo';
        const estadoClase = usuario.activo ? 'activo' : 'inactivo';

        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${usuario.id}</td>
          <td>${usuario.nombre_completo || ''}</td>
          <td><span class="estado-badge ${estadoClase}">${estado}</span></td>
          <td>
            <button class="edit-tarjetas-btn" onclick="abrirModalTarjetas(${usuario.id}, '${escapeQuotes(usuario.nombre_completo)}')">
              <span class="btn-text">Gestionar Tarjetas</span>
            </button>
          </td>
        `;

        tbody.appendChild(row);
      }

      currentPage = page;
      updatePaginationControls();
    }

    function updatePaginationControls() {
      const totalPages = Math.max(1, Math.ceil(filteredUsuarios.length / pageSize));
      const container = document.getElementById('paginationControls');
      if (!container) return;
      container.innerHTML = '';

      const prev = document.createElement('button');
      prev.textContent = 'Anterior';
      prev.disabled = currentPage === 1;
      prev.addEventListener('click', () => renderPage(Math.max(1, currentPage - 1)));
      container.appendChild(prev);

      const maxButtons = 7;
      let startPage = Math.max(1, currentPage - Math.floor(maxButtons / 2));
      let endPage = Math.min(totalPages, startPage + maxButtons - 1);
      if (endPage - startPage + 1 < maxButtons) {
        startPage = Math.max(1, endPage - maxButtons + 1);
      }

      for (let p = startPage; p <= endPage; p++) {
        const btn = document.createElement('button');
        btn.textContent = p;
        if (p === currentPage) {
          btn.disabled = true;
          btn.style.fontWeight = '600';
        }
        btn.addEventListener('click', () => renderPage(p));
        container.appendChild(btn);
      }

      const next = document.createElement('button');
      next.textContent = 'Siguiente';
      next.disabled = currentPage >= totalPages;
      next.addEventListener('click', () => renderPage(Math.min(totalPages, currentPage + 1)));
      container.appendChild(next);
    }

    // Obtener tarjetas disponibles de un usuario desde la tabla tarjetas_disponibles
    async function obtenerTarjetasUsuario(usuarioId) 
    {
      try {
        // El endpoint espera userId como query parameter
        const response = await fetch(`/api/tarjetas-disponibles?userId=${usuarioId}`);
        if (!response.ok) {
          console.warn(`No se encontraron tarjetas para el usuario ${usuarioId}`);
          return [];
        }
        const data = await response.json();
        
        // El endpoint retorna un objeto con tarjetas que contiene propiedades show_*
        // Extraer las tarjetas que están habilitadas (true)
        if (data.success && data.tarjetas) 
        {
          return Object.keys(data.tarjetas)
            .filter(key => data.tarjetas[key] === true)
            .map(key => key.replace('show_', '')); // Remover "show_" del nombre
        }
        return [];
      } catch (error) 
      {
        console.error('Error al obtener tarjetas:', error);
        return [];
      }
    }

    // Abrir modal para editar tarjetas
    async function abrirModalTarjetas(usuarioId, nombreUsuario) 
    {
      usuarioActualId = usuarioId;
      document.getElementById('tarjetasUsuarioNombre').textContent = nombreUsuario;
      const tarjetasOrganizadas = await cargarTodasLasTarjetas();
      
      // Obtener tarjetas actuales del usuario desde tarjetas_disponibles
      try 
      {
        const response = await fetch(`/api/tarjetas-disponibles?userId=${usuarioId}`);
        if (!response.ok) throw new Error('Error al obtener tarjetas');
        const data = await response.json();
        
        tarjetasDisponiblesActuales = {};
        
        // Crear contenedor para 3 columnas
        const contenedor = document.getElementById('tarjetasContainer');
        contenedor.innerHTML = '';
        
        // Función para crear columna
        const crearColumna = (tarjetas) => {
          const columnaDiv = document.createElement('div');
          columnaDiv.style.cssText = 'display: flex; flex-direction: column; gap: 10px;';
          
          tarjetas.forEach(tarjeta => {
            const tarjetaId = tarjeta.id;
            const tarjetaNombre = tarjeta.nombre;
            const esActiva = data.success && data.tarjetas && data.tarjetas[tarjetaId] === true;
            
            tarjetasDisponiblesActuales[tarjetaId] = esActiva;
            
            const switchDiv = document.createElement('div');
            switchDiv.style.cssText = 'display: flex; align-items: center; gap: 10px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);';
            
            switchDiv.innerHTML = `
              <label class="switch" style="margin: 0;">
                <input type="checkbox" id="tarjeta-${tarjetaId}" ${esActiva ? 'checked' : ''}>
                <span class="switch-slider"></span>
              </label>
              <label for="tarjeta-${tarjetaId}" style="margin: 0; cursor: pointer; flex: 1; font-size: 0.9rem;">${tarjetaNombre}</label>
            `;
            
            const checkbox = switchDiv.querySelector(`#tarjeta-${tarjetaId}`);
            checkbox.addEventListener('change', (e) => {
              tarjetasDisponiblesActuales[tarjetaId] = e.target.checked;
            });
            
            columnaDiv.appendChild(switchDiv);
          });
          
          return columnaDiv;
        };
        
        //Crear y agregar las 3 columnas al contenedor
        contenedor.appendChild(crearColumna(tarjetasOrganizadas.columna1));
        contenedor.appendChild(crearColumna(tarjetasOrganizadas.columna2));
        contenedor.appendChild(crearColumna(tarjetasOrganizadas.columna3));
        document.getElementById('tarjetasDisponiblesModal').style.display = 'block';
      } catch (error) 
      {
        console.error('Error:', error);
        alert('Error al cargar tarjetas: ' + error.message);
      }
    }

    // Guardar cambios de tarjetas
    async function guardarTarjetas() 
    {
      try 
      {
        if (!usuarioActualId) throw new Error('Usuario no seleccionado');
        
        // Construir el objeto de tarjetas a actualizar
        const tarjetasData = {};
        Object.keys(tarjetasDisponiblesActuales).forEach(key => {
          tarjetasData[key] = tarjetasDisponiblesActuales[key];
        });

        const response = await fetch(`/api/tarjetas-disponibles/${usuarioActualId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(tarjetasData)
        });
        
        if (!response.ok) 
        {
          const errorData = await response.text();
          console.error('Respuesta del servidor:', errorData);
          throw new Error('Error al guardar tarjetas: ' + response.status);
        }
        
        const result = await response.json();
        console.log('Resultado:', result);
        
        mostrarMensajeExito('Tarjetas actualizadas correctamente');
        cerrarModalTarjetas();
        cargarUsuarios(); // Recargar tabla
      } catch (error) 
      {
        console.error('Error:', error);
        alert('Error: ' + error.message);
      }
    }

    // Cerrar modal de tarjetas
    function cerrarModalTarjetas() 
    {
      document.getElementById('tarjetasDisponiblesModal').style.display = 'none';
      usuarioActualId = null;
    }

    // Mostrar mensaje de éxito
    function mostrarMensajeExito(mensaje) 
    {
      const el = document.getElementById('successMessage');
      el.textContent = mensaje;
      el.style.display = 'block';
      el.style.opacity = '1';
      setTimeout(() => {
        el.style.opacity = '0';
        setTimeout(() => el.style.display = 'none', 300);
      }, 2000);
    }

    // Event listeners para el modal de tarjetas
    document.addEventListener('DOMContentLoaded', function() 
    {
      const modal = document.getElementById('tarjetasDisponiblesModal');
      const closeBtn = modal.querySelector('.close');
      const cerrarBtn = document.getElementById('cerrarTarjetasButton');
      const guardarBtn = document.getElementById('guardarTarjetasButton');
      closeBtn.addEventListener('click', cerrarModalTarjetas);
      cerrarBtn.addEventListener('click', cerrarModalTarjetas);
      guardarBtn.addEventListener('click', guardarTarjetas);
      
      // Cerrar modal al hacer clic fuera
      window.addEventListener('click', (e) => {
        if (e.target === modal) 
        {
          cerrarModalTarjetas();
        }
      });
      
      // Cargar usuarios al cargar la página
      cargarUsuarios();
      
      // Funcionalidad de búsqueda (filtra la lista y recarga la paginación)
      const buscarInput = document.getElementById('buscarUsuario');

            return id.includes(termino) || nombre.includes(termino);

    });
